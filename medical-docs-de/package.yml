    replace: "Alberta Netcare"
    word: true

  - trigger: "oeph"
    replace: "Bei Untersuchung des vorgelegten Fotos, "
    word: true

  - trigger: ":fuwr"
    replace: "{{pp}} Nachkontrolle, sobald die Ergebnisse vorliegen"
    word: true

  - trigger: ":life"
    word: true
    replace: |
      {{pp}} eine feste Schlafenszeit und Aufstehzeit einhalten, auch an freien Tagen
      {{pp}} regelmäßige Mahlzeiten mit einer Vielfalt an unverarbeiteten Lebensmitteln einhalten
      {{pp}} regelmäßig körperlich aktiv sein, mit mindestens 30 Minuten pro Tag an 5 Tagen pro Woche
      {{pp}} den Konsum von Genussmitteln, einschließlich Alkohol, reduzieren oder einstellen
      Leitlinien empfehlen maximal 2 Getränke/Tag und 10 Getränke/Woche für Frauen sowie 3 Getränke/Tag und 15 Getränke/Woche für Männer.
      {{pp}} Ihre Hobbys weiter pflegen
      {{pp}} Zeit in Freundschaften und soziale Kontakte investieren
      {{pp}} Ihre spirituelle Verbundenheit und persönlichen Werte pflegen

  - trigger: ":snet"
    word: true
    replace: |
      {{pp}} sich zur Nachkontrolle anmelden, falls sich die Beschwerden verschlechtern oder neue Symptome auftreten

  - trigger: ":snet2"
    word: true
    replace: |
       Sollte sich Ihr Beschwerdebild deutlich verändern oder Ihr Gesundheitszustand
       sich während der Wartezeit auf die Ergebnisse verschlechtern, warten Sie bitte nicht
       auf die Ergebnisse, sondern lassen Sie sich erneut untersuchen. Bitte suchen Sie
       so bald wie möglich medizinische Hilfe auf, falls sich Ihr Zustand deutlich verschlechtert.

  - trigger: ":finish"
    word: true
    replace: |
       {{results}}
       {{rxget}}
       {{findfp}}
       {{covidremind}}
       {{snet}}
    vars:
      - name: results
        type: match
        params:
          trigger: ":results"
      - name: rxget
        type: match
        params:
          trigger: ":rxget"
      - name: findfp
        type: match
        params:
          trigger: ":findfp"
      - name: covidremind
        type: match
        params:
          trigger: ":covidremind"
      - name: snet
        type: match
        params:
          trigger: ":snet"

  # Dates
  - trigger: ":date"
    replace: "{{mydate}}"
    vars:
      - name: mydate
        type: date
        params:
          format: "%d.%m.%Y"

  - trigger: ":time"
    replace: "{{mytime}}"
    vars:
