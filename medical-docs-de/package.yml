  - trigger: ":FIFE"
    word: true
    replace: |
      Gefühle: Was bereitet Ihnen am meisten Sorge? Gibt es spezifische Ängste oder Bedenken?
      Vorstellungen: Was denken Sie, könnte die Ursache sein?
      Funktion: Wie hat sich dies auf Ihren Alltag ausgewirkt? Worauf mussten Sie verzichten?
      Erwartungen: Was erwarten oder erhoffen Sie sich heute von mir?

