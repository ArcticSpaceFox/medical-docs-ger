        type: date
        params:
          format: "%H:%M"

  - trigger: ":phone"
    word: true
    replace:  |
      TELEFONISCHE KOMMUNIKATION
      Grund des Anrufs:
      Notizen:


  - trigger: "lmom"
    replace: "{{mytime}} Angerufen, jedoch keine Antwort. Voicemail hinterlassen mit der Bitte, die Praxis bei Gelegenheit zurückzurufen."
    word: true
    vars:
      - name: mytime
        type: date
        params:
          format: "%H:%M"

  - trigger: ":pain"
    replace: |
      Der Schmerz ist lokalisiert in
        und strahlt aus nach
        Der Schmerz geht einher mit Übelkeit Erbrechen Schwitzen Atemnot
        Er besteht seit
        und begann als
        Die Symptome werden besser  bleiben gleich  werden schlechter
        Er ist konstant intermittierend
        Der Schmerz ist morgens besser  abends  gleichbleibend im Tagesverlauf
        Er tritt in der Regel etwa X-mal täglich auf
        Wenn er auftritt, dauert jede Episode
        Der Charakter des Schmerzes ist
        Die Intensität beträgt X von 10 (wobei 10 der stärkste vorstellbare Schmerz ist)
        Der Schmerz verschlimmert sich bei
        Der Schmerz bessert sich bei
        Bisher versuchte Behandlungen umfassen

  - trigger: ":PQRST"
    word: true
    replace: |
      Provokation, Linderung - Was löst den Schmerz aus?
                   Was macht ihn besser oder schlechter?
      Qualität - Wie fühlt er sich genau an? (stechend, dumpf, scharf, brennend, drückend)
      Radiation - Ist der Schmerz lokal begrenzt oder strahlt er aus?
      Schwere - Wie stark ist er? (Skala 1 - 10)
                 Wie stark beeinträchtigt er Ihr Leben?
      Zeitverlauf - Ist er ständig vorhanden oder kommt und geht er?
               Wann beginnt er und wie lange hält er an?
               Wann war die letzte Schmerzmedikation?

  - trigger: ":OLDCARTS"
    word: true
    replace: |
      Beginn:
      Lokalisation:
      Dauer:
      Charakter:
      Verstärkende Faktoren:
      Lindernde Faktoren:
      Versuchte Therapien:
      Schweregrad:

  - trigger: ":SOCRATES"
    word: true
    replace: |
      Ort:
      Beginn:
      Charakter:
      Ausstrahlung:
      Begleitsymptome:
      Zeit/Dauer:
      Verschlimmernde/lindernde Faktoren:
      Schweregrad:


  - trigger: ":refill"
    word: true
    replace: |
      Subjektiv:
        {{cc}} benötigt Wiederholungsrezept für bereits verordnetes Medikament: MEDIKAMENT
        welches verordnet wird für die Indikation INDIKATION
        seit etwa DAUER

        {{sp}} keine Bedenken bezüglich der Wirksamkeit
        {{sp}} keine Bedenken bezüglich Nebenwirkungen
      Plan:
        Rezept ausgestellt zur Fortführung von MEDIKAMENT
        {{pp}} Medikament weiterhin wie verordnet einnehmen
        {{pp}} Nachkontrolle beim Hausarzt

  - trigger: ":sicknote"
    word: true
    replace: |
      Sehr geehrte Damen und Herren,

      der oben genannte Patient wurde in meiner Praxis untersucht und beurteilt.
      Dem Patienten wird empfohlen, folgende Tage der Arbeit  Schule fernzubleiben:

      {{mydate}}

      Für Rückfragen stehe ich Ihnen gerne zur Verfügung.

      Mit freundlichen Grüßen.

    vars:
      - name: mydate
        type: date
        params:
          format: "%d. %B %Y"

  - trigger: ":noother"
    word: true
    replace: |
      Sie haben keine bekannten Allergien.
      Sie haben keine weiteren medizinischen Vorerkrankungen.
      Sie nehmen keine Medikamente ein (verschreibungspflichtig oder rezeptfrei).
      Sie sind Nichtraucher.
      Sie trinken keinen Alkohol.
      Sie konsumieren keine anderen Substanzen wie Cannabis.

  - trigger: ":refills"
    word: true
    replace: |
       Ihr Hauptanliegen heute ist die Wiederholungsverordnung bereits verschriebener Medikamente:
       1) MEDIKAMENT DOSIS HAEUFIGKEIT
       welches verordnet wird für die Indikation INDIKATION
       seit etwa DAUER

       2) MEDIKAMENT DOSIS HAEUFIGKEIT
       welches verordnet wird für die Indikation INDIKATION
       seit etwa DAUER

       3) MEDIKAMENT DOSIS HAEUFIGKEIT
       welches verordnet wird für die Indikation INDIKATION
       seit etwa DAUER

       {{noother}}

       Sie erscheinen wohlauf und ohne erkennbare Beeinträchtigung
       Sie haben keine Bedenken bezüglich der Wirksamkeit dieser Medikamente
       Sie haben keine Bedenken bezüglich Nebenwirkungen

       Rezepte wurden ausgestellt zur Fortführung von:
       MEDIKAMENTE

       Es wird empfohlen, diese Medikamente weiterhin wie verordnet einzunehmen

       Es wird empfohlen, sich bei Ihrem Hausarzt zur Nachkontrolle vorzustellen

       {{finish}}
    vars:
      - name: noother
        type: match
        params:
          trigger: ":noother"
      - name: finish
        type: match
        params:
          trigger: ":finish"




