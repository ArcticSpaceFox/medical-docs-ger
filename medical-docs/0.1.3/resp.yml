name: resp
parent: default

matches:
    - trigger: "sob"
      replace: "Atemnot"
      propagate_case: true
      word: true

    - trigger: "soboe"
      replace: "Belastungsdyspnoe"
      propagate_case: true
      word: true

    - trigger: ":asthma"
      word: true
      replace: |
         Asthma ist eine Erkrankung, die eine Entzündung der Atemwege verursacht und dadurch den für den
         Luftstrom verfügbaren Raum verengt.
         Ventolin ist ein Bronchodilatator, der hilft, die Muskulatur zu entspannen und die Atemwege vorübergehend
         zu öffnen, jedoch nicht die zugrunde liegende Entzündung behandelt.
         Sie sollten von der zusätzlichen Einnahme regelmäßiger täglicher Medikamente wie inhalativen Kortikosteroiden
         profitieren, um die zugrunde liegende Entzündung zu unterdrücken, sowie von Montelukast (Singulair), das
         besonders bei allergiebedingtem Asthma hilfreich ist.
         Kombinationspräparate wie Symbicort enthalten sowohl ein Kortikosteroid gegen die Entzündung als auch
         einen Bronchodilatator zur Öffnung der Atemwege, der sowohl schnell wirkt (ähnlich wie Ventolin)
         als auch länger anhält (im Vergleich zu Ventolin) und daher auch effektiv als Bedarfsspray eingesetzt werden kann.

         Ein Rezept wurde zur Verlängerung der Nutzung von:
         Ventolin HFA 100 µg 1-2 Hübe alle 4 Stunden bei Bedarf ausgestellt.

         Zusätzlich wurden Rezepte für die folgenden Medikamente ausgestellt, um Ihre
         Asthmasymptome besser zu kontrollieren:
         Symbicort 200 1 Hub zweimal täglich, sowie bei Bedarf bis zu insgesamt 8 Hüben täglich
         Montelukast (Singulair) 10 mg einmal täglich

         Es kann sein, dass Sie diese Medikamente nicht das ganze Jahr über benötigen, aber eine regelmäßige,
         konsequente tägliche Einnahme während der Allergiesaison sollte helfen, Ihre Symptome zu kontrollieren.

         Es wird empfohlen, sich innerhalb von 30 Tagen bei Ihrem Hausarzt/Ihrer Hausärztin vorzustellen, um zu
         überprüfen, wie gut diese neuen Medikamente wirken und ob Sie diese fortführen möchten oder eine
         Dosisanpassung erforderlich ist.
