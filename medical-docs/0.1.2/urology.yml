        Siehe auch: CMAJ-Leitlinien 2015

  - trigger: ":cialis"
    word: true
    replace: |
       Es wird empfohlen, das verordnete Cialis (Tadalafil) versuchsweise einzunehmen, beginnend mit
       10 mg (1/2 Tablette), bei Bedarf mindestens 30 Minuten vor sexueller Aktivität. Es wird erwartet,
       dass dieses Medikament die Funktion für bis zu 36 Stunden nach einer Einzeldosis verbessert.
       Wirkt 10 mg gut, kann versuchsweise auf 5 mg (1/4 Tablette) reduziert werden, um Kosten
       und mögliche Nebenwirkungen zu verringern.
       Falls 10 mg nur eine teilweise Wirkung zeigt, kann auf 20 mg (ganze Tablette) erhöht werden.
       Zeigt 20 mg keine Wirkung, wird eine Verlaufskontrolle zur Besprechung alternativer Behandlungen empfohlen.
       20 mg nicht überschreiten.

       Falls die tägliche Einnahme praktischer ist als die Einnahme bei Bedarf,
       beträgt die empfohlene Tagesdosis 2,5 mg (1/8 Tablette) bis 5 mg (1/4 Tablette).
       Ein Tablettenteiler kann beim Zerteilen auf 1/8 Tablette helfen; üblicherweise werden
       20-mg-Tabletten verordnet, da diese am kostengünstigsten sind, es sind jedoch bei Bedarf
       auch kleinere Dosierungen (2,5 mg, 5 mg, 10 mg) erhältlich.

       Da Sie dieses Medikament zum ersten Mal einnehmen, wird empfohlen, zunächst nur eine
       Mindestmenge (4 Tabletten) abzuholen, um die Wirksamkeit zu prüfen, bevor weitere bezogen werden,
       auch wenn das Rezept über eine größere Menge ausgestellt ist, damit bei guter Wirkung fortgesetzt werden kann.

       Bitte vereinbaren Sie eine Verlaufskontrolle bei Ihrem Hausarzt/Ihrer Hausärztin, um eine angemessene
       Überwachung der vaskulären Risikofaktoren sicherzustellen, um zu klären, ob eine Hormonsubstitution
       infrage kommt, und um bei der Raucherentwöhnung zu unterstützen.
