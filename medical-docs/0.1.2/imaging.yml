name: imaging
parent: default

matches:
  - trigger: "xr"
    replace: "Röntgenaufnahme"
    propagate_case: true
    word: true

  - trigger: "cxr"
    replace: "Röntgen-Thorax"
    propagate_case: true
    word: true

  - trigger: "u/s"
    replace: "Ultraschall"
    propagate_case: true
    word: true

  - trigger: "mammo"
    replace: "Mammographie"
    propagate_case: true
    word: true

  - trigger: "bmd"
    replace: "Knochendichte"
    propagate_case: true
    word: true

  - trigger: "fit test"
    replace: "FIT-Test (Darmkrebs-Screening)"
    word: true
