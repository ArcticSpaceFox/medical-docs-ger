name: uti
parent: default

matches:
  - trigger: ":uti"
    word: true
    replace: |
     Subjektiv:
       {{cc}} mögliche Harnwegsinfektion seit XX Tagen
       {{sp}} keine Dysurie
       {{sp}} keine Pollakisurie
       {{sp}} kein Harndrang,
       {{sp}} keine Hämaturie
       {{sp}} kein Fieber
       {{sp}} kein Schüttelfrost
       {{sp}} keine Übelkeit und kein Erbrechen
       {{sp}} keine Flankenschmerzen
       {{sp}} keine Bauchschmerzen

       {{sp}} kein vaginaler Ausfluss
       {{sp}} keine vaginale Blutung
       {{sp}} keine Stuhlgangsveränderungen

       {{sp}} keine Harnwegsinfektionen (HWI) in den letzten 6 Monaten (und keine im letzten Jahr)
              (rezidivierender HWI definiert als ≥2 Infektionen in sechs Monaten oder ≥3 Infektionen in einem Jahr)
       {{sp}} keine Antibiotikaeinnahme innerhalb der letzten 4 Wochen
       {{sp}} keine Immunsuppression
       {{sp}} keine Allergien gegen Antibiotika
       {{sp}} keine Schwangerschaft

     Objektiv:
       {{op}} keine suprapubische Druckschmerzhaftigkeit (über der Blase)
       {{op}} keine Klopfschmerzhaftigkeit im Nierenlager (über den Nieren)
       {{op}} keine Leukozyten (weiße Blutkörperchen) im Urinstix
       {{op}} keine Nitrite (Stoffwechselprodukt bakterieller Infektion) im Urinstix

     Beurteilung:
       {{ap}} Unkomplizierte Harnwegsinfektion

     Plan:
       {{pp}} vermehrte Flüssigkeitszufuhr
       {{pp}} verordnetes Antibiotikum beginnen: Macrobid Ciprofloxacin Septra  Monurol Cephalexin
       Eine Urinkultur wurde eingesandt, um die Behandlung zu leiten, falls die Symptome sich nicht bessern

       {{pp}} auf Symptome einer Nierenbeckenentzündung (Pyelonephritis) achten, einschließlich Fieber, Übelkeit und Rückenschmerzen
       {{pp}} bei Verschlechterung, Persistenz der aktuellen Symptome oder neuen Symptomen erneut vorstellen

  - trigger: ":uti2"
    word: true
    replace: |
       {{cc}} mögliche Harnwegsinfektion seit XX Tagen
       {{sp}} keine Dysurie
       {{sp}} keine Pollakisurie
       {{sp}} kein Harndrang,
       {{sp}} keine Hämaturie
       {{sp}} kein Fieber
       {{sp}} kein Schüttelfrost
       {{sp}} keine Übelkeit und kein Erbrechen
       {{sp}} keine Flankenschmerzen
       {{sp}} keine Bauchschmerzen

       {{sp}} kein vaginaler Ausfluss
       {{sp}} keine vaginale Blutung
       {{sp}} keine Stuhlgangsveränderungen

       {{sp}} keine Harnwegsinfektionen (HWI) in den letzten 6 Monaten (und keine im letzten Jahr)
              (rezidivierender HWI definiert als ≥2 Infektionen in sechs Monaten oder ≥3 Infektionen in einem Jahr)
       {{sp}} keine Antibiotikaeinnahme innerhalb der letzten 4 Wochen
       {{sp}} keine Immunsuppression
       {{sp}} keine Allergien gegen Antibiotika
       {{sp}} keine Schwangerschaft

       {{op}} keine suprapubische Druckschmerzhaftigkeit (über der Blase)

       Basierend auf Ihren Symptomen liegt sehr wahrscheinlich eine Harnwegsinfektion vor und
       die Behandlung kann jetzt begonnen werden.
       Es wäre jedoch auch sinnvoll, eine Urinprobe zur Kultur einzusenden, um die Infektion zu bestätigen
       und die Behandlung zu leiten, falls die initiale Behandlung nicht wirkt.
       In der Besprechung haben Sie angegeben, dass Sie auf frühere Behandlungen von Harnwegsinfektionen gut angesprochen haben und
       diese zusätzliche Untersuchung derzeit nicht wünschen.

       Es wird empfohlen, eine Urinprobe zur Kultur einzusenden, um die Diagnose zu bestätigen und
       die Behandlung zu leiten, falls die Symptome sich nicht bessern. Sie werden kontaktiert, um diese Untersuchung zu vereinbaren.

       {{pp}} verordnetes Antibiotikum beginnen: Macrobid (Nitrofurantoin) 100mg zweimal täglich für 7 Tage
       {{pp}} vermehrte Flüssigkeitszufuhr und Erwägung von Preiselbeerkapseln, da diese helfen können, die Infektion schneller zu beseitigen.

       {{finish}}

       {{pp}} auf Symptome einer Nierenbeckenentzündung (Pyelonephritis) achten, einschließlich Fieber, Übelkeit und Rückenschmerzen
       und bei Auftreten dieser Symptome umgehend erneut vorstellen.

    vars:
      - name: finish
        type: match
        params:
          trigger: ":finish"

