name: excision
parent: default

matches:
  - trigger: ":excision"
    word: true
    replace: |
      Subjektiv:
        {{cc}} Exzision einer Hautveränderung an LOKALISATION
        {{sp}} seit DAUER bemerkt
        {{sp}} kein Wachstum
        {{sp}} keine Farbveränderung
        {{sp}} keine Blutung
        {{sp}} keine Schmerzen
        {{sp}} kein Juckreiz

        {{sp}} keine spezifischen Bedenken
        {{sp}} spezifische Bedenken, unter anderem:

        {{sp}} keine persönliche Vorgeschichte von Hautkrebs
        {{sp}} keine Hautkrebs-Fälle in der Familienanamnese

        Risiken und mögliche Komplikationen wurden besprochen,
           einschließlich Blutung, Infektion, Narbenbildung, Rezidiv
        Alternativen wurden besprochen, einschließlich Verzicht auf Intervention
        Zu den erwarteten Vorteilen zählen die Entfernung einer
        beunruhigenden Hautveränderung und die Diagnosestellung zur weiteren Therapieplanung
        Einwilligung eingeholt

      Objektiv:
        Dreimalige Desinfektion mit Alkohol
        anschließend lokale Infiltration mit Lidocain und Adrenalin
        Bereich anschließend dreimal mit Chlorhexidin desinfiziert
        und steril abgedeckt
        Exzision mit sterilem Skalpell durchgeführt
        Blutstillung erfolgt
        Wundverschluss mit sterilem chirurgischem Nahtmaterial
           (Nylon 3-0 x 5)
        Bereich gereinigt und verbunden
        Exzidiertes Gewebe zur pathologischen Untersuchung eingesandt

      Beurteilung:
        {{ap}} atypischer melanozytärer Nävus
        {{ap}} irritierte seborrhoische Keratose
        {{ap}} irritiertes Hautanhängsel (Fibroma pendulans)

      Plan:
        {{pp}} Ergebnis der pathologischen Untersuchung abwarten
        {{pp}} nächste 24 Stunden abgedeckt und trocken halten
        {{pp}} Polysporin zur Feuchthaltung auftragen
        {{pp}} mit Verband abdecken, täglich wechseln
               oder früher bei Durchbluten
        {{pp}} Wiedervorstellung zur Fadenentfernung nach 7 Tagen
        {{pp}} frühere Wiedervorstellung bei Infektionsverdacht,
           z. B. zunehmenden Schmerzen, Rötung, Überwärmung, Schwellung oder Eiter

