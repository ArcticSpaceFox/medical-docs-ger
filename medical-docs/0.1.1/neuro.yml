name: neuro
parent: default

matches:
  - trigger: ":cthead"
    word: true
    replace:  |
      Canadian Head CT Rule
        (nicht für Alter <16, Antikoagulation oder Gerinnungsstörung, Schwangerschaft)
      CT bei Vorliegen eines der folgenden Punkte:
        Schädelbasisfraktur
        Zweimaliges oder häufigeres Erbrechen
        Alter ab 65 Jahren
        GCS-Wert <15 zwei Stunden nach der Verletzung
        Verdacht auf offene oder imprimierte Schädelfraktur
        Zeichen einer Schädelbasisfraktur
           (Hämatotympanon, "Waschbärenaugen", Liquor-Otorrhoe/-Rhinorrhoe, Battle-Zeichen)
        Amnesie vor dem Trauma von 30 Minuten oder mehr
        Gefährlicher Unfallmechanismus (Fußgänger angefahren, aus Fahrzeug geschleudert, Sturz aus >=1 Meter Höhe oder 5 Stufen)

  - trigger: ":gcs"
    word: true
    replace:  |
      Glasgow-Koma-Skala
      Augenöffnung:
        4: Spontan
        3: Auf Ansprache
        2: Auf Schmerzreiz
        1: Keine Reaktion
      Verbal:
        5: Orientiert
        4: Verwirrt
        3: Inadäquate Äußerungen
        2: Unverständliche Laute
        1: Keine Reaktion
      Motorisch:
        6: Befolgt Aufforderungen
        5: Gezielte Schmerzabwehr
        4: Ungezielte Schmerzabwehr
        3: Beugesynergismen
           (steif mit gebeugten Armen, geballten Fäusten und gestreckten Beinen)
        2: Strecksynergismen
           (Arme und Beine gestreckt, Zehen nach unten zeigend, Kopf und Nacken nach hinten überstreckt)
        1: Keine Reaktion

  - trigger: ":neuroexam"
    word: true
    replace:  |
      {{op}} normales Bewusstsein
        {{op}} unauffälliger Kopf-, Augen-, Ohren-, Nasen- und Rachenbefund
        {{op}} unauffälliger Hirnnervenstatus
        {{op}} normale Kraft in oberen und unteren Extremitäten
        {{op}} normale Muskeleigenreflexe in oberen und unteren Extremitäten
        {{op}} unauffällige zerebelläre Untersuchung (einschließlich Finger-Nase-Versuch und Diadochokinese)
        {{op}} normales Gangbild, einschließlich Seiltänzergang
        {{op}} normale Fähigkeit, mit geschlossenen Augen das Gleichgewicht zu halten (negativer Romberg-Test)

  - trigger: ":neuroredflag"
    word: true
    replace:  |
      {{sp}} keine Sprechstörung (Dysarthrie)
        {{sp}} keine Doppelbilder (Diplopie)
        {{sp}} keine Schluckstörung (Dysphagie)
        {{sp}} keine Schwierigkeiten bei präzisen Bewegungen wie dem Finger-Nase-Versuch (Dysmetrie)
        {{sp}} keine Unfähigkeit, rasche alternierende Bewegungen auszuführen (Dysdiadochokinese)


  - trigger: ":vertigo"
    word: true
    replace:  |
      Subjektiv:
        {{cc}} Schwindel seit DAUER
        {{sp}} Gefühl, als würde sich der Raum drehen
        Die Empfindung ist intermittierend und dauert XX Sekunden
        {{sp}} kein erkennbarer Auslöser - keine kürzliche Erkrankung oder Erkältung und kein Trauma.
        Begleitet von Übelkeit
        {{sp}} keine weiteren Symptome.

        Warnzeichen:
        {{neuroredflag}}

      Objektiv:
        {{neuroexam}}
        {{op}} Symptome werden durch rasches Hinlegen mit zur Seite gedrehtem Kopf ausgelöst (Dix-Hallpike-Manöver)
               Stärker bei Drehung nach RECHTS, einschließlich Schwindel, Übelkeit, unwillkürlicher Augenbewegungen (Nystagmus)

      Beurteilung:
        {{ap}} benigner paroxysmaler Lagerungsschwindel (BPLS)

      Plan:
        {{pp}} bereitgestelltes Informationsmaterial durchsehen
        {{pp}} Selbstbehandlung gemäß bereitgestelltem Merkblatt versuchen
        {{pp}} Physiotherapie erwägen, falls unwirksam.
        {{pp}} ausreichende Flüssigkeitszufuhr sicherstellen.
        {{pp}} bereitgestelltes Rezept (Betahistin) bei Bedarf zur Symptomlinderung verwenden

    vars:
      - name: neuroexam
        type: match
        params:
          trigger: ":neuroexam"
      - name: neuroredflag
        type: match
        params:
          trigger: ":neuroredflag"

  - trigger: ":tremor"
    word: true
    replace:  |
      Subjektiv:
        {{cc}} Tremor der LINKEN HAND seit DAUER
        {{sp}} kein Ruhetremor
        {{sp}} keine Schwierigkeiten bei Alltagsaktivitäten
        {{sp}} keine progrediente Verschlechterung der Symptome
        {{sp}} keine Besserung durch Alkoholkonsum
        {{sp}} keine vorangegangene Behandlung
        {{sp}} keine Familienanamnese von Tremor

      Objektiv:
        Psychogener Tremor:
        Bei raschen alternierenden Bewegungen der kontralateralen Extremität ist der Tremor
        BESSER SCHLECHTER UNVERÄNDERT beim Öffnen/Schließen der Faust
        BESSER SCHLECHTER UNVERÄNDERT bei Pro-/Supination des Unterarms
        BESSER SCHLECHTER UNVERÄNDERT beim Klopfen des Fußes auf den Boden

        Hinweis: Typischerweise wird der Ruhetremor bei Morbus Parkinson deutlicher,
         während der psychogene Tremor verschwindet oder den Rhythmus der willkürlichen Extremitätenbewegung annimmt (Entrainment).

        Aktionstremor:
        Der Tremor ist:
        BESSER SCHLECHTER UNVERÄNDERT beim Zeichnen einer Spirale innerhalb einer anderen Spirale,
        BESSER SCHLECHTER UNVERÄNDERT beim Verbinden von 2 Punkten zwischen eng beieinander liegenden geraden Linien
        BESSER SCHLECHTER UNVERÄNDERT beim Umschütten von Wasser von einem Glas in ein anderes

        Haltetremor:
        Der Tremor ist:
        BESSER SCHLECHTER UNVERÄNDERT bei ausgestreckten Armen für 10-15s, mit losem Papierblatt auf der Hand/den Händen

        Intentionstremor (kinetisch)
        Der Tremor ist:
        BESSER SCHLECHTER UNVERÄNDERT bei Nase-Finger-Nase-Bewegung
        BESSER SCHLECHTER UNVERÄNDERT bei Knie-Hacke-Schienbein-Bewegung

        Intentionstremor
        Der Tremor ist bei zielgerichteten Bewegungen NICHT vorhanden.
        Die Tremoramplitude ist ZUNEHMEND ABNEHMEND UNVERÄNDERT, während sich die Hand dem Ziel nähert.

        Einfacher kinetischer Tremor
        Der Tremor ist bei allen nicht zielgerichteten Bewegungen NICHT vorhanden,
        wie z. B. wiederholter Flexion-Extension im Ellenbogen oder Pro-/Supination
        des Unterarms.
        Es kommt zu KEINER Amplitudenzunahme in der Endphase.

        Aufgabenspezifischer Tremor
        Der Tremor TRITT AUF VERSCHLECHTERT SICH BESSERT SICH BLEIBT UNVERÄNDERT beim Schreiben.
        Der Tremor TRITT AUF VERSCHLECHTERT SICH BESSERT SICH BLEIBT UNVERÄNDERT beim Musizieren
        Der Tremor TRITT AUF VERSCHLECHTERT SICH BESSERT SICH BLEIBT UNVERÄNDERT beim Halten eines Tons.

        Isometrischer Tremor
        Der Tremor tritt NICHT als Folge einer Muskelkontraktion
        gegen ein starres, feststehendes Objekt auf.

      Beurteilung:
        Es liegt eine rhythmische, unwillkürliche Oszillation der LINKEN RECHTEN OBEREN UNTEREN Extremität vor,
        vorwiegend das HANDGELENK UND DIE DISTALEN FINGERANTEILE betreffend, NICHT in Ruhe vorhanden,
        ZUNEHMEND ABNEHMEND UNVERÄNDERT bei Aktivität, LANGSAM MITTEL SCHNELL in der Frequenz,
        LEICHT MITTEL SCHWER in der Amplitude, ZUNEHMEND ABNEHMEND UNVERÄNDERT durch ablenkende Bewegungen
        anderer Extremitäten und OHNE Entrainment.

        Zusammenfassend handelt es sich am ehesten um einen RUHE-/AKTIONS-Tremor.
        Die Tremorcharakteristik ist am ehesten vereinbar mit einem HALTE-KINETISCHEN-PSYCHOGENEN Tremor.
        Der kinetische Tremor erscheint als EINFACHER KINETISCHER  INTENTIONS-  AUFGABENSPEZIFISCHER  ISOMETRISCHER Tremor.

        {{ap}} benigner essentieller Tremor

      Plan:
        {{pp}} Therapieversuch mit Propranolol beginnen
        {{pp}} Alkohol nicht zur Behandlung verwenden
        {{pp}} Wiedervorstellung innerhalb eines Monats zur Beurteilung der Wirksamkeit der Therapie

  - trigger: ":tremorinfo"
    word: true
    replace:  |
        Differentialdiagnosen:
        Tremor: rhythmische, unwillkürliche Oszillationen eines Körperteils
          Ruhetremor: vorhanden bei nicht willkürlich aktiviertem Körperteil, vollständig
               gegen die Schwerkraft abgestützt (z. B. auf der Armlehne eines Stuhls abgestützt)
          Aktionstremor: bei willkürlicher Muskelaktivität sichtbar.
             Haltetremor: bei willkürlicher Aufrechterhaltung einer Antigravitationshaltung
             Kinetischer Tremor: während willkürlicher Bewegungen vorhanden
                 Einfacher kinetischer Tremor: bei allen nicht zielgerichteten
                       willkürlichen Bewegungen vorhanden
                 Intentionstremor: bei zielgerichteten Bewegungen vorhanden
                       Verschlechterung bei Annäherung an das Ziel.
                 Aufgabenspezifischer Tremor: durch spezifische Tätigkeit verstärkt
                 Isometrisch: bei Muskelkontraktion gegen ein starres, feststehendes Objekt.

        Myoklonus: unrhythmisch, rasch, ruckartig, blitzartig
        Stereotypie: wiederholte und kontinuierliche komplexe motorische Handlungen
        Epilepsia partialis continua: kann rhythmisch sein, aber Bewegungen
               ändern sich NICHT bei Positions- oder Aktivitätswechsel.
        Klonus: rhythmische Oszillationen um ein Gelenk als Reaktion auf
                plötzliche passive Kontraktion.
                Zunahme von Amplitude und Kraft bei passiver Muskeldehnung
        Dystonie: anhaltende Muskelkontraktionen, die häufig zu
                  Verdrehung und abnormaler Haltung eines Körperteils führen
        Tic: kurz, unrhythmisch, rasch, meist orofazial, willkürlich unterdrückbar
             mit anschließender Rebound-Zunahme.
        Chorea: unrhythmische, nicht stereotype, semizielgerichtete, relativ langsame Bewegungen,
               die von einem Körperteil zum anderen fließen.



