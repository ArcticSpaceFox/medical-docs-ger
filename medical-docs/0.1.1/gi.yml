name: gi
parent: default

matches:
    - trigger: "ruq"
      replace: "rechter Oberbauch"
      propagate_case: true
      word: true

    - trigger: "rlq"
      replace: "rechter Unterbauch"
      propagate_case: true
      word: true

    - trigger: "llq"
      replace: "linker Unterbauch"
      propagate_case: true
      word: true

    - trigger: "luq"
      replace: "linker Oberbauch"
      propagate_case: true
      word: true

    - trigger: ":giredflag"
      word: true
      replace: |
        Gastrointestinale Warnzeichen:
          {{sp}} keine Familienanamnese von Kolonkarzinom
          {{sp}} keine Familienanamnese von chronisch-entzündlicher Darmerkrankung
          {{sp}} kein Blut im Stuhl oder schwarzer, teerartiger Stuhl (Meläna)
          {{sp}} kein Blut oder "Kaffeesatz" im Erbrochenen
          {{sp}} keine Schluckbeschwerden (Dysphagie)
          {{sp}} keine nächtlichen Symptome
          {{sp}} keine progredienten Symptome
          {{sp}} kein Beginn nach dem 50. Lebensjahr
          {{sp}} keine Anämie
          {{sp}} kein Gewichtsverlust

          Bei Vorliegen eines der oben genannten Merkmale ist eine Überweisung zur Gastroenterologie erforderlich

    - trigger: ":ibs"
      word: true
      replace: |
        Subjektiv:
          {{cc}} rezidivierende Bauchschmerzen seit DAUER
          {{sp}} keine Veränderung der Stuhlfrequenz
          {{sp}} keine Veränderung der Stuhlform
          {{sp}} keine Erleichterung der Schmerzen durch Defäkation

          {{redflags}}

          {{sp}} kein Blähbauch
          {{sp}} keine Flatulenz
          {{sp}} keine Übelkeit
          {{sp}} kein Aufstoßen
          {{sp}} kein frühes Sättigungsgefühl
          {{sp}} kein gastroösophagealer Reflux
          {{sp}} keine Dyspepsie

          {{sp}} keine Dysurie
          {{sp}} kein häufiger/imperativer Harndrang
          {{sp}} keine generalisierten muskuloskelettalen Schmerzen
          {{sp}} keine Dysmenorrhoe
          {{sp}} keine Dyspareunie
          {{sp}} keine Müdigkeit
          {{sp}} keine Angstsymptomatik
          {{sp}} keine depressive Symptomatik

          Medikamente, die die Symptome verschlimmern könnten:
          keine Abführmittel/Antazida
          keine PPI (Protonenpumpenhemmer)
          keine ASS/NSAR
          keine Eisen-/Kalzium-/Magnesiumpräparate
          keine Kalziumkanalblocker
          keine Antidepressiva
          keine Opioide
          keine Diuretika,
          keine pflanzlichen Präparate

        Objektiv:
          {{op}} keine abdominellen Resistenzen
          {{op}} keine abdominelle Druckschmerzhaftigkeit
          {{op}} keine Abwehrspannung
          {{op}} normale Darmgeräusche

        Beurteilung:
          {{ap}} Reizdarmsyndrom (RDS), diarrhoe-prädominant, obstipations-prädominant, gemischt

          ROM-IV-Kriterien für das Reizdarmsyndrom (RDS):
            1. Rezidivierende Bauchschmerzen >=3 Monate, >=1 Tag pro Woche
            2. Assoziiert mit Veränderung der Stuhlfrequenz und/oder -form
            3. UND Schmerzlinderung durch Defäkation.

          Weitere Abklärung ist jedoch erforderlich, um andere mögliche Ursachen nicht zu übersehen.

        Plan:
          {{pp}} weitere Untersuchungen gemäß bereitgestellter Laboranforderung durchführen
            Blutbild, Ferritin, Zöliakie-Screening

            Diarrhoe-prädominant:
              CRP, Albumin, Elektrolyte
              Stuhl: C.diff, Ova & Parasiten, Leukozyten, pH, Fettkügelchen, Elastase

            Obstipations-prädominant:
              TSH, Elektrolyte, ionisiertes Kalzium

            Gemischt:  keine weiteren Untersuchungen

          {{fu}}
          {{snet}}

      vars:
      - name: redflags
        type: match
        params:
          trigger: ":giredflag"

      - name: fu
        type: match
        params:
          trigger: ":fuwr"

      - name: snet
        type: match
        params:
          trigger: ":snet"

    - trigger: ":ibsmgt"
      word: true
      replace: |
        Allgemeines Management des Reizdarmsyndroms:
        {{pp}} Stress reduzieren
        {{pp}} regelmäßige körperliche Bewegung
        {{pp}} Schlafprobleme behandeln
        {{pp}} psychische Probleme behandeln
        {{pp}} auslösende Medikamente absetzen
        {{pp}} Probiotika versuchsweise einsetzen

        Diarrhoe-prädominant:
        {{pp}} FODMAP-Diät versuchsweise einsetzen
        {{pp}} Loperamid erwägen
        {{pp}} Amitriptylin (Saroten) oder Nortriptylin (Nortrilen) erwägen
        {{pp}} Gallensäurebinder erwägen
        {{pp}} Rifaximin erwägen

        Obstipations-prädominant:
        {{pp}} tägliche Flüssigkeitszufuhr erhöhen
        {{pp}} PEG-basiertes Abführmittel verwenden
        {{pp}} Linaclotid erwägen
        {{pp}} Prucaloprid erwägen

        Gemischt:
        {{pp}} FODMAP-Diät versuchsweise einsetzen
        {{pp}} Loperamid bei Bedarf erwägen
        {{pp}} PEG-basiertes Abführmittel bei Bedarf erwägen




