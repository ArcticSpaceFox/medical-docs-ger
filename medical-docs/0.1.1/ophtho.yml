name: ophtho
parent: default

matches:
  - trigger: "PERRLA"
    word: true
    replace: |
      Pupillen gleich groß, rund, prompte Licht- und Konvergenzreaktion (PERRLA)

  - trigger: "EOM"
    word: true
    replace: |
      Augenmotilität (EOM)


  - trigger: ":opsredflag"
    word: true
    replace: |
      Warnzeichen:
        {{sp}} keine starken Schmerzen
        {{sp}} keine ausgeprägten Schmerzen oder Sehverschlechterung bei Kontaktlinsentragen
        {{sp}} keine tiefsitzenden Augenschmerzen
        {{sp}} keine Lichtunverträglichkeit (Photophobie)
        {{sp}} kein Sehverlust
        {{sp}} keine farbigen Halos um Lichtquellen
        {{sp}} kein Trauma oder Fremdkörper
        {{sp}} keine Verätzung
        {{sp}} keine kürzliche Augenoperation

  - trigger: ":oporedflag"
    word: true
    replace: |
      Warnzeichen:
        {{op}} keine verminderte Sehschärfe
        {{op}} keine Pupillenunregelmäßigkeit
        {{op}} keine träge Lichtreaktion der Pupille
        {{op}} keine Hornhauttrübung
        {{op}} kein Blut in der Vorderkammer des Auges (Hyphäma)
        {{op}} kein Eiter in der Vorderkammer des Auges (Hypopyon)
        {{op}} kein erhöhter Augeninnendruck

  - trigger: ":redeye"
    word: true
    replace: |
      Subjektiv:
        {{cc}} rotes Auge seit DAUER
        {{sp}} Rötung RECHTS LINKS BEIDSEITIG
        {{sp}} kein dickflüssiger eitriger Ausfluss
        {{sp}} kein wässriger Ausfluss
        {{sp}} keine morgendlich verklebten Augen
        {{sp}} kein Sand-/Fremdkörpergefühl
        {{sp}} kein Juckreiz

        {{sp}} keine Kontaktlinsennutzung
        {{sp}} kein Fremdkörpergefühl im Auge
        {{sp}} keine starken Kopfschmerzen
        {{sp}} keine Übelkeit

        {{sredflags}}

      Objektiv:
        {{op}} konjunktivale Injektion RECHTS LINKS BEIDSEITIG
        {{op}} kein Ausfluss
        {{op}} Pupillen gleich groß, rund, prompte Licht- und Konvergenzreaktion (PERRLA)
        {{op}} normale Augenmotilität (EOM)
        {{op}} keine repetitiven, unkontrollierten Augenbewegungen (Nystagmus)
        {{op}} keine wesentlichen Schmerzen bei Augenbewegung
        {{op}} keine Doppelbilder (Diplopie)
        {{op}} kein sichtbarer Fremdkörper
        {{op}} keine Photophobie.
        {{op}} normale Hornhaut und Vorderkammer

        {{oredflags}}

      Beurteilung:
        {{ap}} virale Konjunktivitis
        {{ap}} bakterielle Konjunktivitis
        {{ap}} allergische Konjunktivitis
        Keine Alarmsymptome/-zeichen (Warnzeichen) vorhanden

      Plan:
        {{pp}} topische Antibiotika wie verordnet anwenden
        Dosis kann von 4-mal täglich auf 2-mal täglich reduziert werden,
        falls nach einigen Tagen eine Besserung der Symptome eintritt.
        Eine Abnahme von Ausfluss, Rötung und Reizung sollte innerhalb von 1-2 Tagen eintreten
        {{pp}} Antihistaminika mit mastzellstabilisierenden Eigenschaften (Pataday) verwenden
        {{pp}} rezeptfreie Augentropfen (Tränenersatzmittel) 1-2 Tropfen alle 1-6 Stunden bei Bedarf verwenden

        {{pp}} warme oder kühle Kompressen anwenden
        {{pp}} Augenreiben vermeiden
        {{pp}} Kontaktlinsen während der Symptomatik nicht tragen
        {{pp}} gemeinsame Nutzung von Taschentüchern, Handtüchern, Kosmetika, Bettwäsche oder Essbesteck vermeiden

        {{pp}} Wiedervorstellung bei anhaltenden, sich verschlechternden oder neuen Symptomen.
        {{pp}} sofortige Wiedervorstellung bei Warnzeichen (wie oben beschrieben)

    vars:
      - name: sredflags
        type: match
        params:
          trigger: ":opsredflag"

      - name: oredflags
        type: match
        params:
          trigger: ":oporedflag"

