name: urti
parent: default

matches:
  - trigger: ":urti"
    word: true
    replace: |
      Subjektiv:
        {{cc}} erkältungs-/grippeähnliche Symptome seit XX Tagen
        {{sp}} keine Halsschmerzen
        {{sp}} kein Husten
        {{sp}} kein Fieber
        {{sp}} keine verstopfte Nase
        {{sp}} keine Ohrenschmerzen
        {{sp}} keine Kopfschmerzen
        {{sp}} keine Nasennebenhöhlenschmerzen
        {{sp}} keine Zahnschmerzen
        {{sp}} keine Übelkeit/Erbrechen
        {{sp}} kein Durchfall
        {{sp}} keine erkrankten Kontaktpersonen
        {{sp}} keine kürzliche Reisetätigkeit
        {{sp}} keine Grippeimpfung in diesem Jahr

      Objektiv:
        {{op}} unauffällige Trommelfelle beidseits
        {{op}} unauffälliger Rachenbefund (Oropharynx) (keine Rötung, keine Schwellung, keine Beläge)
        {{op}} keine geschwollenen Halslymphknoten (zervikale Lymphadenopathie)
        {{op}} unauffällige Lungenauskultation (keine Giemen, keine Rasselgeräusche)
        {{op}} keine vermehrte Atemarbeit

      Beurteilung:
        {{ap}} viraler Infekt der oberen Atemwege
           Es bestehen jedoch Hinweise auf einen bakteriellen Racheninfekt.

      Plan:
         {{pp}} unterstützende Maßnahmen mit Flüssigkeitszufuhr und Ruhe fortführen
         {{pp}} Paracetamol/Ibuprofen zur Symptomlinderung verwenden
         {{pp}} Nasenspülung mit Kochsalzlösung zweimal täglich und Kortikosteroid-Nasenspray vor dem Schlafengehen
         {{pp}} Ergebnis des Rachenabstrichs abwarten und nur bei positivem Befund Antibiotika einnehmen
         {{pp}} Wiedervorstellung bei zunehmenden Symptomen nach 7 Tagen
         {{pp}} Notruf 112 wählen oder Notaufnahme aufsuchen bei Atembeschwerden


