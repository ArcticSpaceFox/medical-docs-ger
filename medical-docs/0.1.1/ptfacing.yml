name: ptfacing
parent: default

matches:
  - trigger: "ya"
    replace: "Sie wohnen in"
    word: true

  - trigger: "ym"
    replace: "Ihr Hauptanliegen heute ist"
    word: true

  - trigger: "yfut"
    replace: "Ihr Hauptanliegen heute ist die Besprechung der Untersuchungsergebnisse"
    word: true

  - trigger: "yh"
    replace: "Sie hatten"
    word: true

  - trigger: "yn"
    replace: "Sie hatten kein(e)"
    word: true

  - trigger: "yrx"
    replace: "Sie bitten um ein Rezept für"
    word: true

  - trigger: "yw"
    replace: "Sie wirken wohlauf, ohne erkennbaren Distress"
    word: true

  - trigger: "trx"
    replace: "Bitte nehmen Sie die verordneten Medikamente wie angegeben ein"
    word: true

  - trigger: "ymhx"
    replace: "Ihre relevante Vorgeschichte umfasst"
    word: true

  - trigger: "yfhx"
    replace: "Ihre relevante Familienanamnese umfasst"
    word: true

  - trigger: "ymed"
    replace: "Ihre aktuellen Medikamente umfassen"
    word: true

  - trigger: "ynhx"
    replace: "Sie haben keine relevante Vorgeschichte, keine verordneten Medikamente und keine relevante Familienanamnese"
    word: true

  - trigger: "ymnd"
    replace: "Sie wurden von Ihrer Mutter und Ihrem Vater begleitet."
    word: true

  - trigger: "vutd"
    replace: "Impfungen sind auf dem aktuellen Stand"
    word: true

  - trigger: "cpl"
    replace: "Bitte kopieren Sie den folgenden Link in Ihren Browser:"
    word: true


  - trigger: ":getrx"
    word: true
    replace: |
      Sobald Ihr Rezept ausgestellt wurde, erhalten Sie eine
      Benachrichtigung in Ihrer App.
      Sie müssen die Benachrichtigung dann bestätigen und eine Apotheke
      auswählen, an die das Rezept gesendet werden soll.
      Sie müssen JEDES MAL, wenn Sie ein Rezept erhalten, eine Apotheke auswählen.

  - trigger: ":results"
    word: true
    replace: |
      Sobald Ihre Untersuchungen abgeschlossen sind und die Ergebnisse vorliegen,
      werden wir uns bei Ihnen melden.
      Bei manchen Untersuchungen erfolgt dies innerhalb von 2-3 TAGEN nach
      Abschluss, bei anderen dauert es länger. Manche Bluttests benötigen bis zu
      7 ARBEITSTAGE und MRTs können bis zu 10 ARBEITSTAGE dauern.

      Sie werden unabhängig davon kontaktiert, ob die Ergebnisse eine
      Wiedervorstellung erfordern. Bitte warten Sie, bis wir Sie bezüglich der
      Ergebnisse kontaktiert haben, bevor Sie einen Folgetermin vereinbaren.

      Falls Sie innerhalb von 5 TAGEN nach Abschluss Ihrer Untersuchungen
      keine Benachrichtigung über Ihre Ergebnisse von uns erhalten haben,
      kontaktieren Sie uns bitte:
        E-Mail: {{myemail}}
        Telefon: {{myphone}}

      Sollte sich Ihr Zustand während der Wartezeit auf die Ergebnisse
      wesentlich verändern oder verschlechtern, warten Sie bitte nicht
      auf die Ergebnisse, bevor Sie sich erneut untersuchen lassen. Bitte
      suchen Sie umgehend ärztliche Hilfe auf, falls sich Ihr Zustand deutlich verschlechtert.



