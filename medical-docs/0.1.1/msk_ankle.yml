name: msk_ankle
parent: default

matches:
  - trigger: ":ankle"
    replace:  |
      Subjektiv:
        {{cc}} rechts links Sprunggelenkschmerzen seit DAUER
        Beginn nach MECHANISMUS
        {{sp}} nach der Verletzung gehfähig
        {{sp}} keine Unfähigkeit zur Belastung unmittelbar nach der Verletzung oder aktuell (4 Schritte) (1)
        {{sp}} anhaltende Schmerzen an [Lokalisation]
        {{sp}} keine wesentlichen anhaltenden Schmerzen im Mittelfuß (2)
        {{sp}} keine vorangegangenen Sprunggelenksverstauchungen

      Objektiv:
        {{op}} keine sichtbare Deformität
        {{op}} kein Hämatom
        {{op}} keine Schwellung
        {{op}} keine eingeschränkte Beweglichkeit
        {{op}} keine Sensibilitätsstörung
        {{op}} keine Durchblutungsstörung

        {{op}} kein wesentlicher Druckschmerz am posterioren Rand oder der Spitze des Malleolus lateralis (3)
        {{op}} kein wesentlicher Druckschmerz am posterioren Rand oder der Spitze des Malleolus medialis (4)

        {{op}} kein wesentlicher Druckschmerz am Os naviculare (5)
        {{op}} kein wesentlicher Druckschmerz an der Basis des 5. Metatarsale (6)

        {{op}} kein weiterer wesentlicher Druckschmerz
        {{op}} keine Schmerzen bei passiver sanfter Inversion
        {{op}} keine Schmerzen bei passiver sanfter Eversion
        {{op}} negativer Squeeze-Test
        {{op}} negativer Außenrotationsstresstest
        {{op}} negativer vorderer Schubladentest
        {{op}} negativer Talar-Tilt-Test
        {{op}} negativer Thompson-Test


      Beurteilung:
        {{ap}} rechts links laterale mediale Sprunggelenksdistorsion
        Gemäß den Ottawa Ankle Rules
           Malleolarschmerz mit (1),(3) oder (4)] muss eine Sprunggelenksfraktur ausgeschlossen werden.
        Gemäß den Ottawa Foot Rules
           Mittelfußschmerz mit (1),(5) oder (6)] muss eine Fußfraktur ausgeschlossen werden.

      Plan:
        {{pp}} Röntgen von Sprunggelenk und Fuß durchführen
        {{pp}} Sprunggelenk schonen
        {{pp}} Eis, Kompression und Hochlagerung des Sprunggelenks
        {{pp}} NSAR (z. B. Ibuprofen) zur Schmerzbehandlung
        {{pp}} Physiotherapie zur Unterstützung der Genesung
