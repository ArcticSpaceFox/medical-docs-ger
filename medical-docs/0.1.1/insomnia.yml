name: insomnia
parent: default

matches:
  # Schlafhygiene
  - trigger: ":sleephy"
    word: true
    replace:  |
      {{pp}} Fernseher und Computer aus dem Schlafzimmer entfernen.
      {{pp}} ein zu warmes oder zu kaltes Schlafzimmer vermeiden.
      {{pp}} eine ruhige, dunkle, sichere und angenehme Schlafumgebung aufrechterhalten. Lärm und Licht minimieren
      {{pp}} Bett und Schlafzimmer nur zum Schlafen und für Intimität nutzen.
      {{pp}} Koffein nach dem Mittagessen und Alkohol innerhalb von 6 Stunden vor dem Zubettgehen vermeiden
      {{pp}} Nikotin kurz vor dem Zubettgehen oder in der Nacht vermeiden
      {{pp}} moderate körperliche Aktivität, jedoch intensive Belastung innerhalb von 3 Stunden vor dem Zubettgehen vermeiden
      {{pp}} übermäßige Flüssigkeitszufuhr oder schwere Abendmahlzeiten vor dem Zubettgehen vermeiden
      {{pp}} Wecker verwenden, um jeden Tag zur gleichen Zeit aufzustehen
      {{pp}} nur zu Bett gehen, wenn müde, auch wenn später als geplant.
      {{pp}} aufstehen, wenn innerhalb von 20 Minuten kein Einschlafen möglich ist - in ein anderes Zimmer gehen und entspannen. Erst bei Müdigkeit wieder zu Bett gehen.
      {{pp}} Blick auf die Uhr vermeiden
      {{pp}} übermäßiges Tagschlafen vermeiden - ein kurzes Nickerchen (15-30 Minuten) am frühen Nachmittag kann erholsam und unbedenklich sein.

  # Schlafstörung
  - trigger: ":insomnia"
    word: true
    replace:  |
      Subjektiv:
       {{cc}} Schlafstörung seit DAUER
       {{sp}} keine Einschlafschwierigkeiten
       {{sp}} keine Durchschlafschwierigkeiten
       {{sp}} keine Beeinträchtigung der Tagesfunktion
       {{sp}} keine Bedenken bezüglich Autofahren oder Bedienen schwerer Maschinen
       {{sp}} keine vorangegangenen Behandlungen zur Schlafverbesserung
       {{sp}} kein erkennbarer Auslöser (wie Stress, Reisen, Schichtarbeit, Depression, Angst, Schmerzen)
       {{sp}} kein nächtlicher Husten
       {{sp}} keine Atembeschwerden
       {{sp}} kein nächtliches Wasserlassen
       {{sp}} kein Lärm im Schlafzimmer (z. B. schnarchender Partner)
       {{sp}} keine Schlafstörung durch Kinder oder Haustiere
       {{sp}} keine unangenehme Temperatur im Schlafzimmer
       {{sp}} kein Licht im Schlafzimmer
       {{sp}} keine Bildschirme im Schlafzimmer
       {{sp}} kein Nikotin spät am Tag
       {{sp}} kein Koffein spät am Tag
       {{sp}} kein Alkohol spät am Tag
       {{sp}} letzte Mahlzeit des Tages um XX Uhr
       {{sp}} konstante Zubettgehzeit um XX Uhr (auch am Wochenende)
       {{sp}} konstante Aufstehzeit um XX Uhr (auch am Wochenende)
       {{sp}} Gesamtzeit im Bett von XX Stunden
       {{sp}} Gesamtschlafzeit von XX Stunden

      Beurteilung:
       {{ap}}  primäre Insomnie
       {{ap}}  sekundäre Insomnie aufgrund von XXXX

      Plan:
        {{pp}} Schlaftagebuch führen
        {{pp}} Verweis auf mysleepwell.ca für Strategien zur Schlafverbesserung
        {{pp}} Lektüre von "Say Good Night to Insomnia" für Strategien zur Schlafverbesserung erwägen
        {{pp}} Empfehlungen zur Schlafhygiene befolgen:
        {{sleephy}}
        Überweisung wegen obstruktiver Schlafapnoe erfolgt.
        {{pp}} kurzfristige, intermittierende Anwendung eines pharmakologischen Schlafmittels erwägen
        {{pp}} Wiedervorstellung in 4 Wochen

    vars:
      - name: sleephy
        type: match
        params:
          trigger: ":sleephy"
