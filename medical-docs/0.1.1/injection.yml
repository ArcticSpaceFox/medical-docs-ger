name: injection
parent: default

matches:
  - trigger: ":injcort"
    word: true
    replace: |
      Subjektiv:
        {{cc}} Kortisoninjektion an LOKALISATION

        Risiken und mögliche Komplikationen besprochen, einschließlich
        fehlender Wirkung oder nur sehr kurzfristiger Linderung,
        Blutung und Infektion
        Speziell besprochen: mögliche verstärkte
        Schmerzen in den ersten drei Tagen nach der Injektion
        ("Steroid-Flare")

        Einwilligung eingeholt.

      Objektiv:
        Bereich lokalisiert und markiert.
        Mehrfach mit Chlorhexidin desinfiziert.
        Injektion mit steriler 25-Gauge-1,5-Zoll-Nadel
        Injiziertes Medikament:
          Kenalog 40mg/ml (Charge:  Verfall: ) x 1 ml
          und Lidocain 2% ohne Adrenalin x 3 ml

        Injektion gut vertragen
        Injektionsstelle mit Pflaster abgedeckt
        Keine unmittelbare Komplikation.

      Beurteilung:
        {{ap}} subakromiale Bursitis
        {{ap}} Gonarthrose links

      Plan:
        {{pp}} sofortige Wiedervorstellung bei Verdacht auf Infektion
         (zunehmende Rötung, Schmerzen, Schwellung, Überwärmung nach 3 Tagen)

