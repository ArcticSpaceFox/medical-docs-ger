name: msk_back
parent: default

matches:
  - trigger: ":back"
    replace:  |
      Subjektiv:
        {{cc}} Schmerzen im oberen mittleren unteren Rücken seit [Dauer]

        Warnzeichen:
        {{sp}} keine Harn- oder Stuhlinkontinenz oder Harnverhalt
        {{sp}} keine neue Schwäche in den Beinen
        {{sp}} keine Reithosenanästhesie (Taubheit oder Kribbeln um Genitalien, Gesäß oder Innenschenkel)
        {{sp}} kein unbeabsichtigter Gewichtsverlust
        {{sp}} keine Schmerzverstärkung im Liegen
        {{sp}} kein nächtliches Erwachen durch Rückenschmerzen
        {{sp}} kein ständiges Müdigkeitsgefühl
        {{sp}} keine starken nächtlichen Schweißausbrüche
        {{sp}} kein Fieber
        {{sp}} kein Gefühl, extrem krank zu sein
        {{sp}} keine in den Rücken ausstrahlenden Bauchschmerzen

        {{pain}}

        {{sp}} keine Harnwegssymptome wie Schmerzen beim Wasserlassen, erhöhte Miktionsfrequenz oder Harndrang, Blut im Urin
        {{sp}} keine Nierensteine in der Anamnese
        {{sp}} keine Hodenschmerzen
        {{sp}} keine in die Leiste ausstrahlenden Schmerzen
        {{sp}} kein Verkehrsunfall oder Hochrasanztrauma in der Anamnese
        {{sp}} keine Überlastung wie schweres Heben in der Anamnese

      Objektiv:
        {{op}} deutlicher Distress aufgrund der Rückenschmerzen.
        {{op}} keine paravertebrale Druckschmerzhaftigkeit
        {{op}} keine Überwärmung oder Rötung des Rückens
        {{op}} normale Beweglichkeit des Rückens
        {{op}} normale Beweglichkeit der Hüften
        {{op}} normale Kraft in den unteren Extremitäten
        {{op}} normale Muskeleigenreflexe
        {{op}} normales (negatives) Babinski-Zeichen beidseits
        {{op}} normales Gangbild (einschließlich Zehen- und Fersengang)
        {{op}} normaler (negativer) Lasègue-Test beidseits
        {{op}} normaler (negativer) FABER-Test beidseits

      Beurteilung:
        {{ap}} Mechanischer unterer Rückenschmerz

      Plan:
        {{pp}} Paracetamol, kurzfristig NSAR, topisches Diclofenac, kurzfristig Cyclobenzaprin vor dem Schlafengehen
        {{pp}} Wärmekissen oder Eis zur Symptomlinderung
        {{pp}} aktiv bleiben und Übungen zur Kräftigung und Dehnung des Rückens erlernen.
        {{pp}} Heben mit den Beinen statt mit dem Rücken erlernen.
        {{pp}} langes Sitzen oder Stehen in derselben Position vermeiden.
        {{pp}} auf Auftreten der oben genannten Warnzeichen achten
        {{pp}} ärztliche Hilfe aufsuchen, falls die Schmerzen über 6 Wochen anhalten, sich verschlimmern oder neue Symptome auftreten.

    vars:
      - name: pain
        type: match
        params:
          trigger: ":pain"
