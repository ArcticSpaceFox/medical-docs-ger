name: strep
parent: default

matches:
  - trigger: ":strep"
    word: true
    replace: |
     Subjektiv:
        {{cc}} Halsschmerzen seit XX Tagen
        {{sp}} kein Husten
        {{sp}} kein vorangegangener Streptokokkeninfekt
        {{sp}} kein bekannter Streptokokken-Kontakt
        Die Streptokokken-Angina ist am häufigsten bei unter 15-Jährigen und am seltensten über 45 Jahren.

     Objektiv:
        {{op}} heutige Temperatur von
        {{op}} keine druckschmerzhaften geschwollenen Halslymphknoten (zervikale Lymphadenopathie)
        {{op}} keine Tonsillenschwellung
        {{op}} keine weißen Beläge auf den Tonsillen (Exsudate)

     Beurteilung:
        {{ap}} Akute Streptokokken-Pharyngitis (Streptokokken-Angina)
        {{ap}} Akute virale Pharyngitis
        Etwa 80% der Halsschmerzen sind viraler Genese und bessern sich nicht
        durch Antibiotika, da Antibiotika keine Viren abtöten

     Plan:
        Ein Rachenabstrich wurde zur Abklärung einer bakteriellen Infektion (Streptokokken-Angina) eingesandt
        {{pp}}mit der Einnahme der verordneten Antibiotika warten, bis die Infektion bestätigt ist
        {{pp}}sofort mit der Einnahme der verordneten Antibiotika beginnen
        {{pp}}unterstützende Maßnahmen fortführen (Flüssigkeitszufuhr mit isotonischen Getränken und salzigen Suppen,
              Paracetamol und/oder Ibuprofen bei Schmerzen, Salzwassergurgeln, Ruhe)
        {{pp}}Wiedervorstellung bei Verschlechterung der Symptome innerhalb von 48 Stunden trotz Behandlung
        {{pp}}Notruf 112 wählen oder Notaufnahme aufsuchen bei Atembeschwerden

  - trigger: ":strepphone"
    word: true
    replace: |
      TELEFONKONTAKT

      Grund des Anrufs: Streptokokken-Abstrich positiv

      Notizen:
        Über positiven Streptokokken-Abstrich informiert, Beginn der beim letzten Besuch verordneten Medikation empfohlen.
        Patient/in versteht und ist einverstanden. Dankbar für den Anruf.
        Wird sich bei weiteren Bedenken oder ausbleibender Besserung trotz Behandlung melden.

  - trigger: ":strepscore"
    word: true
    replace: |
      {{sp}} Fieber  (Temperatur >38°C)             (1 Punkt)
      {{sp}} Tonsillenexsudate (weiße Flecken)      (1 Punkt)
      {{sp}} kein Husten                            (1 Punkt)
      {{sp}} geschwollene Halslymphknoten           (1 Punkt)
             (zervikale Lymphadenopathie)
      {{sp}} Alter 3-14 Jahre                       (1 Punkt)
      {{sp}} Alter 15-44 Jahre                      (0 Punkte)
      {{sp}} Alter über 44 Jahre                    (-1 Punkt)

      Interpretation:
        -1, 0, 1 Punkte - Streptokokken-Risiko <10%
            weder Antibiotikum noch Rachenabstrich erforderlich
        2 oder 3 Punkte - Streptokokken-Risiko 15% - 32%
            Rachenabstrich und Antibiotika bei positivem Abstrich
        4 oder 5 Punkte - Streptokokken-Risiko 56%
            Streptokokken-Testung und/oder Abstrich erwägen

