name: rx
parent: default

matches:
  - trigger: ":rxpre"
    word: true
    replace: |
      Sehr geehrte Damen und Herren,

      hiermit wird bestätigt, dass der/die oben genannte Patient/in untersucht wurde und
      aufgrund einer medizinischen Erkrankung von Folgendem profitieren wird:

  - trigger: ":rxpost"
    word: true
    replace: |
      Für Rückfragen oder Klärungsbedarf
      stehe ich Ihnen gerne zur Verfügung.

  - trigger: ":rxcompression"
    word: true
    replace: |
      {{rxpre}}
      Kompressionsstrümpfe für beide unteren Extremitäten

      Druckgradient: 30-40 mmHg
      Diagnose: Varikose
      Anwendung: Aktivitäten des täglichen Lebens (ADL) sowie durchgehend bei der Arbeit
      Dauer: 1 Jahr

      {{rxpost}}

    vars:
      - name: rxpre
        type: match
        params:
          trigger: ":rxpre"
      - name: rxpost
        type: match
        params:
          trigger: ":rxpost"

  - trigger: ":rxorthotic"
    word: true
    replace: |
      {{rxpre}}
      Maßgefertigte Orthesen für beide Füße

      Diagnose: Plantarfasziitis, Pes planus
      Anwendung: Aktivitäten des täglichen Lebens (ADL) sowie durchgehend bei der Arbeit
      Dauer: 1 Jahr

      {{rxpost}}

    vars:
      - name: rxpre
        type: match
        params:
          trigger: ":rxpre"
      - name: rxpost
        type: match
        params:
          trigger: ":rxpost"

  - trigger: ":rxphysio"
    word: true
    replace: |
      {{rxpre}}
      Physiotherapie

      Diagnose: Mechanischer unterer Rückenschmerz

      Details:
      Bitte Untersuchung und Behandlung des unteren Rückenschmerzes

      {{rxpost}}

    vars:
      - name: rxpre
        type: match
        params:
          trigger: ":rxpre"
      - name: rxpost
        type: match
        params:
          trigger: ":rxpost"

  - trigger: ":rxmassage"
    word: true
    replace: |
      {{rxpre}}
      Massagetherapie

      Diagnose: Mechanischer unterer Rückenschmerz

      Details:
      Bitte Untersuchung und Behandlung des unteren Rückenschmerzes

      {{rxpost}}

    vars:
      - name: rxpre
        type: match
        params:
          trigger: ":rxpre"
      - name: rxpost
        type: match
        params:
          trigger: ":rxpost"

  - trigger: ":rxchiro"
    word: true
    replace: |
      {{rxpre}}
      Chiropraktische Behandlung

      Diagnose: Mechanischer unterer Rückenschmerz

      Details:
      Bitte Untersuchung und Behandlung des unteren Rückenschmerzes

      {{rxpost}}

    vars:
      - name: rxpre
        type: match
        params:
          trigger: ":rxpre"
      - name: rxpost
        type: match
        params:
          trigger: ":rxpost"

