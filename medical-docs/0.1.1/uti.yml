name: uti
parent: default

matches:
  - trigger: ":uti"
    word: true
    replace: |
     Subjektiv:
       {{cc}} möglicher Harnwegsinfekt seit XX Tagen
       {{sp}} keine Dysurie
       {{sp}} keine Pollakisurie
       {{sp}} kein Harndrang,
       {{sp}} keine Hämaturie
       {{sp}} kein Fieber
       {{sp}} kein Schüttelfrost
       {{sp}} keine Übelkeit und kein Erbrechen
       {{sp}} keine Flankenschmerzen
       {{sp}} keine Bauchschmerzen

       {{sp}} kein vaginaler Ausfluss
       {{sp}} keine vaginale Blutung
       {{sp}} keine Stuhlveränderungen

       {{sp}} keine Harnwegsinfekte (HWI) in den vergangenen 6 Monaten (und keiner im vergangenen Jahr)
              (rezidivierender HWI definiert als ≥2 Infekte in sechs Monaten oder ≥3 Infekte in einem Jahr)
       {{sp}} keine Antibiotikaeinnahme innerhalb der letzten 4 Wochen
       {{sp}} keine Immunsuppression
       {{sp}} keine Antibiotikaallergien
       {{sp}} keine Schwangerschaft

     Objektiv:
       {{op}} keine suprapubische Druckschmerzhaftigkeit (über der Blase)
       {{op}} kein Klopfschmerz im Nierenlager (über den Nieren)
       {{op}} keine Leukozyten im Urin-Streifentest
       {{op}} keine Nitrite (Stoffwechselprodukt bakterieller Infektion) im Urin-Streifentest

     Beurteilung:
       {{ap}} unkomplizierter Harnwegsinfekt

     Plan:
       {{pp}} vermehrte Flüssigkeitszufuhr
       {{pp}} Beginn des verordneten Antibiotikums: Nitrofurantoin Ciprofloxacin Cotrimoxazol  Fosfomycin Cephalexin
       Eine Urinkultur wurde zur Therapiesteuerung eingesandt, falls sich die Symptome nicht bessern

       {{pp}} auf Symptome einer Nierenbeckenentzündung (Pyelonephritis) achten, einschließlich Fieber, Übelkeit und Rückenschmerzen
       {{pp}} Wiedervorstellung bei Verschlechterung, Persistenz oder neuen Symptomen.

