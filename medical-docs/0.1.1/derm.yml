name: derm
parent: default

matches:
  - trigger: ":hairloss"
    word: true
    replace: |
     Subjektiv:
      {{cc}} Haarausfall an [Lokalisation] seit DAUER

     Objektiv:
      {{op}} glatt begrenzter, umschriebener Bereich mit vollständigem Haarausfall an [Lokalisation]
      {{op}} negativer Haarzugtest.
      {{op}} keine Entzündung oder Vernarbung.

     Beurteilung:
      {{ap}} Alopecia areata.

     Plan:
      Überweisung an die Dermatologie erfolgt

  - trigger: ":skininfection"
    word: true
    replace: |
      Subjektiv:
        {{cc}} möglicher Hautinfekt seit DAUER
        Die Lokalisation ist
        Symptome begannen nach
        {{sp}} kein Fieber (zu Hause gemessene Temperatur XXC)
        {{sp}} keine Übelkeit oder Erbrechen
        {{sp}} kein Durchfall
        {{sp}} keine Schmerzen
        {{sp}} keine Eiterentleerung
        {{sp}} keine Schwellung
        {{sp}} keine Rötung
        {{sp}} keine Überwärmung
        {{sp}} keine Behandlung bisher
        {{sp}} keine Progredienz in den letzten 48 Stunden
        {{sp}} kein proximales Gelenkimplantat oder Gefäßprothese
        {{sp}} keine vorangegangenen Hautinfektionen
        {{sp}} kein Diabetes
        {{sp}} keine Immunsuppression
        {{sp}} keine Risikofaktoren für MRSA (z. B. vorangegangenes MRSA, kürzlicher Krankenhausaufenthalt,
               Pflegeeinrichtung, Hämodialyse, HIV-Infektion,
               fehlendes Ansprechen auf Therapie ohne MRSA-Abdeckung)
        {{sp}} keine Antibiotikaallergien

      Objektiv:
        {{op}} Temperatur von XXC
        {{op}} Blutdruck von XXX/YY und Herzfrequenz von XXX
        Der betroffene Bereich ist lokalisiert an XXXX
        und erstreckt sich XXXXXXX
        {{op}} keine Eiterentleerung
        {{op}} keine Ulzeration
        {{op}} kein Abszess
        {{op}} kein Erythem
        {{op}} keine Überwärmung
        {{op}} keine Druckschmerzhaftigkeit
        {{op}} keine Schwellung
        {{op}} keine Induration
        {{op}} keine klare Abgrenzung der Infektion
        {{op}} kein erhabenes Erythem

      Beurteilung:
        {{ap}} nicht-eitrige Cellulitis
        {{ap}} Erysipel
        {{ap}} Hautabszess
        {{ap}} entzündete intradermale Zyste
        {{ap}} Paronychie
        ohne systemische Merkmale, die eine Hospitalisierung oder parenterale
        Antibiotika erfordern würden, und OHNE Indikation für MRSA-Abdeckung.

      Plan:
        Wundabstrich zur Steuerung der Antibiotikatherapie eingesandt,
        falls unter Initialtherapie keine Besserung eintritt.
        {{pp}} orale Antibiotikatherapie heute wie verordnet beginnen
        {{pp}} Termin zur Inzision und Drainage des Abszesses vereinbaren
        {{pp}} zur Notaufnahme zur parenteralen Antibiotikagabe und ggf. stationärer Aufnahme
        {{pp}} betroffenen Bereich hochgelagert halten
        {{pp}} Wiedervorstellung bei fehlender Besserung nach 72h,
               Verschlechterung trotz 48h Antibiotikatherapie oder neuen systemischen Symptomen (Fieber, Übelkeit)
        {{pp}} bei rascher Progredienz der Rötung, schwerer Übelkeit oder hohem Fieber Notaufnahme aufsuchen

  - trigger: ":eczemamgt"
    word: true
    replace: |
      Pflegeanleitung bei Ekzem:
      1. Baden
        a. Nicht die Häufigkeit, sondern die Dauer ist entscheidend. Zwischen 5-15 Minuten.
        b. Warm – lauwarm/mäßig warm
        c. Nicht trockenreiben – nur trocken tupfen. Etwas Feuchtigkeit auf der Haut belassen

      2. Keine Seife verwenden – nur einmal pro Woche hypoallergene Baby-Waschlotion (z. B. Cetaphil, Cerave, Avène, Aveeno)

      3. Bei Bedarf einer medizinischen Creme (Steroid (Betamethason, Hydrocortison, Mometason etc.) oder Tacrolimus-Basis-Creme (Protopic/Elidel)) – als erste Schicht auftragen.
        a. Steroid muss an aufeinanderfolgenden Tagen angewendet werden, dann bei Kontrolle absetzen
           (nicht intermittierend anwenden).
        b. Maximale Anwendungsdauer 2 Wochen täglich
        c. Nach 2 Wochen Steroidanwendung muss eine Pause von 1-2 Wochen erfolgen
           bevor die Anwendung erneut aufgenommen werden kann.
        d. Tacrolimus-basierte Präparate können bis zur vollständigen Kontrolle unbegrenzt angewendet werden.
        e. Direkte Sonnenexposition unter medizinischen Cremes minimieren.

      4. Feuchtigkeitscremes auftragen (Cerave Creme, Vaseline Creamy, Avène Creme) – Lotionen meiden (enthalten meist Alkohol, der die Haut zusätzlich austrocknet)

      5. Zusätzliche Schicht Vaseline auftragen. Bei Schub anzuwenden und kann auch in der Erhaltungsphase verwendet werden.

      6. Erhaltungstherapie – sobald das Ekzem kontrolliert ist, NIEMALS mit der für Sie am besten wirksamen Feuchtigkeitscreme (z. B. Cerave) aufhören.

      7. DAS RÜCKFALLRISIKO IST SEHR HOCH, WENN SIE DIE ERHALTUNGSTHERAPIE ABSETZEN!

      8. Feuchtigkeit verbessern durch Luftbefeuchter, erhöhte Flüssigkeitszufuhr, gesunde Ernährung (mehr Obst und Gemüse).


  - trigger: ":shingles"
    word: true
    replace: |
      Subjektiv:
        {{cc}} Hautausschlag mit Verdacht auf Gürtelrose seit DAUER
        Die Lokalisation des Ausschlags ist LOKALISATION
        {{sp}} keine Schmerzen
        {{sp}} keine Bläschen
        {{sp}} kein vorangegangener ähnlicher Ausschlag
        {{sp}} keine vorangegangene diagnostizierte Gürtelrose
        {{sp}} keine vorangegangene Gürtelrose-Impfung (Shingrix oder Zostavax)
        {{sp}} keine vorangegangenen Windpocken

      Objektiv:
        {{op}} unilaterale (auf einer Körperseite) multiple Bläschen auf erythematösem Grund an LOKALISATION

      Beurteilung:
        {{ap}} Gürtelrose (Herpes Zoster)

      Plan:
        {{pp}} Valaciclovir für 7 Tage einnehmen (1g dreimal täglich)
        {{pp}} Paracetamol bei Bedarf gegen Schmerzen einnehmen
        {{pp}} Wiedervorstellung bei fehlendem Ansprechen auf die Therapie oder weiteren Beschwerden

  - trigger: ":rxmastitis"
    word: true
    replace: |
      Rezeptur: Mupirocin-Salbe 2% (15g)
                             + Betamethason-Salbe 0,1% (15g)
                             + Miconazol-Puder auf 2%
      Auf betroffene Bereiche zweimal täglich auftragen
      Zur maximalen Absorption nach Möglichkeit mit Frischhaltefolie umwickeln




