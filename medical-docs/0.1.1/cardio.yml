name: cardio
parent: default

matches:
  - trigger: ":cp"
    replace: "Brustschmerzen"
    propagate_case: true
    word: true

  - trigger: ":chestpain"
    word: true
    replace: |
      Subjektiv:
        {{cc}} Brustschmerzen seit DAUER
        {{pain}}
        {{sp}} keine Belastungsabhängigkeit
        {{sp}} keine Verstärkung bei tiefer Einatmung
        {{sp}} keine Atemnot
        {{sp}} keine Übelkeit
        {{sp}} kein Schwitzen
        {{sp}} keine vorangegangenen ähnlichen Episoden


      Objektiv:
        {{op}} Blutdruck von
        {{op}} Herzfrequenz von
        {{op}} kein Distress
        {{op}} keine vermehrte Atemarbeit
        {{op}} normale Herztöne (S1/S2) ohne Herzgeräusche oder zusätzliche Herztöne
        {{op}} normaler regelmäßiger Herzrhythmus
        {{op}} gutes Atemgeräusch beidseits, keine pathologischen Nebengeräusche
        {{op}} keine Druckschmerzhaftigkeit der Thoraxwand
        {{op}} kein Hautausschlag
        {{op}} keine Schwellung (Ödem) der Unterschenkel
        {{op}} keine Druckschmerzhaftigkeit oder Rötung der Unterschenkel
               (kein Verdacht auf Thrombose (tiefe Beinvenenthrombose))

      Beurteilung:
        {{ap}} nicht-kardiale Brustschmerzen, nicht herz- oder lungenbedingt,
               am ehesten von der Thoraxwand ausgehend

      Plan:
        {{pp}} Analgesie (z. B. Ibuprofen oder Paracetamol) zur Schmerzlinderung
        {{pp}} Medikation zur Kontrolle des Säurerefluxes (GERD)
               wie verordnet einnehmen
        {{pp}} Wiedervorstellung in 2 Wochen, falls Schmerzen nicht rückläufig
        {{pp}} bei anhaltenden Schmerzen oder Atemnot sofortige ärztliche Notfallversorgung aufsuchen

    vars:
      - name: pain
        type: match
        params:
          trigger: ":pain"

  # Ursachen von tachykarden oder bradykarden Arrhythmien (6H und 5T)
  - trigger: ":arcause"
    word: true
    replace: |
      Hypoxie
      Hypothermie
      Hypovolämie
      Hypoglykämie
      Hydrogenionen (Azidose)
      Hypo-/Hyperkaliämie

      Trauma (erhöhter intrakranieller Druck, Hypovolämie)
      Thrombose (pulmonal oder koronar)
      Tamponade (kardial)
      Spannungspneumothorax
      Toxine

  - trigger: ":wellsdvt"
    word: true
    replace: |
      Wells-Score für tiefe Beinvenenthrombose (TVT):
        Aktive Malignität (letzte 6 Monate)               1
        Immobilisation mind. 3 Tage ODER
        Operation in den letzten 12 Wochen                 1
        Immobilisation der unteren Extremität               1
        Lokalisierter Druckschmerz entlang der tiefen Venen  1
        Gesamtes Bein geschwollen                           1
        Wadenumfang >=3 cm größer als Gegenseite            1
        Eindrückbares Ödem, auf symptomatische Seite begrenzt 1
        Kollaterale oberflächliche Venen                    1
        Vorbekannte TVT                                     1
        Andere Diagnose mindestens ebenso wahrscheinlich   -2

      Score >=3 spricht für hohe Wahrscheinlichkeit einer TVT

  - trigger: ":wellspe"
    word: true
    replace: |
      Wells-Score für Lungenembolie (LE):
        Klinische Zeichen und Symptome einer TVT   3
        Andere Diagnose weniger wahrscheinlich als LE  3
        Herzfrequenz >100                          1.5
        Vorangegangene LE oder TVT (gesichert)      1.5
        Immobilisation mind. 3 Tage ODER
        Operation in den letzten 4 Wochen           1.5
        Hämoptyse (Blut husten)                     1
        Aktive Malignität (letzte 6 Monate)         1

      Score <=4: D-Dimer bestimmen, bei negativem Ergebnis Diagnostik beenden
      Score >=5: CT-Angiografie (CTPA) oder Ventilations-/Perfusionsszintigraphie durchführen

  - trigger: ":perc"
    word: true
    replace: |
      PERC-Kriterien zum Ausschluss einer Lungenembolie (LE):
        Bei einer Vortestwahrscheinlichkeit für LE unter 15% und
        Erfüllung aller folgenden Kriterien ist keine weitere Diagnostik erforderlich

        {{sp}} Alter <50
        {{sp}} Puls <100/min
        {{sp}} Sauerstoffsättigung >=95%
        {{sp}} kein Bluthusten (Hämoptyse)
        {{sp}} keine Östrogeneinnahme (orale Kontrazeption oder Hormonersatztherapie)
        {{sp}} keine Operation oder Trauma mit Allgemeinanästhesie in den letzten 4 Wochen
        {{sp}} keine vorangegangenen Blutgerinnsel (venöse Thromboembolie)
        {{sp}} keine einseitige Beinschwellung
