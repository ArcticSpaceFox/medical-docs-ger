name: excision
parent: default

matches:
  - trigger: ":excision"
    word: true
    replace: |
      Subjektiv:
        {{cc}} Exzision einer Hautveränderung an LOKALISATION
        {{sp}} seit DAUER bemerkt
        {{sp}} kein Wachstum
        {{sp}} keine Farbveränderung
        {{sp}} keine Blutung
        {{sp}} keine Schmerzen
        {{sp}} kein Juckreiz

        {{sp}} keine spezifischen Bedenken
        {{sp}} spezifische Bedenken einschließlich:

        {{sp}} keine persönliche Vorgeschichte von Hautkrebs
        {{sp}} keine Familienanamnese von Hautkrebs

        Risiken und mögliche Komplikationen wurden besprochen
           einschließlich Blutung, Infektion, Narbenbildung, erneutes Wachstum
        Alternativen wurden besprochen einschließlich Verzicht auf Intervention
        Erwartete Vorteile umfassen Entfernung einer besorgniserregenden
        Veränderung und Diagnosestellung zur Steuerung der weiteren Behandlung
        Einwilligung eingeholt

      Objektiv:
        Desinfektion mit Alkohol 3-mal
        gefolgt von lokaler Infiltration mit Lidocain mit Adrenalin
        Bereich anschließend mit Chlorhexidin 3-mal desinfiziert
        und steril abgedeckt
        Exzision mit sterilem chirurgischem Skalpell durchgeführt
        Blutstillung erfolgt
        Inzision mit sterilem chirurgischem Nahtmaterial vernäht
           (Nylon 3-0 x 5)
        Bereich gereinigt und verbunden
        Exzidiertes Gewebe zur Pathologie eingesandt

      Beurteilung:
        {{ap}} atypischer melanozytärer Nävus
        {{ap}} irritierte seborrhoische Keratose
        {{ap}} irritiertes Fibroma pendulans

      Plan:
        {{pp}} Ergebnis der pathologischen Untersuchung abwarten
        {{pp}} für die nächsten 24 Stunden abgedeckt und trocken halten
        {{pp}} Polysporin zur Feuchthaltung auftragen
        {{pp}} mit Verband abgedeckt halten, täglich wechseln
               oder früher bei Durchbluten
        {{pp}} Wiedervorstellung zur Nahtentfernung in 7 Tagen
        {{pp}} frühere Wiedervorstellung bei Verdacht auf Infektion,
           z. B. zunehmende Schmerzen, Rötung, Überwärmung, Schwellung oder Eiter
