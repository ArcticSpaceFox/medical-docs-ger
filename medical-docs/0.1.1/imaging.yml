name: imaging
parent: default

matches:
  - trigger: "rtg"
    replace: "Röntgen"
    propagate_case: true
    word: true

  - trigger: "trtg"
    replace: "Röntgen-Thorax"
    propagate_case: true
    word: true

  - trigger: "u/s"
    replace: "Ultraschall"
    propagate_case: true
    word: true

  - trigger: "mammo"
    replace: "Mammographie"
    propagate_case: true
    word: true

  - trigger: "bmd"
    replace: "Knochenmineraldichte"
    propagate_case: true
    word: true

  - trigger: "fit test"
    replace: "FIT-Test (Darmkrebs-Screening)"
    word: true
