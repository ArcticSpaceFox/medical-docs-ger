name: driver
parent: default

matches:
  - trigger: ":driver"
    word: true
    replace: |
      Subjektiv:
        {{cc}} ärztliche Untersuchung für Führerschein
        Erforderliche Führerscheinklasse:
          Klasse 1 : Berufliche Fahrerlaubnis für alle Fahrzeuge
          Klasse 2 : Berufliche Fahrerlaubnis für Busse
          Klasse 3 : Fahrzeuge mit 3 oder mehr Achsen - Lkw
          Klasse 4 : Berufliche Fahrerlaubnis für Taxi, Krankenwagen, Kleinbus
          Klasse 5 : Standard-Führerschein für Pkw, leichte Lkw, Wohnmobile
          Klasse 6 : Motorräder und Mopeds

        {{sp}} keine Bedenken bezüglich des Fahrens
        {{sp}} keine Sehstörungen
        {{sp}} keine Schwierigkeiten, Fernseher, Telefon oder Sprache in einem vollen Raum zu verstehen.
        {{sp}} keine Bewegungseinschränkung von Nacken, Schultern, Ellenbogen, Handgelenken oder Sprunggelenken
        {{sp}} keine ischämische Herzerkrankung in der Anamnese (Angina, Herzinfarkt)
        {{sp}} kein Diabetes mellitus in der Anamnese
        {{sp}} keine Unterzuckerung (Hypoglykämie) in der Anamnese
        {{sp}} keine transitorische ischämische Attacke oder Bewusstlosigkeit in der Anamnese.
        {{sp}} keine Krampfanfälle im vergangenen Jahr.
        {{sp}} keine Verkehrsverstöße, Unfälle oder Beinaheunfälle im vergangenen Jahr

      Objektiv:
        {{op}} normale Beweglichkeit von Nacken, Schultern, Ellenbogen, Handgelenken, Fingern und Sprunggelenken.
        {{op}} normale Kraft (5/5) durchgehend einschließlich Handgriffkraft
        {{op}} keine abdominellen Pulsationen
        {{op}} normale Herztöne (S1/S2)
        {{op}} keine zusätzlichen Herztöne
        {{op}} keine Herzgeräusche
        {{op}} gutes Atemgeräusch beidseits
        {{op}} keine pathologischen Atemgeräusche

      Beurteilung:
        {{ap}} keine Bedenken bezüglich der medizinischen Fahrtauglichkeit

      Plan:
        Formular ausgefüllt und ausgehändigt
        {{pp}} Wiedervorstellung nach Bedarf
