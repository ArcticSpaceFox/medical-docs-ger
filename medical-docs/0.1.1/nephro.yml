name: nephro
parent: default

matches:
  - trigger: ":ksprevent"
    word: true
    replace:  |
      Strategien zur Vorbeugung von Nierensteinen

      Ernährung
      Flüssigkeitszufuhr erhöhen (2,5-3L/Tag, um >2L Urin pro Tag zu erzeugen)
      Zitronensäurehaltige Früchte oder Getränke wie Zitronensaft/Orangensaft vermehrt konsumieren
      Salzzufuhr reduzieren (<2300mg Natrium/Tag)
      Phosphorsäurehaltige Softdrinks (Cola) minimieren
      Tierisches Eiweiß auf <=2 Mahlzeiten pro Tag begrenzen, jeweils weniger als 170-230g
      Oxalatreiche Lebensmittel wie Spinat und Rhabarber begrenzen

      Bewegung:
      Moderate Bewegung und Gewichtsreduktion.

      Nahrungsergänzung:
      Vitamin B6 zur Unterstützung des Oxalatstoffwechsels
      Fischölpräparat (möglicher Nutzen)
      Vitamin C auf < 1000mg/Tag begrenzen

