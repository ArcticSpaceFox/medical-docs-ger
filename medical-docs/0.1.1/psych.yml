name: psych
parent: default

matches:
  - trigger: ":mse"
    word: true
    replace: |
      Psychopathologischer Befund:
        {{op}} legere Kleidung, unauffällige Körperpflege und Hygiene
        {{op}} ruhig und kooperativ
        {{op}} keine ungewöhnlichen Bewegungen oder psychomotorischen Auffälligkeiten
        {{op}} normale Sprechgeschwindigkeit, -tonlage und -lautstärke, kein Rededrang
        {{op}} unauffälliger Affekt
        {{op}} angegebene Stimmung ausgeglichen (euthym)
        {{op}} zielgerichteter und logischer Gedankengang
        {{op}} Gedankeninhalt frei von Wahn und fixen Ideen
        {{op}} keine suizidalen oder fremdaggressiven Gedanken
        {{op}} keine Halluzinationen während des Gesprächs
        {{op}} Orientierung zu Zeit, Ort und Person erhalten
        {{op}} unauffälliges Gedächtnis und unauffällige Aufmerksamkeit
        {{op}} gute Einsichts- und Urteilsfähigkeit

  - trigger: ":psylink"
    word: true
    replace: |
      {{pp}} Verweis auf folgende Links:

      https://psychhealthandsafety.org/asw
      https://cmha.bc.ca/
      https://moodgym.com.au/
      https://www.anxietycanada.com/
      https://bouncebackbc.ca/
      https://www.keltyskey.com/

  # einige Links speziell zu Beratungsangeboten in British Columbia
  - trigger: ":psylinkbc"
    word: true
    replace: |
      {{pp}} siehe untenstehende Links zur Vermittlung einer Beratungsgruppe oder eines Therapeuten.
      Einzeltherapie ist in der Regel selbst zu bezahlen, eine ärztliche Überweisung ist nicht erforderlich.
      Vancouver Coastal Health bietet kostenlose Gruppentherapie an, hierfür ist eine ärztliche Überweisung erforderlich.

      https://counsellingbc.com/
      https://www.psychologists.bc.ca/find_psychologist
      https://divisionsbc.ca/sites/default/files/inline-files/NEW_2019%20-%2003%20-%20CBT%20BROCHURE%20FOR%20PATIENTS%20%28HOME%20PRINTER%29.pdf

  - trigger: ":psymed"
    word: true
    replace: |
      Medikamente können bei Angst und Depression manchmal hilfreich sein.
      Um wirksam zu sein, müssen sie einmal täglich, jeden Tag eingenommen werden.
      Bis zu einem spürbaren Effekt vergehen üblicherweise mehrere Wochen.
      Sie werden in der Regel für mindestens 9 bis 12 Monate fortgeführt.
      Häufigere Nebenwirkungen sind Übelkeit, Kopfschmerzen, Schlafstörungen,
      sexuelle Funktionsstörungen, Schwitzen und Mundtrockenheit.
      Zu Beginn kann es zu einer vorübergehenden Zunahme der Angst kommen,
      selten auch zu vermehrten suizidalen Gedanken.
      Bei zunehmenden suizidalen Gedanken ist es wichtig, umgehend Hilfe zu suchen.

  - trigger: ":risksuicide"
    word: true
    replace: |
      {{sp}} kein männliches Geschlecht
      {{sp}} kein Alter über 60 oder unter 18
      {{sp}} keine Depression
      {{sp}} keine vorangegangenen Suizidversuche
      {{sp}} kein Alkoholmissbrauch
      {{sp}} kein Verlust des rationalen Denkens
      {{sp}} kein Suizid in der Familie
      {{sp}} kein konkreter Plan
      {{sp}} kein Mangel an sozialer Unterstützung
      {{sp}} keine schwere Erkrankung oder therapierefraktäre Schmerzen

  - trigger: ":sxgad"
    word: true
    replace: |
      {{sp}} kein Gefühl der geistigen Leere
      {{sp}} keine vermehrte Erschöpfung
      {{sp}} keine Schlafstörung
      {{sp}} kein Gefühl starker Erregung oder Nervosität
      {{sp}} keine vermehrte Reizbarkeit
      {{sp}} keine vermehrte Muskelspannung

  - trigger: ":sxpanic"
    word: true
    replace: |
      {{sp}} kein Schwitzen
      {{sp}} kein Zittern
      {{sp}} keine Unsicherheit/Schwankschwindel
      {{sp}} keine Derealisation
      {{sp}} keine erhöhte Herzfrequenz
      {{sp}} keine Übelkeit
      {{sp}} kein Kribbeln
      {{sp}} keine Atemnot
      Die Symptome erreichen üblicherweise innerhalb von 10 Minuten ihr Maximum.


  - trigger: ":sxmdd"
    word: true
    replace: |
      {{sp}} keine gedrückte Stimmung
      {{sp}} keine Schlafstörung
      {{sp}} kein vermindertes Interesse oder verminderte Freude an Aktivitäten
      {{sp}} keine Schuldgefühle oder Selbstvorwürfe
      {{sp}} kein Energieverlust und keine Erschöpfung
      {{sp}} keine Konzentrationsprobleme
      {{sp}} keine Appetitveränderung
      {{sp}} keine sehr langsamen Bewegungen und kein sehr langsames Sprechen, oder deutlich mehr Bewegung als üblich
      {{sp}} keine suizidalen Gedanken

  - trigger: ":sxmania"
    word: true
    replace: |
      {{sp}} keine vermehrte Ablenkbarkeit
      {{sp}} keine vermehrte Impulsivität
      {{sp}} kein Größenwahn
      {{sp}} kein Gedankenrasen
      {{sp}} keine vermehrten zielgerichteten Aktivitäten
      {{sp}} kein vermindertes Schlafbedürfnis
      {{sp}} keine vermehrte Gesprächigkeit

  - trigger: ":sessri"
    word: true
    replace: |
      Häufige Nebenwirkungen selektiver Serotonin-Wiederaufnahmehemmer (SSRI)
      als Antidepressiva umfassen Übelkeit, Angst, Schlaflosigkeit,
      Unruhe, Tremor, Kopfschmerzen und sexuelle Funktionsstörungen

  - trigger: ":phq9"
    word: true
    replace: |
      Gesundheitsfragebogen für Patienten (PHQ-9)

      Wie oft fühlten Sie sich im Verlauf der letzten 2 Wochen durch die folgenden
      Beschwerden beeinträchtigt?
            0 = Überhaupt nicht
            1 = An einzelnen Tagen
            2 = An mehr als der Hälfte der Tage
            3 = Beinahe jeden Tag

      1. Wenig Interesse oder Freude an Ihren Tätigkeiten 0 1 2 3

      2. Niedergeschlagenheit, Schwermut oder Hoffnungslosigkeit 0 1 2 3

      3. Schwierigkeiten ein- oder durchzuschlafen, oder übermäßiges Schlafbedürfnis 0 1 2 3

      4. Müdigkeit oder Gefühl, keine Energie zu haben 0 1 2 3

      5. Verminderter Appetit oder übermäßiges Bedürfnis zu essen 0 1 2 3

      6. Schlechte Meinung von sich selbst – Gefühl, ein Versager zu sein oder
      die Familie enttäuscht zu haben 0 1 2 3

      7. Schwierigkeiten, sich auf etwas zu konzentrieren, z. B. beim Zeitungslesen
      oder Fernsehen 0 1 2 3

      8. So langsame Bewegungen oder Sprache, dass es anderen aufgefallen sein könnte?
      Oder im Gegenteil – so nervös oder zappelig, dass Sie
      erheblich mehr umhergegangen sind als üblich  0 1 2 3

      9. Gedanken, dass Sie lieber tot wären oder sich in irgendeiner Weise
      selbst verletzen möchten 0 1 2 3

  - trigger: ":gad7"
    word: true
    replace: |
      Generalisierte Angststörung 7-Item-Skala (GAD-7)

      Wie oft fühlten Sie sich im Verlauf der letzten 2 Wochen durch die folgenden
      Beschwerden beeinträchtigt?
            0 = Überhaupt nicht
            1 = An einzelnen Tagen
            2 = An mehr als der Hälfte der Tage
            3 = Beinahe jeden Tag


      1. Nervosität, Ängstlichkeit oder Anspannung 0 1 2 3

      2. Unfähigkeit, Sorgen zu stoppen oder zu kontrollieren 0 1 2 3

      3. Übermäßige Sorgen bezüglich verschiedener Dinge 0 1 2 3

      4. Schwierigkeiten zu entspannen 0 1 2 3

      5. Derartige Unruhe, dass Stillsitzen schwerfällt 0 1 2 3

      6. Leichte Reizbarkeit oder Verärgerung 0 1 2 3

      7. Gefühl der Angst, als könnte etwas Schreckliches passieren 0 1 2 3

      Falls Sie eine der Beschwerden angekreuzt haben: Wie sehr haben diese Beschwerden
      Ihre Arbeit, häuslichen Aufgaben oder den Umgang mit anderen Menschen erschwert?
      Überhaupt nicht erschwert __________
      Etwas erschwert _________
      Stark erschwert _____________
      Äußerst stark erschwert _________

  - trigger: ":cage"
    word: true
    replace: |
      Hatten Sie jemals das Gefühl, Ihren Alkoholkonsum einschränken zu sollen?
      Fühlen Sie sich durch Kritik an Ihrem Alkoholkonsum verärgert?
      Haben Sie Schuldgefühle wegen Ihres Alkoholkonsums?
      Benötigen Sie morgens gelegentlich einen Drink, um die Nerven zu beruhigen?

      Score >=2 spricht für weitere Abklärungsbedürftigkeit

  - trigger: ":sxetohwd"
    word: true
    replace: |
      Symptome des Alkoholentzugs
      Stadium 1:
        {{sp}} kein Tremor
        {{sp}} kein Schwitzen
        {{sp}} keine Appetitlosigkeit
        {{sp}} kein Durchfall
        {{sp}} keine Unruhe
      Stadium 2:
        {{sp}} keine Halluzinationen
      Stadium 3:
        {{sp}} keine Krampfanfälle
      Stadium 4: (Delirium tremens)
        {{sp}} keine schwere Verwirrtheit, Desorientierung
        {{sp}} keine abnorm schnelle Herzfrequenz (Tachykardie)
        {{sp}} kein Bluthochdruck (Hypertonie)
        {{sp}} kein Fieber

