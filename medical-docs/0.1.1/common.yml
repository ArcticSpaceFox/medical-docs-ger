  - trigger: ":life"
    word: true
    replace: |
      {{pp}} feste Zubettgeh- und Aufstehzeiten einhalten, auch an freien Tagen
      {{pp}} regelmäßige Mahlzeiten mit abwechslungsreicher, unverarbeiteter Kost
      {{pp}} regelmäßige körperliche Bewegung, mindestens 30 Minuten täglich an 5 Tagen pro Woche
      {{pp}} Substanzkonsum, einschließlich Alkohol, reduzieren oder vermeiden
      Leitlinien empfehlen maximal 2 Getränke/Tag und 10 Getränke/Woche für Frauen sowie 3 Getränke/Tag und 15 Getränke/Woche für Männer.
      {{pp}} Hobbys weiter nachgehen
      {{pp}} Zeit in Freundschaften und soziale Kontakte investieren
      {{pp}} Verbindung zu Spiritualität und persönlichen Werten aufrechterhalten

  - trigger: ":snet"
    word: true
    replace: |
      {{pp}} Wiedervorstellung vereinbaren bei Verschlechterung oder neuen Symptomen


