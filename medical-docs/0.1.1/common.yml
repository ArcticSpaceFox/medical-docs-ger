    replace: "{{mytime}} Angerufen, aber keine Antwort. Nachricht auf Mailbox hinterlassen, Praxis zurückzurufen, sobald verfügbar."
    word: true
    vars:
      - name: mytime
        type: date
        params:
          format: "%H:%M"

  - trigger: ":pain"
    replace: |
      Der Schmerz ist lokalisiert in
        und strahlt aus nach
        Der Schmerz ist begleitet von Übelkeit Erbrechen Schwitzen Atemnot
        Er besteht seit
        und begann als
        Die Symptome werden besser  bleiben gleich  werden schlechter
        Er ist konstant intermittierend
        Der Schmerz ist morgens  abends  ganztägig gleich stärker
        Er tritt gewöhnlich etwa X mal täglich auf
        Wenn er auftritt, dauert jede Episode
        Der Schmerzcharakter ist
        Die Intensität beträgt X von 10 (wobei 10 der schlimmste vorstellbare Schmerz ist)
        Der Schmerz verschlimmert sich bei
        Der Schmerz bessert sich bei
        Bisher versuchte Behandlungen umfassen

  - trigger: ":PQRST"
    word: true
    replace: |
      Provokation, Linderung - Was löst den Schmerz aus?
                   Was macht ihn besser oder schlechter?
      Qualität - Wie fühlt er sich genau an? (stechend, dumpf, scharf, brennend, drückend)
      Radiation - Ist der Schmerz umschrieben oder strahlt er aus?
      Schwere - Wie stark ist er? (Skala 1 - 10)
                 Wie stark beeinträchtigt er Ihr Leben?
      Zeitverlauf - Ist er ständig vorhanden oder kommt und geht er?
               Wann beginnt er und wie lange hält er an?
               Wann war die letzte Schmerzmedikation?

  - trigger: ":OLDCARTS"
    word: true
    replace: |
      Beginn:
      Lokalisation:
      Dauer:
      Charakter:
      Verstärkende Faktoren:
      Lindernde Faktoren:
      Versuchte Therapien:
      Schwere:

  - trigger: ":SOCRATES"
    word: true
    replace: |
      Sitz:
      Beginn (Onset):
      Charakter:
      Ausstrahlung:
      Begleitsymptome:
      Zeit/Dauer:
      Verstärkende/lindernde Faktoren:
      Schwere:


  - trigger: ":refill"
    word: true
    replace: |
      Subjektiv:
        {{cc}} benötigt Verlängerung eines zuvor verordneten Medikaments: MEDIKAMENT
        welches verordnet ist bei INDIKATION
        seit etwa DAUER

        {{sp}} keine Bedenken bezüglich der Wirksamkeit
        {{sp}} keine Bedenken bezüglich Nebenwirkungen
      Plan:
        Rezept zur Fortführung der Anwendung von MEDIKAMENT ausgestellt
        {{pp}} Medikation weiter wie verordnet einnehmen
        {{pp}} Wiedervorstellung bei Ihrem Hausarzt

  - trigger: ":sicknote"
    word: true
    replace: |
      Sehr geehrte Damen und Herren,

      der/die oben genannte Patient/in wurde in meiner Praxis untersucht und beurteilt.
      Dem/der Patienten/in wird empfohlen, folgender Arbeit  Schule fernzubleiben am:

      {{mydate}}

      Für Rückfragen stehe ich Ihnen gerne zur Verfügung.

      Vielen Dank.

    vars:
      - name: mydate
        type: date
        params:
          format: "%d. %B %Y"




