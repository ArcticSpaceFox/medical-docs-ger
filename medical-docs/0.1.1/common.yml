name: common
parent: default

matches:
  - trigger: "S:"
    replace: "Subjektiv:"
    word: true
  - trigger: "O:"
    replace: "Objektiv:"
    word: true
  - trigger: "A:"
    replace: "Beurteilung:"
    word: true
  - trigger: "P:"
    replace: "Plan:"
    word: true

  - trigger: ":SOAP"
    word: true
    replace: |
      Subjektiv:
      Objektiv:
      Beurteilung:
      Plan:

      Beginnzeit: {{mytime}}
      Endzeit:
    vars:
      - name: mytime
        type: date
        params:
          format: "%H:%M"

  - trigger: ":FIFE"
    word: true
    replace: |
      Gefühle: Was bereitet Ihnen die größten Sorgen? Konkrete Ängste oder Bedenken?
      Vorstellungen: Was, denken Sie, könnte dahinterstecken?
      Funktion: Wie hat sich das auf Ihren Alltag ausgewirkt? Worauf mussten Sie verzichten?
      Erwartungen: Was erwarten oder erhoffen Sie sich heute von mir?

