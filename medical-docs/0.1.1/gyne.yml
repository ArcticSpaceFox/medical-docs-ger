name: gyne
parent: default

matches:
  - trigger: ":ocp"
    word: true
    replace: |
      Subjektiv:
        {{cc}} Rezept für orales Kontrazeptivum

        {{sp}} derzeit keine Kontrazeption

        {{sp}} keine Lebererkrankung
        {{sp}} keine Migräne
        {{sp}} keine vorangegangene Krebsdiagnose
        {{sp}} keine Brustveränderungen
        {{sp}} keine Gerinnungsstörungen
        {{sp}} kein Tabakkonsum

        {{sp}} letzte Menstruation am DATUM
        {{sp}} regelmäßige Menstruation
        {{sp}} kein erhöhtes Risiko für sexuell übertragbare Infektionen (STI)
        {{sp}} letztes STI-Screening vor DAUER
        {{sp}} derzeit kein Bedarf für Schwangerschaftstest

      Objektiv:
        {{op}} aktueller Blutdruck von SBP/DBP

      Beurteilung:
        {{ap}} Indikation zur fortlaufenden hormonellen Kontrazeption
        ohne Kontraindikationen

      Plan:
        {{pp}} Fortführung des zuvor verordneten oralen Kontrazeptivums
        Rezept ausgestellt für XXX

        {{pp}} folgende Links für weitere Informationen nutzen:
        https://www.sexandu.ca/
        https://www.plannedparenthood.org/learn/birth-control

        {{pp}} folgende Links bei vergessener Einnahme nutzen:
        https://www.sexandu.ca/sos/
        https://www.plannedparenthood.org/online-tools/missed-birth-control-pill

        {{pp}} Wiedervorstellung bei weiteren Bedenken oder Fragen


  - trigger: ":ffertility"
    word: true
    replace: |
      Subjektiv:
        {{cc}} unerfüllter Kinderwunsch seit DAUER

        Menstruationsanamnese:
          {{sp}} Menarche im Alter von XX Jahren
          {{sp}} unregelmäßige Menstruationszyklen zwischen XX und YY Tagen
          {{sp}} regelmäßige Menstruationszyklen alle XX Tage
          {{sp}} Menstruationsblutung dauert XX Tage

        Schwangerschaftsanamnese:
          {{sp}} keine vorangegangenen Schwangerschaften
          {{sp}} keine vorangegangenen Schwangerschaften mit aktuellem Partner

        {{sp}} Geschlechtsverkehr jeden zweiten Tag
        um den Zeitpunkt des Eisprungs herum
        {{sp}} Zeitpunkt des Eisprungs mittels Ovulationstests verifiziert

        {{sp}} keine Laktation
        {{sp}} kein Mamillensekret
        {{sp}} Symptome eines PCOS (abnormaler Haarwuchs, tiefe Stimme,
               Akne, unregelmäßige Menstruation)
        {{sp}} Symptome einer Endometriose (starke Menstruationsbeschwerden,
               Schmerzen beim Geschlechtsverkehr, übermäßige oder unregelmäßige Blutung)
        {{sp}} keine Symptome einer Hypothyreose:
          {{hitsh}}

        {{sp}} keine entzündliche Beckenerkrankung (PID) in der Anamnese
        {{sp}} kein polyzystisches Ovarialsyndrom (PCOS) in der Anamnese
        {{sp}} keine Becken-Operation in der Anamnese
        {{sp}} keine Becken-Bestrahlung in der Anamnese
        {{sp}} keine Kürettage (D&C) in der Anamnese

        {{sp}} keine vorangegangenen Untersuchungen oder Behandlungen

      Beurteilung:
        {{ap}} primäre Infertilität der Frau

      Plan:
        {{pp}} weitere Untersuchungen durchführen, einschließlich:
          Blutbild, TSH, Prolaktin, FSH, LH, Progesteron, Testosteron, DHEA
        {{pp}} Wiedervorstellung, sobald Ergebnisse vorliegen
        Überweisung an Kinderwunschklinik zur weiteren Abklärung erfolgt
    vars:
      - name: hitsh
        type: match
        params:
          trigger: ":hitsh"

