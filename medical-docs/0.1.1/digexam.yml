name: digexam
parent: default

matches:
  - trigger: ":depain"
    word: true
    replace: |
      {{op}} kein Erscheinungsbild von Distress
      {{op}} normale Wachheit
      {{op}} normale Mobilisationsfähigkeit
      {{op}} normale Fähigkeit, zur Toilette zu mobilisieren

  - trigger: ":demental"
    word: true
    replace: |
      {{op}} normaler Blickkontakt
      {{op}} normales Verhalten
      {{op}} normaler Affekt
      {{op}} normales Erscheinungsbild und Körperpflege
      {{op}} normales Erscheinungsbild der Umgebung
      {{op}} normale Interaktion mit anderen

  - trigger: ":depeds"
    word: true
    replace: |
      {{op}} normale Wachheit
      {{op}} normales Spielverhalten
      {{op}} normales Interesse an der Umgebung
      {{op}} kein erkennbares Unbehagen beim Blick in Licht
      {{op}} normale Atemfrequenz
      {{op}} keine vermehrte Atemarbeit
      {{op}} normale Hautfarbe
      {{op}} keine Schwierigkeiten beim Aufblicken (kein Meningismus)

  - trigger: ":deresp"
    word: true
    replace: |
      {{op}} normale Fähigkeit, in ganzen Sätzen zu sprechen
      {{op}} normale Atemfrequenz
      {{op}} normaler Atemrhythmus
      {{op}} normale Hautfarbe
      {{op}} keine vermehrte Atemarbeit
             (keine Nutzung der Atemhilfsmuskulatur, kein Trachealzug,
             keine sub-/interkostalen Einziehungen)

  - trigger: ":deabdo"
    word: true
    replace: |
      {{op}} normale Fähigkeit, auf und ab zu hüpfen
      {{op}} kein erkennbarer Schmerz bei Husten oder Niesen
      {{op}} normale Fähigkeit, den eigenen Bauch zu drücken
