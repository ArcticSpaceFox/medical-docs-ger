name: flu
parent: default

matches:
  - trigger: ":fluvac"
    word: true
    replace: |
      Subjektiv:
        {{cc}} jährliche Grippeimpfung
        {{sp}} keine vorangegangenen Grippeimpfungen
        {{sp}} keine vorangegangene Reaktion auf frühere Grippeimpfungen
        {{sp}} keine Allergie gegen Eier, Latex oder Neomycin.
        {{sp}} keine kürzliche Erkrankung
        Nutzen und mögliche Nebenwirkungen besprochen

      Objektiv:
        Impfstoff intramuskulär verabreicht
        in den linken Deltamuskel unter aseptischer Technik mit
        25-Gauge-1-Zoll-Nadel
        Injektion gut vertragen
        Charge und Verfallsdatum in Akte vermerkt

      Beurteilung:
        {{ap}} Indikation zur regelmäßigen Grippeimpfung

      Plan:
        {{pp}} 15 Minuten im Wartezimmer warten, um eine
        unmittelbare schwere Reaktion auszuschließen
        {{pp}} Merkblatt zu möglichen Nebenwirkungen aushändigen
        {{pp}} bei Bedenken Praxis kontaktieren, insbesondere bei
        möglicher Infektion (zunehmende Rötung, Schmerzen,
        Schwellung oder Eiter nach 3 Tagen)
