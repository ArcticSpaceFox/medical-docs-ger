name: headache
parent: default

matches:
  - trigger: ":headachefu"
    word: true
    replace:  |
     {{pp}} sofort ärztliche Hilfe aufsuchen bei:
       Der Kopfschmerz beginnt plötzlich, wird rasch stark
            oder könnte als "schlimmster Kopfschmerz des Lebens" beschrieben werden
       Der Kopfschmerz ist stark und begleitet von Fieber oder Nackensteife
       Sie haben einen Krampfanfall, Persönlichkeitsveränderungen oder Verwirrtheit, oder Sie werden bewusstlos
       Der Kopfschmerz begann unmittelbar nach körperlicher Anstrengung oder einer leichten Verletzung
       Sie haben Schwäche, Taubheitsgefühl oder Sehstörungen

  - trigger: ":headacheredflag"
    word: true
    replace:  |
     {{sp}} kein Vernichtungskopfschmerz (Donnerschlagkopfschmerz)
       {{sp}} kein Fieber
       {{sp}} kein Hautausschlag
       {{sp}} keine Nackensteife
       {{sp}} keine fokale Schwäche
       {{sp}} kein Taubheitsgefühl
       {{sp}} keine Sprechstörungen
       {{sp}} keine Gleichgewichtsstörung
       {{sp}} keine Augenschmerzen
       {{sp}} keine Nachtschweiße
       {{sp}} kein unbeabsichtigter Gewichtsverlust

  - trigger: ":headache"
    word: true
    replace:  |
      Subjektiv:
        {{cc}} Kopfschmerzen seit DAUER

        Warnzeichen:
        {{redflags}}

        {{pain}}

        {{sp}} keine Aura (neurologische Symptome vor Kopfschmerzbeginn)
        {{sp}} kein vorangegangenes Kopftrauma
        {{sp}} keine relevante Vorerkrankung (z. B. Bluthochdruck, Diabetes, Schlafstörung)
        {{sp}} keine übermäßige Analgetikaeinnahme (>14 Tage/Monat bei einfachem Paracetamol oder NSAR,
               >9 Tage/Monat bei Triptanen, Opioiden oder Kombinationspräparaten)
        {{sp}} kein übermäßiger Alkoholkonsum

      Objektiv:
        {{op}} normaler Blutdruck
        {{op}} kein Fieber
        {{op}} keine Druckschmerzhaftigkeit der Kopfhaut
        {{op}} keine Druckschmerzhaftigkeit des Nackens
        {{op}} keine Druckschmerzhaftigkeit der Nasennebenhöhlen
        {{op}} kein Knacken oder Druckschmerz des Kiefergelenks
        {{op}} normale schmerzfreie Beweglichkeit des Nackens

        {{neuroexam}}

      Beurteilung:
        {{ap}} zervikogener Kopfschmerz
        {{ap}} Migräne ohne Aura
        Es liegen KEINE Warnzeichen vor

      Plan:
        {{pp}} Kopfschmerztagebuch beginnen
        {{pp}} Koffeinkonsum reduzieren
        {{pp}} regelmäßige körperliche Bewegung steigern
        {{pp}} regelmäßigen Schlaf und regelmäßige Mahlzeiten einhalten
        {{pp}} rezeptfreie Medikamente bei leichten Attacken verwenden:
          Paracetamol 1 g bei Bedarf, Ibuprofen 400 mg bei Bedarf oder Naproxen 550 mg bei Bedarf
        {{pp}} verschreibungspflichtige Medikation bei schweren Attacken verwenden: Zolmitriptan
        {{pp}} übermäßigen Medikamentengebrauch vermeiden: (>14 Tage/Monat bei
               Paracetamol oder Ibuprofen, >9 Tage/Monat bei Triptanen)
        {{pp}} tägliche Migräneprophylaxe beginnen: Propranolol
        {{pp}} Kochsalz-Nasenspülung mit destilliertem Wasser
               und intranasales Kortikosteroid-Spray versuchsweise einsetzen
        {{pp}} Wiedervorstellung in 2 Wochen zur Beurteilung der Wirksamkeit der Therapie

        {{followup}}

    vars:
      - name: redflags
        type: match
        params:
          trigger: ":headacheredflag"
      - name: followup
        type: match
        params:
          trigger: ":headachefu"
      - name: neuroexam
        type: match
        params:
          trigger: ":neuroexam"
      - name: pain
        type: match
        params:
          trigger: ":pain"
