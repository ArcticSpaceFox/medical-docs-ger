name: sti
parent: default

matches:
  - trigger: ":sti"
    word: true
    replace:  |
      Subjektiv:
        {{cc}} mögliche sexuell übertragbare Infektion (STI)

        Symptome:
        {{sp}} keine Schmerzen beim Wasserlassen
        {{sp}} keine Läsionen, Ausschläge oder Wucherungen
        {{sp}} kein ungewöhnlicher Ausfluss aus Penis, Vagina oder Anus
        {{sp}} keine Hodenschmerzen
        {{sp}} keine Unterbauchschmerzen
        {{sp}} keine Schmerzen beim Geschlechtsverkehr

        {{sp}} aktuelle Strategien zur Vermeidung von STI, einschließlich XXXXX
        {{sp}} aktuelle Strategien zur Empfängnisverhütung, einschließlich XXXXX
        {{sp}} sexueller Kontakt einschließlich oral, anal und vaginal


        Hochrisikofaktoren:
        {{sp}} kein bekannter STI-Kontakt
        {{sp}} bekannter STI-Kontakt, letzter Kontakt vor XXXX Tagen/Wochen
        {{sp}} kein Geschlechtsverkehr vor dem 25. Lebensjahr
        {{sp}} kein neuer Sexualpartner
        {{sp}} nicht mehr als ein Sexualpartner im vergangenen Jahr
        {{sp}} keine anonymen Sexualpartner
        {{sp}} kein MSM-Kontakt (Männer, die Sex mit Männern haben)
        {{sp}} kein Kontakt zu Sexarbeiter/innen oder deren Kunden
        {{sp}} keine Obdachlosigkeit oder Straßenmilieu
        {{sp}} kein vorangegangener sexueller Übergriff oder Missbrauch
        {{sp}} keine Anwendung nicht-barrierebasierter Verhütung
        {{sp}} kein intravenöser Drogenkonsum
        {{sp}} kein Konsum anderer Substanzen
        {{sp}} keine STI in der Vorgeschichte

        Screening-Anamnese:
        {{sp}} letztes STI-Screening vor XXXX Monaten/Jahren
        {{sp}} letzter PAP-Abstrich vor XXXX Monaten/Jahren
        {{sp}} letzte Menstruation:


      Objektiv:
        {{op}} kein Gewichtsverlust
        {{op}} kein Fieber
        {{op}} keine vergrößerten Lymphknoten
        {{op}} unauffälliger Mund- und Rachenbefund
        {{op}} unauffälliges äußeres Genitale
        {{op}} keine skrotale Druckschmerzhaftigkeit
        {{op}} unauffällige vaginale Untersuchung mit beleuchtetem Spekulum
        {{op}} unauffällige bimanuelle Untersuchung ohne uterine oder adnexale Druckschmerzhaftigkeit

      Beurteilung:
        {{ap}} Anfrage für routinemäßiges STI-Screening
        {{ap}} Chlamydieninfektion
        {{ap}} Gonorrhoe

      Plan:
        {{pp}} STI-Testung durchführen
        {{pp}} Behandlung mit Azithromycin 1g und Cefixim 800mg bei vermuteter Exposition gegenüber Chlamydien und Gonokokken
        {{pp}} sicheres Sexualverhalten mit konsequenter Nutzung von Barriereschutz (Kondome)
        {{pp}} regelmäßiges STI-Screening, mindestens jährlich, bei höherem Risiko häufiger
