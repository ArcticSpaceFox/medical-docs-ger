name: urology
parent: default

matches:
  - trigger: ":delayedejac"
    replace:  |
     Subjektiv:
       {{cc}} verzögerte Ejakulation seit DAUER
       {{sp}} keine Ejakulationsschwierigkeiten bei Masturbation
       {{sp}} keine Ejakulationsschwierigkeiten mit Partner/in
       {{sp}} keine Angststörung in der Anamnese
       {{sp}} keine serotonerg wirkenden Medikamente
         Beispiele:
           SSRI, SNRI, Bupropion, TZA, MAO-Hemmer
           Antipsychotika,
           Triptane, Carbamazepin, Valproinsäure, Lithium
           Opioide,
           Metoclopramid, Ondansetron
           Cyclobenzaprin, Dextromethorphan
           LSD, Ecstasy, Kokain, Amphetamine

     Beurteilung:
       {{ap}} primäre verzögerte Ejakulation (am ehesten zumindest teilweise sekundär durch serotonerge Medikation bedingt)
       Die primäre verzögerte Ejakulation ist schwer zu behandeln, sofern kein direkter Medikamentenbezug besteht.
       Bei Verdacht auf medikamentöse Ursache kommen folgende Strategien in Betracht:
       1) Umstellung von SSRI auf Vilazodon (Viibryd) oder niedrig dosiertes Vortioxetin (Trintellix)
       2) Umstellung von SSRI auf SNRI - Duloxetin (Cymbalta) oder Levomilnacipran (Fetzima) sind vermutlich am geeignetsten
       3) Zusätzliche Gabe von Mirtazapin (Remeron) oder Bupropion (Wellbutrin) zu einem SSRI

       Falls kein medikamentöser Zusammenhang besteht, liegt meist Angst oder ein überkontrollierter bzw. zwanghafter Persönlichkeitszug zugrunde.
       Eine intensive Beratung/Psychotherapie kann hilfreich sein.

       Die meisten Männer finden spezifische Reize, die ihnen allein helfen, ihre besonders hohe Ejakulationsschwelle zu erreichen.
       Wenn der/die Partner/in diese Techniken nachahmt, kann dies eine Ejakulation mit Partner/in ermöglichen.

       Schließlich kann ein Stimulans (z. B. Dexedrine 5-10mg) 1 Stunde vor sexueller Aktivität hilfreich sein.
       Falls dieser Ansatz wirksam ist, sollte ein Screening auf ADHS erwogen werden.

     Plan:
       {{pp}} Selbstüberweisung zur Beratung/Psychotherapie
       {{pp}} Medikamentenumstellung auf Vilazodon (Viibryd), Vortioxetin (Trintellix), Duloxetin (Cymbalta), Levomilnacipran (Fetzima) versuchen
       {{pp}} zusätzliche Gabe von Mirtazapin (Remeron), Bupropion (Wellbutrin) versuchen
       {{pp}} Dexedrine 5mg versuchen, eine Stunde vor sexueller Aktivität eingenommen
       {{pp}} Wiedervorstellung innerhalb eines Monats zur Beurteilung der Wirksamkeit der Behandlung, früher bei Bedenken


  - trigger: ":lowtest"
    word: true
    replace:  |
      Subjektiv:
        {{cc}} möglicher Testosteronmangel

        Sexuelle Symptome:
        {{sp}} keine Libidominderung
        {{sp}} keine erektile Dysfunktion
        {{sp}} keine Abnahme morgendlicher Erektionen
        {{sp}} keine verminderte sexuelle Leistungsfähigkeit

        Somatische Symptome:
        {{sp}} keine Zunahme des viszeralen Körperfetts/Adipositas,
        {{sp}} keine Abnahme der Muskelmasse,
        {{sp}} keine Kraftminderung,
        {{sp}} keine Erschöpfung/Energieverlust,
        {{sp}} keine verminderte körperliche Aktivität/Vitalität,
        {{sp}} keine niedrige Knochenmineraldichte,
        {{sp}} keine Anämie,
        {{sp}} keine Hitzewallungen,
        {{sp}} kein Verlust von Gesichts-, Achsel- und Schambehaarung/verlangsamtes Bartwachstum
        {{sp}} keine Abnahme des allgemeinen Wohlbefindens

        Psychische Symptome:
        {{sp}} keine Depression/gedrückte Stimmung,
        {{sp}} keine Stimmungsschwankungen,
        {{sp}} keine Reizbarkeit,
        {{sp}} keine Konzentrationsstörung
        {{sp}} keine Schlaflosigkeit/Schlafstörungen

      Objektiv:
        {{op}} keine gonadale Atrophie,
        {{op}} keine Abnahme der Scham- und Gesichtsbehaarung,
        {{op}} keine Abnahme der Muskelmasse,
        {{op}} keine Zunahme des viszeralen Fetts

      Beurteilung:
        {{ap}} Testosteronmangelsyndrom

      Plan:
        {{pp}} Bestimmung des Testosteronspiegels (empfohlen 7-11 Uhr oder innerhalb von 3 Stunden nach dem Aufwachen bei Schichtarbeit)
        sowie zugehöriger Werte zur Diagnosesicherung und Verlaufskontrolle während der Behandlung
        (FSH, LH, Prolaktin, SHBG, Albumin (kFT oder kBAT), TSH, Ferritin (bzw. % Eisensättigung), Blutbild, PSA)

  # Dies ist eine allgemeine Übersicht zum Testosteronmangelsyndrom als Referenz
  # Diese Informationen sind nicht notwendigerweise aktuell oder leitliniengerecht
  - trigger: ":lowtestinfo"
    word: true
    replace:  |
        Testung:
        Testosteron 7-11 Uhr oder innerhalb von 3 Stunden nach dem Aufstehen bei Schichtarbeit
        Bei Grenzwerten: bioverfügbares Testosteron nutzen - Selbstzahlerleistung oder Berechnung mittels Testosteron, SHBG, Albumin
        www.issam.ch/freetesto.htm
        Normbereich bioverfügbares Testosteron (4,0 - 16,0)
        Bei Normwert keine Substitution, da die körpereigene Produktion unterdrückt werden kann und sich der Patient schlechter fühlen kann!

        Weitere Diagnostik: FSH, LH, Prolaktin, SHBG, Albumin (kFT oder kBAT), TSH, Ferritin (bzw. %
        Eisensättigung), Blutbild, PSA

        Niedriges FSH, LH spricht für sekundären Hypogonadismus

        Ursachen des sekundären Hypogonadismus:
        Kallmann-Syndrom - assoziiert mit Farbenblindheit, Anosmie
        Hypophysenerkrankungen - Hypophysentumor oder dessen Behandlung
        Entzündliche Erkrankungen - Sarkoidose, Histiozytose, Tuberkulose
        HIV/AIDS
        Medikamente - Opiate, Hormone, Glukokortikoide, Ketoconazol
        Substanzen - Alkohol, Heroin
        Adipositas
        Normales Altern
        Begleiterkrankungen - schwere OSA, Lebererkrankung, Hämochromatose, schwere Erkrankung, Operation, emotionaler Stress

        Behandlung:
        Lebensstil: aerobes Training und Krafttraining, gesunde Ernährung, Schlaf, Stressmanagement
        Große Überschneidung von Prädiabetes/Diabetes/metabolischem Syndrom, erektiler Dysfunktion, niedrigem Testosteron
        Die Behandlung sollte die sexuelle Funktion verbessern und den Bedarf an PDE-5-Hemmern verringern

        Testosteronersatztherapie (TRT):
        Kontraindikationen: metastasiertes Prostatakarzinom, Mammakarzinom in der Anamnese
        Nebenwirkungen:
        Fertilität: TRT unterdrückt die Spermienzahl, jedoch vollständig reversibel. Entweder absetzen oder Clomifen verwenden
        Kardiovaskuläres Risiko: keine überzeugende Evidenz für erhöhtes Risiko, aber widersprüchliche Studien. Manche Studien deuten auf Nutzen bei Patienten mit niedrigem Testosteron zu Beginn hin.
        Prostatakarzinom: verursacht es nicht, könnte aber das Wachstum eines bereits vorhandenen Karzinoms fördern

        Delatestryl:    1ml (200mg) alle 2 Wochen   0,5ml (100mg) wöchentlich
        Testosteronundecanoat/Cypionat: 2ml (200mg) alle 2 Wochen  1ml (100mg) wöchentlich
        Orale Gabe mit schlechter Resorption: Andriol 80mg zweimal täglich mit fetthaltigen Mahlzeiten, Fischölpräparat, Olivenöl
        Topisch: Androgel/Testim beginnend 5g/Tag, Axiron 3-6g/Tag (axilläre Anwendung),
                     Androderm-Pflaster 5g/zur Nacht
        Intranasal: Natesto (Testosteron-Nasengel 4,5%) 1 Sprühstoß (5,5mg) pro Nasenloch oder 2 Sprühstöße insgesamt zweimal täglich (22mg/Tag) initial

        Verlaufskontrolle
        Vor Behandlungsbeginn: Basis-DRU, nach 6 Monaten, 12 Monaten, danach jährlich
        Blutuntersuchungen (Blutbild, Leberwerte, Kreatinin, BZ/HbA1c, Lipide, PSA) vor Beginn, nach 3, 6, 12 Monaten, danach jährlich

        Bei PSA-Anstieg über den altersbezogenen Grenzwert oder >0,75/Jahr, Testosteron absetzen,
             PSA erneut kontrollieren und bei weiterhin erhöhtem Wert an die Urologie überweisen (Rapid Access PSA Clinic in Calgary)

        Testspiegel bei oraler/transdermaler Gabe - idealerweise 2 Stunden nach Einnahme (relatives Maximum)
        Injektabel - Tag vor oder Tag der Injektion (Talspiegel)
        Ziel: mittlerer Bereich (Norm 10-29) ohne Nebenwirkungen, verbessertes Allgemeinbefinden und sexuelle Gesundheit

        Organsystem                     Nutzen                        Schaden
        Erektile Funktion/Libido        Verbesserung                  Keiner
        Depression/Stimmung/Erschöpfung Verbesserung                  Aggressives Verhalten
        Erythropoese                    Anstieg des Hämatokrits       Erhöhtes Risiko für Polyzythämie,
                                                                                              Embolie
        Skelettmuskulatur               Zunahme fettfreier Masse      Keiner
        Knochenstoffwechsel             Vorbeugung von Osteoporose    Keiner
        Kardiovaskuläres System         Verbesserung bei Herzinsuff., Erhöhtes Risiko für thromboembolische
                                         Belastbarkeit                kardiovaskuläre Ereignisse

