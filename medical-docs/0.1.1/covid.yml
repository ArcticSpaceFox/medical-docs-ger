name: covid
parent: default

matches:
  - trigger: "cv"
    replace: "COVID-19"
    word: true

  - trigger: ":covidphone"
    replace: |
      COVID-TELEFONKONTAKT

      Beginnzeit: {{mytime}}

      Grund des Anrufs:  Anstelle eines Praxisbesuchs aufgrund von COVID-19-Bedenken

      Notizen:
      {{sp}} keine Reisetätigkeit
      {{sp}} kein Kontakt zu kürzlich Gereisten oder vermuteten COVID-19-Fällen.
      {{sp}} keine Symptome von COVID (Husten, Fieber, Atemnot, Schnupfen oder Halsschmerzen),
      die nicht auf eine vorbestehende Erkrankung zurückzuführen sind

      Fortführung der sozialen Distanzierung empfohlen.

      Endzeit:
    vars:
    - name: mytime
      type: match
      params:
        trigger: ":time"

  - trigger: ":covidsig"
    replace: |
      Bitte denken Sie daran, soziale Distanzierung einzuhalten.


# Diese COVID-Risikobeurteilung und -Überwachung basiert auf dem
# COVID-19 Positive Primary Care Pathway
# Veröffentlicht auf www.specialistlink.ca
  - trigger: ":covidrisk"
    replace: |
      COVID-TELEFONISCHE RISIKOBEURTEILUNG

      Beginnzeit: {{mytime}}

      Grund des Anrufs:  Risikostratifizierung bei vermutetem oder bestätigtem COVID-Fall

      Sicherheitsnetz-Check:
        {{sp}} keine soziale Isolation
        {{sp}} keine fehlende Unterstützung durch Pflegepersonen
        {{sp}} keine Unfähigkeit, den Flüssigkeitshaushalt aufrechtzuerhalten
        {{sp}} keine Nahrungsmittel-/finanzielle Unsicherheit
        {{sp}} keine häusliche Pflege
        {{sp}} keine Schwierigkeiten mit Gesundheitskompetenz oder Bedenken bezüglich Selbstmanagement

      Hochrisikomerkmale:
        {{sp}} keine kürzliche Entlassung aus tertiärer Versorgung (Krankenhaus, komplexes Versorgungszentrum)
        {{sp}} kein fehlendes Sicherheitsnetz
        {{sp}} kein Alter >70
        {{sp}} kein Alter >60 mit Begleiterkrankungen
        {{sp}} keine Symptomverschlechterung

      Durchschnittliche Risikomerkmale:
        {{sp}} kein Alter <18
        {{sp}} keine Schwangerschaft
        {{sp}} kein Fehlen von Symptomen (aber Abstrich positiv)

      Wenn alle oben genannten Punkte negativ sind, gilt niedrigeres Risiko

      Gesamtrisikobeurteilung:
         Hohes Risiko - erfordert tägliche Überwachung für 14 Tage
         Durchschnittliches Risiko - erfordert Überwachung alle 2 Tage für 7 Tage
         Niedrigeres Risiko - Selbstüberwachung erwägen - Merkblatt ausgehändigt

      Endzeit:
    vars:
    - name: mytime
      type: match
      params:
        trigger: ":time"

  - trigger: ":covidredflags"
    replace: |
      {{sp}} keine schwere Atemnot in Ruhe
      {{sp}} keine Atembeschwerden
      {{sp}} keine Schmerzen oder Druckgefühl im Brustkorb
      {{sp}} keine kalte, klamme oder blass-marmorierte Haut
      {{sp}} keine neu aufgetretene Verwirrtheit
      {{sp}} keine blaue Verfärbung von Lippen oder Gesicht
      {{sp}} kein zunehmend erschwertes Erwecken
      {{sp}} kein Bluthusten
      {{sp}} keine verminderte Urinausscheidung
      {{sp}} kein erneuter Husten nach vorheriger Besserung (kann auf COVID-Pneumonie hinweisen)
      {{sp}} kein erneutes Fieber nach fieberfreiem Intervall (kann auf COVID-Pneumonie hinweisen)
      {{sp}} keine niedrige Sauerstoffsättigung (<92% falls zuvor gesund, <90% bei vorbestehender Lungenerkrankung)
      {{sp}} kein erhöhter O2-Bedarf bei häuslicher O2-Therapie

  - trigger: ":covidmonitor"
    replace: |
     COVID-TELEFONISCHE ÜBERWACHUNG

      Beginnzeit: {{mytime}}

      Grund des Anrufs:  Überwachung bei vermutetem oder bestätigtem COVID-Fall

      Vorherige Risikostratifizierung:  Hoch  Durchschnittlich  Niedriger

      {{sp}} insgesamt Befinden  schlechter  unverändert  besser

      Falls nicht schlechter, wurde ein Fragebogen zur Atemwegsbeurteilung durchgeführt:
        Wie ist Ihre Atmung?
        Ist sie heute schlechter als gestern?
        Wovon hält Sie Ihre Atmung ab?

      Insgesamt schlechter oder Atemfragen positiv, daher wurden Warnzeichen überprüft:

      {{sp}} Warnzeichen vorhanden, daher dringende oder notfallmäßige Überweisung erforderlich
      {{sp}} keine Warnzeichen, aber aufgrund verschlechternder Symptome nun als Hochrisiko eingestuft
      Insgesamt nicht schlechter und Atemfragen negativ, daher weitere Überwachung
      Hohes Risiko      - alle 24h für insgesamt 14 Tage
      Durchschnittliches Risiko   - alle 48h für insgesamt 7 Tage
      Niedrigeres Risiko     - Selbstüberwachung anhand der Checkliste erwägen

      Isolation für mindestens 10 Tage ab Symptombeginn erforderlich
      oder bis zum Abklingen der Symptome, je nachdem, was länger ist.

      Endzeit:
    vars:
    - name: mytime
      type: match
      params:
        trigger: ":time"
