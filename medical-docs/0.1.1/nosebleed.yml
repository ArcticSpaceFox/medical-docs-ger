name: nosebleed
parent: default

matches:
  - trigger: ":nosebleed"
    word: true
    replace: |
      Subjektiv:
        {{cc}} Nasenbluten aus der RECHTEN Seite seit DAUER
        {{sp}} rezidivierende Blutungen etwa alle INTERVALL
        mit einer Dauer von etwa DAUER
        {{sp}} kein erkennbarer Auslöser
                 (Trauma, Nasenoperation, Nasenbohren, Fremdkörper,
                  Infekt der oberen Atemwege, allergische Rhinitis)

        Warnzeichen:
        {{sp}} keine Brustschmerzen
        {{sp}} keine Atemnot
        {{sp}} kein Schwindel

        {{sp}} keine Gerinnungsstörung
        {{sp}} kein Bluthochdruck
        {{sp}} keine Leberzirrhose
        {{sp}} keine koronare Herzkrankheit
        {{sp}} keine Anwendung von intranasalem Kortikosteroid
        {{sp}} keine Einnahme von Thrombozytenaggregationshemmern wie
              Acetylsalicylsäure, Clopidogrel oder Ticagrelor
        {{sp}} keine Einnahme von Antikoagulanzien wie Heparin, Warfarin,
               Rivaroxaban, Apixaban, Edoxaban oder Dabigatran

      Objektiv:
        {{op}} insgesamt gutes Allgemeinbefinden
        {{op}} kein Hämatom (Ecchymose)
        {{op}} kein auf Thrombozytenfunktionsstörung hinweisender Hautausschlag (Petechien)
        {{op}} keine abnormale Gefäßneubildung (Teleangiektasie)
        {{op}} keine aktive Blutung
        {{op}} kein Hinweis auf kürzliche Blutung in der Nase (am Locus Kiesselbachi)
        {{op}} kein Blut im Mund oder Rachen (Oropharynx)

        mit Lidocain 2% mit Adrenalin getränkte Watte appliziert
        gefolgt von Ätzung mit Silbernitrat

      Beurteilung:
        {{ap}} anteriore Nasenblutung ohne Warnzeichen

      Plan:
        {{pp}} bei aktiver Blutung nach vorne beugen und Nase abklemmen
        {{pp}} ärztliche Hilfe aufsuchen, falls die Blutung nicht innerhalb von 10 Minuten sistiert
        {{pp}} intranasales Kortikosteroid-Spray absetzen
        {{pp}} Nasenspray von der Nasenscheidewand weg richten
        {{pp}} in befeuchteter Umgebung schlafen
        {{pp}} topisches Antibiotikum (Bactroban) mit Wattestäbchen in das Nasenloch auftragen
        {{pp}} Wiedervorstellung bei Verschlechterung der Symptome oder weiteren Bedenken
