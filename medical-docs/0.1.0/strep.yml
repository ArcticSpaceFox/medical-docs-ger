name: strep
parent: default

matches:
  - trigger: ":strep"
    word: true
    replace: |
     Anamnese:
        {{cc}} Halsschmerzen seit XX Tagen
        {{sp}} kein Husten
        {{sp}} keine vorherige Streptokokken-Infektion
        {{sp}} kein bekannter Streptokokken-Kontakt
        Streptokokken-Pharyngitis tritt am häufigsten unter 15 Jahren und am seltensten über 45 Jahren auf.

     Untersuchungsbefund:
        {{op}} heutige Temperatur von
        {{op}} keine schmerzhaften geschwollenen Lymphknoten am Hals (zervikale Lymphadenopathie)
        {{op}} keine Tonsillenschwellung
        {{op}} keine weißen Beläge auf den Tonsillen (Exsudate)

     Beurteilung:
        {{ap}} akute Streptokokken-Pharyngitis (Streptokokken-Angina)

     Plan:
        Ein Rachenabstrich wurde zur Abklärung einer bakteriellen Infektion (Streptokokken-Angina) eingesendet
        {{pp}}bis zur Bestätigung der Infektion mit der Einnahme des verordneten Antibiotikums warten
        {{pp}}
        {{pp}}verordnetes Antibiotikum sofort einnehmen
        {{pp}}
        {{pp}}unterstützende Maßnahmen fortführen (Paracetamol, Ibuprofen, Ruhe und ausreichend Flüssigkeit)
        {{pp}}bei Verschlechterung der Symptome innerhalb von 48 Stunden trotz Behandlung Wiedervorstellung
        {{pp}}bei Atembeschwerden 112 anrufen oder Notaufnahme aufsuchen
