name: uti
parent: default

matches:
  - trigger: ":uti"
    word: true
    replace: |
     Anamnese:
       {{cc}} möglicher Harnwegsinfekt seit XX Tagen
       {{sp}} keine Dysurie
       {{sp}} keine erhöhte Miktionsfrequenz
       {{sp}} kein Harndrang
       {{sp}} keine Hämaturie
       {{sp}} kein Fieber
       {{sp}} kein Schüttelfrost
       {{sp}} keine Übelkeit und Erbrechen
       {{sp}} keine Flankenschmerzen
       {{sp}} keine Bauchschmerzen

       {{sp}} kein vaginaler Ausfluss
       {{sp}} keine vaginale Blutung
       {{sp}} keine Stuhlveränderungen

       {{sp}} keine Harnwegsinfekte in den letzten 6 Monaten (und keine im letzten Jahr)
              (rezidivierender HWI definiert als ≥2 Infektionen in sechs Monaten oder ≥3 Infektionen in einem Jahr)
       {{sp}} keine Antibiotikaeinnahme innerhalb der letzten 4 Wochen
       {{sp}} keine Immunsuppression
       {{sp}} keine Antibiotika-Allergien
       {{sp}} keine Schwangerschaft

     Untersuchungsbefund:
       {{op}} keine suprapubische Druckschmerzhaftigkeit (über der Blase)
       {{op}} keine Klopfschmerzhaftigkeit im Nierenlager (über den Nieren)
       {{op}} keine Leukozyten im Urin-Streifentest
       {{op}} keine Nitrite (Stoffwechselprodukt bakterieller Infektion) im Urin-Streifentest

     Beurteilung:
       {{ap}} unkomplizierter Harnwegsinfekt

     Plan:
       {{pp}} Flüssigkeitszufuhr erhöhen
       {{pp}} verordnetes Antibiotikum einnehmen: Nitrofurantoin Ciprofloxacin Cotrimoxazol Fosfomycin Cefalexin
       Eine Urinkultur wurde eingesendet, um die Behandlung zu steuern, falls sich die Symptome nicht bessern

       {{pp}} auf Symptome einer Nierenbeckenentzündung (Pyelonephritis) achten, einschließlich Fieber, Übelkeit und Rückenschmerzen
       {{pp}} bei Verschlechterung, Persistenz der aktuellen Symptome oder Auftreten neuer Symptome Wiedervorstellung
