name: headache
parent: default

matches:
  - trigger: ":headachefu"
    word: true
    replace:  |
     {{pp}} umgehend ärztliche Hilfe aufsuchen, wenn:
       Ihre Kopfschmerzen plötzlich einsetzen, rasch stark werden,
            oder als "die schlimmsten Kopfschmerzen Ihres Lebens" beschrieben werden könnten
       Ihre Kopfschmerzen stark sind und zusätzlich Fieber oder Nackensteifigkeit bestehen
       Sie einen Krampfanfall, Persönlichkeitsveränderungen oder Verwirrtheit haben, oder bewusstlos werden
       Ihre Kopfschmerzen unmittelbar nach körperlicher Anstrengung oder einer leichten Verletzung begannen
       Sie Schwäche, Taubheitsgefühl oder Sehstörungen haben

  - trigger: ":headacheredflag"
    word: true
    replace:  |
     {{sp}} kein schlagartiger Beginn (Donnerschlagkopfschmerz)
       {{sp}} kein Fieber
       {{sp}} kein Ausschlag
       {{sp}} keine Nackensteifigkeit
       {{sp}} keine fokale Schwäche
       {{sp}} keine Taubheit
       {{sp}} keine Sprachstörungen
       {{sp}} keine Gleichgewichtsstörungen
       {{sp}} keine Augenschmerzen
       {{sp}} keine Nachtschweiße
       {{sp}} kein ungewollter Gewichtsverlust

  - trigger: ":headache"
    word: true
    replace:  |
      Anamnese:
        {{cc}} Kopfschmerzen seit DAUER

        Warnzeichen:
        {{redflags}}

        {{pain}}

        {{sp}} keine Aura (neurologische Symptome vor Beginn der Kopfschmerzen)
        {{sp}} keine vorangegangene Kopfverletzung
        {{sp}} keine relevante Vorerkrankung (z.B. Bluthochdruck, Diabetes, Schlafstörungen)
        {{sp}} kein Analgetika-Übergebrauch (>14 Tage/Monat bei reinem Paracetamol oder NSAR,
               >9 Tage/Monat bei Triptanen, Opioiden oder Kombinationspräparaten)
        {{sp}} kein übermäßiger Alkoholkonsum

      Untersuchungsbefund:
        {{op}} normaler Blutdruck
        {{op}} kein Fieber
        {{op}} keine Druckschmerzhaftigkeit der Kopfhaut
        {{op}} keine Nackendruckschmerzhaftigkeit
        {{op}} keine Nasennebenhöhlen-Druckschmerzhaftigkeit
        {{op}} kein Klicken oder Druckschmerz im Kiefergelenk (TMJ)
        {{op}} normale, schmerzfreie Beweglichkeit der Halswirbelsäule

        {{neuroexam}}

      Beurteilung:
        {{ap}} zervikogener Kopfschmerz
        {{ap}} Migräne ohne Aura
        Es liegen KEINE Warnzeichen vor

      Plan:
        {{pp}} Kopfschmerztagebuch führen
        {{pp}} Koffeinkonsum reduzieren
        {{pp}} regelmäßige körperliche Bewegung steigern
        {{pp}} regelmäßigen Schlaf- und Essrhythmus einhalten
        {{pp}} freiverkäufliche Medikamente bei leichten Attacken einsetzen:
          Paracetamol 1 g bei Bedarf, Ibuprofen 400 mg bei Bedarf, oder Naproxen 550 mg bei Bedarf
        {{pp}} verschreibungspflichtiges Medikament bei schweren Attacken einsetzen: Zolmitriptan
        {{pp}} Medikamentenübergebrauch vermeiden (>14 Tage/Monat bei
               Paracetamol oder Ibuprofen, >9 Tage/Monat bei Triptanen)
        {{pp}} tägliche Migräneprophylaxe beginnen: Propranolol
        {{pp}} Kochsalz-Nasenspülung mit destilliertem Wasser
               sowie intranasales Kortikosteroid-Spray versuchen
        {{pp}} Wiedervorstellung in 2 Wochen zur Beurteilung des Therapieerfolgs

        {{followup}}

    vars:
      - name: redflags
        type: match
        params:
          trigger: ":headacheredflag"
      - name: followup
        type: match
        params:
          trigger: ":headachefu"
      - name: neuroexam
        type: match
        params:
          trigger: ":neuroexam"
      - name: pain
        type: match
        params:
          trigger: ":pain"
