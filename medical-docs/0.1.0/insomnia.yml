name: insomnia
parent: default

matches:
  # Schlafhygiene
  - trigger: ":sleephy"
    word: true
    replace:  |
      {{pp}} Fernseher und Computer aus dem Schlafzimmer entfernen
      {{pp}} ein zu heißes oder zu kaltes Schlafzimmer vermeiden
      {{pp}} eine ruhige, dunkle, sichere und angenehme Schlafumgebung erhalten. Lärm und Licht minimieren
      {{pp}} Bett und Schlafzimmer nur zum Schlafen und für Intimität nutzen
      {{pp}} Koffein nach dem Mittag und Alkohol innerhalb von 6 Stunden vor dem Schlafengehen vermeiden
      {{pp}} Nikotin kurz vor dem Schlafengehen oder in der Nacht vermeiden
      {{pp}} moderate körperliche Aktivität ausüben, aber intensives Training innerhalb von 3 Stunden vor dem Schlafengehen vermeiden
      {{pp}} übermäßige Flüssigkeitszufuhr oder eine schwere Abendmahlzeit vor dem Schlafengehen vermeiden
      {{pp}} einen Wecker verwenden, um jeden Tag zur gleichen Zeit aufzustehen
      {{pp}} erst zu Bett gehen, wenn müde, auch wenn dies später als der geplante Schlafzeitpunkt ist
      {{pp}} aufstehen, wenn innerhalb von 20 Minuten kein Schlaf eintritt - in ein anderes Zimmer gehen und entspannen. Erst wieder zu Bett gehen, wenn müde
      {{pp}} das Beobachten/Prüfen der Uhrzeit vermeiden
      {{pp}} übermäßiges Nickerchen tagsüber vermeiden - ein kurzes Nickerchen (15-30 Minuten) am frühen Nachmittag kann erfrischend und in Ordnung sein

  # Schlafstörung
  - trigger: ":insomnia"
    word: true
    replace:  |
      Anamnese:
       {{cc}} Schlafstörung seit DAUER
       {{sp}} keine Einschlafstörung
       {{sp}} keine Durchschlafstörung
       {{sp}} keine Beeinträchtigung der Tagesfunktion
       {{sp}} keine Bedenken bezüglich Autofahren oder Bedienen schwerer Maschinen
       {{sp}} keine vorherigen Behandlungsversuche zur Schlafverbesserung
       {{sp}} kein erkennbarer Auslöser (wie Stress, Reisen, Schichtarbeit, Depression, Angst, Schmerzen)
       {{sp}} kein nächtlicher Husten
       {{sp}} keine Atembeschwerden
       {{sp}} kein nächtliches Erwachen zum Wasserlassen
       {{sp}} keine Geräusche im Schlafzimmer (wie schnarchender Partner)
       {{sp}} keine Schlafstörung durch Kinder oder Haustiere
       {{sp}} keine unangenehme Temperatur im Schlafzimmer
       {{sp}} kein Licht im Schlafzimmer
       {{sp}} keine Bildschirme im Schlafzimmer
       {{sp}} kein Nikotin am späten Tag
       {{sp}} kein Koffein am späten Tag
       {{sp}} kein Alkohol am späten Tag
       {{sp}} letzte Mahlzeit des Tages um XX Uhr
       {{sp}} konstante Zeit des Zubettgehens um XX Uhr (auch am Wochenende)
       {{sp}} konstante Aufwachzeit um XX Uhr (auch am Wochenende)
       {{sp}} Gesamtzeit im Bett von XX Stunden
       {{sp}} Gesamtschlafzeit von XX Stunden

      Beurteilung:
       {{ap}}  primäre Insomnie
       {{ap}}  sekundäre Insomnie aufgrund von XXXX

      Plan:
        {{pp}} Schlaftagebuch führen
        {{pp}} auf mysleepwell.ca für Strategien zur Schlafverbesserung verweisen
        {{pp}} Lektüre von "Say Good Night to Insomnia" für Strategien zur Schlafverbesserung erwägen
        {{pp}} Empfehlungen zur Schlafhygiene befolgen:
        {{sleephy}}
        Eine Überweisung wegen obstruktiver Schlafapnoe wurde veranlasst
        {{pp}} kurzfristige, intermittierende Anwendung eines Schlafmittels erwägen
        {{pp}} Wiedervorstellung in 4 Wochen

    vars:
      - name: sleephy
        type: match
        params:
          trigger: ":sleephy"
