name: derm
parent: default

matches:
  - trigger: ":hairloss"
    word: true
    replace: |
     Anamnese:
      {{cc}} Haarausfall an [Lokalisation] seit DAUER

     Untersuchungsbefund:
      {{op}} glatter, umschriebener Bereich mit vollständigem Haarausfall an [Lokalisation]
      {{op}} negativer Haarzupftest
      {{op}} keine Entzündung oder Vernarbung

     Beurteilung:
      {{ap}} Alopecia areata

     Plan:
      Eine Überweisung an die Dermatologie wurde veranlasst

  - trigger: ":skininfection"
    word: true
    replace: |
      Anamnese:
        {{cc}} mögliche Hautinfektion seit DAUER
        Die Lokalisation ist
        Die Symptome begannen nach
        {{sp}} kein Fieber (zu Hause gemessene Temperatur XX°C)
        {{sp}} keine Übelkeit oder Erbrechen
        {{sp}} keine Diarrhoe
        {{sp}} keine Schmerzen
        {{sp}} keine Eiterbildung
        {{sp}} keine Schwellung
        {{sp}} keine Rötung
        {{sp}} keine Überwärmung
        {{sp}} bisher keine Therapie
        {{sp}} keine Progredienz in den letzten 48 Stunden
        {{sp}} kein proximales Gelenkimplantat oder Gefäßtransplantat
        {{sp}} keine vorangegangenen Hautinfektionen
        {{sp}} kein Diabetes
        {{sp}} keine Immunsuppression
        {{sp}} keine Risikofaktoren für MRSA (z.B. frühere MRSA-Infektion, kürzliche Hospitalisierung,
               Langzeitpflegeeinrichtung, Hämodialyse, HIV-Infektion,
               fehlendes Ansprechen auf Therapie ohne MRSA-Abdeckung)
        {{sp}} keine Antibiotika-Allergien

      Untersuchungsbefund:
        {{op}} Temperatur von XX°C
        {{op}} Blutdruck von XXX/YY und Herzfrequenz von XXX
        Der betroffene Bereich befindet sich bei XXXX
        und erstreckt sich XXXXXXX
        {{op}} keine Eiterbildung
        {{op}} keine Ulzeration
        {{op}} kein Abszess
        {{op}} kein Erythem
        {{op}} keine Überwärmung
        {{op}} keine Druckschmerzhaftigkeit
        {{op}} keine Schwellung
        {{op}} keine Induration
        {{op}} keine klare Demarkation der Infektion
        {{op}} kein erhabenes Erythem

      Beurteilung:
        {{ap}} nicht-purulente Cellulitis
        {{ap}} Erysipel
        {{ap}} Hautabszess
        {{ap}} entzündete intradermale Zyste
        {{ap}} Paronychie
        OHNE systemische Zeichen, die eine Hospitalisierung oder parenterale
        Antibiotikatherapie erfordern würden, und OHNE Hinweis auf notwendige MRSA-Abdeckung.

      Plan:
        Ein Wundabstrich wurde zur weiteren Steuerung der antibiotischen Therapie eingesendet,
        sollte sich unter der initialen Behandlung keine Besserung zeigen.
        {{pp}} heute mit oraler Antibiotikatherapie wie verordnet beginnen
        {{pp}} Termin zur Inzision und Drainage des Abszesses vereinbaren
        {{pp}} zur Notaufnahme für parenterale Antibiotikagabe und mögliche stationäre Aufnahme
        {{pp}} betroffenen Bereich hochgelagert halten
        {{pp}} Wiedervorstellung bei fehlender Besserung nach 72h,
               Verschlechterung trotz 48h Antibiotikatherapie oder neuen systemischen Symptomen (Fieber, Übelkeit)
        {{pp}} bei rascher Ausbreitung der Rötung, starker Übelkeit oder hohem Fieber in die Notaufnahme
