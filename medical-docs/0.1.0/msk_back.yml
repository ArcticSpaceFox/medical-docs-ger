name: msk_back
parent: default

matches:
  - trigger: ":back"
    replace:  |
      Anamnese:
        {{cc}} obere mittlere untere Rückenschmerzen seit [Dauer]

        Warnzeichen:
        {{sp}} keine Harn- oder Stuhlinkontinenz oder Harnverhalt
        {{sp}} keine neu aufgetretene Schwäche in den Beinen
        {{sp}} keine Reithosenanästhesie (Taubheit oder Kribbeln im Bereich Genitalien, Gesäß oder Innenschenkel)
        {{sp}} kein ungewollter Gewichtsverlust
        {{sp}} keine Schmerzverstärkung im Liegen
        {{sp}} kein nächtliches Erwachen durch Rückenschmerzen
        {{sp}} kein dauerhaftes Müdigkeitsgefühl
        {{sp}} keine starken Nachtschweiße
        {{sp}} kein Fieber
        {{sp}} kein Gefühl extremen Unwohlseins
        {{sp}} keine in den Rücken ausstrahlenden Bauchschmerzen

        {{pain}}

        {{sp}} keine Harnwegssymptome wie Schmerzen beim Wasserlassen, erhöhte Miktionsfrequenz oder Harndrang, Blut im Urin
        {{sp}} keine Vorgeschichte von Nierensteinen
        {{sp}} keine Hodenschmerzen
        {{sp}} keine in die Leiste ausstrahlenden Schmerzen
        {{sp}} keine Vorgeschichte eines Verkehrsunfalls oder Hochrasanztraumas
        {{sp}} keine Vorgeschichte von Überlastung wie schwerem Heben

      Untersuchungsbefund:
        {{op}} deutliches Leiden aufgrund der Rückenschmerzen
        {{op}} keine paraspinale Muskeldruckschmerzhaftigkeit
        {{op}} keine Überwärmung oder Rötung des Rückens
        {{op}} normale Beweglichkeit der Wirbelsäule
        {{op}} normale Beweglichkeit der Hüften
        {{op}} normale Kraft in den unteren Extremitäten
        {{op}} normale Muskeleigenreflexe
        {{op}} normaler (negativer) Babinski beidseits
        {{op}} normales Gangbild (einschließlich Zehen- und Hackengang)
        {{op}} normaler (negativer) Lasègue beidseits
        {{op}} normaler (negativer) FABER-Test beidseits

      Beurteilung:
        {{ap}} mechanisch bedingter unterer Rückenschmerz

      Plan:
        {{pp}} Paracetamol, kurzfristig NSAR, topisches Diclofenac, kurzfristig Cyclobenzaprin vor dem Schlafengehen einsetzen
        {{pp}} Wärmekissen oder Eis zur Symptomlinderung verwenden
        {{pp}} aktiv bleiben und Übungen erlernen, die den Rücken stärken und dehnen
        {{pp}} Heben mit den Beinen statt mit dem Rücken erlernen
        {{pp}} zu langes Sitzen oder Stehen in derselben Position vermeiden
        {{pp}} auf das Auftreten der oben genannten Warnzeichen achten
        {{pp}} ärztliche Hilfe aufsuchen, wenn die Schmerzen über 6 Wochen anhalten, sich verschlimmern oder neue Symptome auftreten

    vars:
      - name: pain
        type: match
        params:
          trigger: ":pain"
