name: msk_ankle
parent: default

matches:
  - trigger: ":ankle"
    replace:  |
      Anamnese:
        {{cc}} rechte linke Sprunggelenkschmerzen seit DAUER
        Beginn nach MECHANISMUS
        {{sp}} nach der Verletzung gehfähig gewesen
        {{sp}} keine Unfähigkeit zur Belastung unmittelbar nach der Verletzung oder aktuell (4 Schritte) (1)
        {{sp}} anhaltende Schmerzen bei [Lokalisation]
        {{sp}} keine relevanten anhaltenden Schmerzen im Mittelfuß (2)
        {{sp}} keine vorangegangenen Sprunggelenksdistorsionen

      Untersuchungsbefund:
        {{op}} keine sichtbare Deformität
        {{op}} kein Hämatom
        {{op}} keine Schwellung
        {{op}} keine eingeschränkte Beweglichkeit
        {{op}} keine Sensibilitätsstörung
        {{op}} keine Durchblutungsstörung

        {{op}} keine relevante Druckschmerzhaftigkeit am hinteren Rand oder der Spitze des Malleolus lateralis (3)
        {{op}} keine relevante Druckschmerzhaftigkeit am hinteren Rand oder der Spitze des Malleolus medialis (4)

        {{op}} keine relevante Druckschmerzhaftigkeit am Os naviculare (5)
        {{op}} keine relevante Druckschmerzhaftigkeit an der Basis des 5. Mittelfußknochens (6)

        {{op}} keine sonstige relevante Druckschmerzhaftigkeit
        {{op}} keine Schmerzen bei passiver, vorsichtiger Inversion
        {{op}} keine Schmerzen bei passiver, vorsichtiger Eversion
        {{op}} negativer Squeeze-Test
        {{op}} negativer Außenrotationstest
        {{op}} negative vordere Schublade
        {{op}} negativer Talar-Tilt-Test
        {{op}} negativer Thompson-Test


      Beurteilung:
        {{ap}} rechte linke laterale mediale Sprunggelenksdistorsion
        Gemäß den Ottawa Ankle Rules
           Malleolarschmerz mit (1),(3) oder (4)] muss eine Sprunggelenksfraktur ausgeschlossen werden
        Gemäß den Ottawa Foot Rules
           Mittelfußschmerz mit (1),(5) oder (6)] muss eine Fußfraktur ausgeschlossen werden

      Plan:
        {{pp}} Röntgenaufnahme von Sprunggelenk und Fuß veranlassen
        {{pp}} Sprunggelenk ruhigstellen
        {{pp}} Eis, Kompression und Hochlagerung des Sprunggelenks anwenden
        {{pp}} NSAR (z.B. Ibuprofen) zur Schmerzbehandlung einnehmen
        {{pp}} Physiotherapie zur Unterstützung der Genesung
