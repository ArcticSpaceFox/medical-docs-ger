name: urti
parent: default

matches:
  - trigger: ":urti"
    word: true
    replace: |
      Anamnese:
        {{cc}} erkältungs-/grippeähnliche Symptome seit XX Tagen
        {{sp}} keine Halsschmerzen
        {{sp}} kein Husten
        {{sp}} kein Fieber
        {{sp}} keine verstopfte Nase
        {{sp}} keine Ohrenschmerzen
        {{sp}} keine Kopfschmerzen
        {{sp}} keine Nasennebenhöhlenschmerzen
        {{sp}} keine Zahnschmerzen
        {{sp}} keine Übelkeit/Erbrechen
        {{sp}} keine Diarrhoe
        {{sp}} keine erkrankten Kontaktpersonen
        {{sp}} keine kürzliche Reisetätigkeit
        {{sp}} keine Grippeimpfung in diesem Jahr

      Untersuchungsbefund:
        {{op}} unauffällige Trommelfelle beidseits
        {{op}} unauffälliger Rachenbefund (Oropharynx) (keine Rötung, keine Schwellung, keine Beläge)
        {{op}} keine geschwollenen Halslymphknoten (zervikale Lymphadenopathie)
        {{op}} unauffällige Lungenauskultation (kein Giemen, keine Rasselgeräusche)
        {{op}} keine erhöhte Atemarbeit

      Beurteilung:
        {{ap}} virale Infektion der oberen Atemwege
           Es bestehen jedoch Hinweise auf eine mögliche bakterielle Racheninfektion.

      Plan:
         {{pp}} unterstützende Maßnahmen mit Flüssigkeitszufuhr und Ruhe fortführen
         {{pp}} Paracetamol/Ibuprofen zur Linderung einnehmen
         {{pp}} zweimal täglich Nasenspülungen mit Kochsalzlösung und ein Nasensteroidspray vor dem Schlafengehen verwenden
         {{pp}} Ergebnis des Rachenabstrichs abwarten und Antibiotikum nur bei positivem Befund einnehmen
         {{pp}} bei zunehmenden Symptomen nach 7 Tagen Wiedervorstellung
         {{pp}} bei Atembeschwerden 112 anrufen oder Notaufnahme aufsuchen

  - trigger: ":strepphone"
    word: true
    replace: |
      TELEFONISCHE KOMMUNIKATION

      Grund des Anrufs: Streptokokken-Abstrich positiv

      Notizen:
        Über positiven Streptokokken-Abstrich informiert; Patient soll mit dem beim letzten Termin verordneten Rezept beginnen.
        Patient versteht und ist einverstanden. Dankbar für den Anruf.
        Wird sich bei der Praxis melden, falls weitere Bedenken bestehen oder trotz Behandlung keine Besserung eintritt.
