name: sti
parent: default

matches:
  - trigger: ":sti"
    word: true
    replace:  |
      Anamnese:
        {{cc}} möglicherweise sexuell übertragbare Infektion (STI)

        Symptome:
        {{sp}} keine Schmerzen beim Wasserlassen
        {{sp}} keine Geschwüre, Ausschläge oder Wucherungen
        {{sp}} kein ungewöhnlicher Ausfluss aus Penis, Vagina oder Anus
        {{sp}} keine Hodenschmerzen
        {{sp}} keine Beckenschmerzen
        {{sp}} keine Schmerzen beim Geschlechtsverkehr

        {{sp}} aktuelle Strategien zur Vermeidung von STIs, einschließlich XXXXX
        {{sp}} aktuelle Strategien zur Vermeidung einer Schwangerschaft, einschließlich XXXXX
        {{sp}} Sexualkontakte einschließlich oral, anal und vaginal


        Hochrisikofaktoren:
        {{sp}} kein bekannter STI-Kontakt
        {{sp}} bekannter STI-Kontakt, letzter Kontakt vor XXXX Tagen/Wochen
        {{sp}} keine sexuelle Aktivität unter 25 Jahren
        {{sp}} kein neuer Sexualpartner
        {{sp}} nicht mehr als ein Sexualpartner im vergangenen Jahr
        {{sp}} keine anonymen Sexualpartner
        {{sp}} kein MSM-Kontakt (Männer, die Sex mit Männern haben)
        {{sp}} kein Kontakt zu Sexarbeiterinnen/Sexarbeitern oder deren Kunden
        {{sp}} keine Obdachlosigkeit oder Straßenleben
        {{sp}} keine vorherige sexuelle Nötigung oder Missbrauch
        {{sp}} keine Anwendung von Verhütungsmethoden ohne Barriereschutz
        {{sp}} kein injizierender Drogenkonsum
        {{sp}} kein Konsum anderer Substanzen
        {{sp}} keine STI-Vorgeschichte

        Screening-Anamnese:
        {{sp}} letztes STI-Screening vor XXXX Monaten/Jahren
        {{sp}} letzter Pap-Abstrich vor XXXX Monaten/Jahren
        {{sp}} letzte Menstruationsblutung:


      Untersuchungsbefund:
        {{op}} kein Gewichtsverlust
        {{op}} kein Fieber
        {{op}} keine vergrößerten Lymphknoten
        {{op}} unauffälliger Mund- und Rachenbefund
        {{op}} unauffälliger Befund der äußeren Genitalien
        {{op}} keine skrotale Druckschmerzhaftigkeit
        {{op}} unauffällige vaginale Untersuchung mit beleuchtetem Spekulum
        {{op}} unauffällige bimanuelle Untersuchung ohne Uterus- oder Adnex-Druckschmerzhaftigkeit

      Beurteilung:
        {{ap}} routinemäßige STI-Screening-Anforderung
        {{ap}} Chlamydien
        {{ap}} Gonorrhoe

      Plan:
        {{pp}} STI-Testung durchführen
        {{pp}} Behandlung mit Azithromycin 1g und Cefixim 800mg bei vermuteter Chlamydien- und Gonorrhoe-Exposition
        {{pp}} sichere Sexualpraktiken mit konsequenter Verwendung von Barriereschutz (Kondome) einhalten
        {{pp}} regelmäßiges STI-Screening durchführen lassen, mindestens jährlich, bei höherem Risiko häufiger
