name: neuro
parent: default

matches:
  - trigger: ":neuroexam"
    replace:  |
      {{op}} normales Bewusstsein
        {{op}} unauffälliger Kopf-, Augen-, Ohren-, Nasen- und Rachenbefund
        {{op}} unauffälliger Hirnnervenbefund
        {{op}} normale Kraft in oberen und unteren Extremitäten
        {{op}} normale Muskeleigenreflexe in oberen und unteren Extremitäten
        {{op}} unauffälliger zerebellärer Befund (einschließlich Finger-Nase-Versuch und Diadochokinese)
        {{op}} normales Gangbild, einschließlich Hacke-Zehe-Gang
        {{op}} normale Fähigkeit, das Gleichgewicht bei geschlossenen Augen zu halten (negatives Romberg-Zeichen)

  - trigger: ":neuroredflag"
    replace:  |
      {{sp}} keine Sprechstörung (Dysarthrie)
        {{sp}} keine Doppelbilder (Diplopie)
        {{sp}} keine Schluckstörung (Dysphagie)
        {{sp}} keine Schwierigkeiten mit präzisen Bewegungen wie Finger-Nase-Versuch (Dysmetrie)
        {{sp}} keine Unfähigkeit zu raschen alternierenden Bewegungen (Dysdiadochokinese)


  - trigger: ":vertigo"
    word: true
    replace:  |
      Anamnese:
        {{cc}} Schwindel seit DAUER
        {{sp}} Gefühl, dass sich der Raum dreht
        Die Episoden sind intermittierend und dauern jeweils XX Sekunden
        {{sp}} kein erkennbarer Auslöser - keine kürzliche Erkrankung oder Erkältung und kein Trauma
        Begleitet von Übelkeit
        {{sp}} keine weiteren Symptome

        Warnzeichen:
        {{neuroredflag}}

      Untersuchungsbefund:
        {{neuroexam}}
        {{op}} Symptome provozierbar durch rasches Hinlegen mit zur Seite gedrehtem Kopf (Dix-Hallpike-Manöver)
               Schlimmer bei Drehung nach RECHTS, einschließlich Schwindel, Übelkeit, unwillkürlicher Augenbewegungen (Nystagmus)

      Beurteilung:
        {{ap}} benigner paroxysmaler Lagerungsschwindel (BPLS)

      Plan:
        {{pp}} bereitgestelltes Informationsmaterial durchsehen
        {{pp}} Selbstbehandlung gemäß bereitgestelltem Merkblatt versuchen
        {{pp}} bei Erfolglosigkeit Physiotherapie erwägen
        {{pp}} ausreichende Flüssigkeitszufuhr sicherstellen
        {{pp}} bereitgestelltes Rezept (Betahistin) bei Bedarf zur Symptomlinderung einnehmen

    vars:
      - name: neuroexam
        type: match
        params:
          trigger: ":neuroexam"
      - name: neuroredflag
        type: match
        params:
          trigger: ":neuroredflag"

  - trigger: ":tremor"
    word: true
    replace:  |
      Anamnese:
        {{cc}} Tremor der LINKEN HAND seit DAUER
        {{sp}} kein Ruhetremor
        {{sp}} keine Schwierigkeiten bei Aktivitäten des täglichen Lebens
        {{sp}} keine progrediente Verschlechterung der Symptome
        {{sp}} keine Besserung durch Alkoholkonsum
        {{sp}} keine vorherige Behandlung
        {{sp}} keine Familienanamnese für Tremor

      Untersuchungsbefund:
        Psychogener Tremor:
        Bei raschen alternierenden Bewegungen der kontralateralen Extremität ist der Tremor
        BESSER SCHLECHTER UNVERÄNDERT beim Öffnen/Schließen der Faust
        BESSER SCHLECHTER UNVERÄNDERT bei Pronation/Supination des Unterarms
        BESSER SCHLECHTER UNVERÄNDERT beim Fußtippen auf den Boden

        Hinweis: Typischerweise wird der Ruhetremor bei Morbus Parkinson deutlicher,
         während psychogener Tremor verschwindet oder den Rhythmus der willkürlichen Extremität übernimmt (Entrainment)

        Aktionstremor:
        Der Tremor ist:
        BESSER SCHLECHTER UNVERÄNDERT beim Zeichnen einer Spirale innerhalb einer anderen Spirale
        BESSER SCHLECHTER UNVERÄNDERT beim Verbinden von 2 Punkten zwischen eng liegenden geraden Linien
        BESSER SCHLECHTER UNVERÄNDERT beim Umgießen von Wasser von einem Glas in ein anderes

        Haltetremor:
        Der Tremor ist:
        BESSER SCHLECHTER UNVERÄNDERT bei für 10-15s ausgestreckten Armen, mit einem losen Blatt Papier auf der Hand/den Händen

        Kinetischer Tremor
        Der Tremor ist:
        BESSER SCHLECHTER UNVERÄNDERT bei der Nase-Finger-Nase-Bewegung
        BESSER SCHLECHTER UNVERÄNDERT bei der Knie-Hacke-Schienbein-Bewegung

        Intentionstremor
        Der Tremor ist bei zielgerichteten Bewegungen NICHT vorhanden.
        Die Tremoramplitude ist ZUNEHMEND ABNEHMEND UNVERÄNDERT, wenn sich die Hand dem Ziel nähert.

        Einfacher kinetischer Tremor
        Der Tremor ist bei allen nicht zielgerichteten Bewegungen NICHT vorhanden,
        wie z.B. wiederholte Flexion-Extension des Ellenbogens oder Pronation-Supination
        des Unterarms.
        Es zeigt sich KEINE Zunahme der Amplitude in der Endphase.

        Aufgabenspezifischer Tremor
        Der Tremor TRITT AUF VERSCHLECHTERT SICH BESSERT SICH IST UNVERÄNDERT beim Schreiben.
        Der Tremor TRITT AUF VERSCHLECHTERT SICH BESSERT SICH IST UNVERÄNDERT beim Spielen eines Musikinstruments
        Der Tremor TRITT AUF VERSCHLECHTERT SICH BESSERT SICH IST UNVERÄNDERT beim Halten eines Tons.

        Isometrischer Tremor
        Der Tremor tritt NICHT als Folge einer Muskelkontraktion
        gegen ein starres, unbewegliches Objekt auf.

      Beurteilung:
        Es besteht eine rhythmische, unwillkürliche Oszillation der LINKEN RECHTEN OBEREN UNTEREN Extremität,
        vorwiegend am HANDGELENK UND DEN DISTALEN FINGERANTEILEN, NICHT in Ruhe vorhanden,
        ZUNEHMEND ABNEHMEND UNVERÄNDERT bei Aktivität, LANGSAM MODERAT SCHNELL in der Frequenz,
        LEICHT MODERAT SCHWER in der Amplitude, ZUNEHMEND ABNEHMEND UNVERÄNDERT durch ablenkende Bewegungen
        anderer Extremitäten und ohne Entrainment.

        Zusammenfassend handelt es sich um einen RUHE-AKTIONS-Tremor.
        Die Tremorcharakteristik ist am ehesten vereinbar mit einem HALTE-KINETISCHEN-PSYCHOGENEN Tremor.
        Der kinetische Tremor scheint ein EINFACHER KINETISCHER  INTENTIONS-  AUFGABENSPEZIFISCHER  ISOMETRISCHER Tremor zu sein.

        {{ap}} benigner essentieller Tremor

      Plan:
        {{pp}} Behandlungsversuch mit Propranolol beginnen
        {{pp}} Alkoholkonsum zur Behandlung vermeiden
        {{pp}} Wiedervorstellung innerhalb eines Monats zur Beurteilung des Therapieerfolgs

  - trigger: ":tremorinfo"
    word: true
    replace:  |
        Differentialdiagnosen:
        Tremor: rhythmische, unwillkürliche Oszillationen eines Körperteils
          Ruhetremor: vorhanden bei nicht willkürlich aktiviertem Körperteil, vollständig
               gegen die Schwerkraft abgestützt (auf der Armlehne eines Stuhls abgestützt)
          Aktionstremor: bei willkürlicher Muskelaktivität sichtbar
             Haltetremor: bei willkürlicher Aufrechterhaltung einer Antigravitationsposition
             Kinetischer Tremor: bei willkürlichen Bewegungen vorhanden
                 Einfacher kinetischer Tremor: bei allen nicht zielgerichteten
                       willkürlichen Bewegungen vorhanden
                 Intentionstremor: bei zielgerichteten Bewegungen vorhanden
                       Verschlimmert sich, je näher das Ziel kommt
                 Aufgabenspezifischer Tremor: verstärkt durch spezifische Aktivität
                 Isometrisch: bei Muskelkontraktion gegen ein starres, unbewegliches Objekt

        Myoklonus: nichtrhythmisch, rasch, ruckartig, blitzartig
        Stereotypie: wiederholte und kontinuierliche komplexe motorische Handlungen
        Epilepsia partialis continua: kann rhythmisch sein, aber die Bewegungen
               ändern sich NICHT mit Lageveränderung oder Aktivität
        Klonus: rhythmische Oszillationen um ein Gelenk als Reaktion auf
                plötzliche passive Kontraktion
                Zunahme in Amplitude und Kraft bei passiver Muskeldehnung
        Dystonie: anhaltende Muskelkontraktionen, die häufig zu
                  Verdrehungen und abnormer Haltung eines Körperteils führen
        Tic: kurze, nichtrhythmische, rasche Bewegungen, meist orofazial, können
             willkürlich unterdrückt werden mit anschließendem Rebound-Anstieg
        Chorea: nichtrhythmische, nicht stereotype, halbzielgerichtete, relativ langsame Bewegungen,
               die von einem Körperteil zum anderen fließen
