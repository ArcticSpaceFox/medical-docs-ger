name: urology
parent: default

matches:
  - trigger: ":delayedejac"
    replace:  |
     Anamnese:
       {{cc}} verzögerte Ejakulation seit DAUER
       {{sp}} keine Schwierigkeiten bei der Ejakulation bei Masturbation
       {{sp}} keine Schwierigkeiten bei der Ejakulation mit Partner/in
       {{sp}} keine Angststörung in der Vorgeschichte
       {{sp}} keine serotonerg wirkenden Medikamente
         Beispiele:
           SSRI, SNRI, Bupropion, Trizyklika, MAO-Hemmer
           Antipsychotika,
           Triptane, Carbamazepin, Valproinsäure, Lithium
           Opioide,
           Metoclopramid, Ondansetron
           Cyclobenzaprin, Dextromethorphan
           LSD, Ecstasy, Kokain, Amphetamine

     Beurteilung:
       {{ap}} primäre verzögerte Ejakulation (wahrscheinlich zumindest teilweise sekundär durch serotonerge Medikation bedingt)
       Primäre verzögerte Ejakulation ist schwer zu behandeln, außer sie steht in direktem Zusammenhang mit einer Medikation.
       Bei Verdacht auf medikamentöse Ursache umfassen die Strategien:
       1) Umstellung von SSRI auf Vilazodon (Viibryd) oder niedrig dosiertes Vortioxetin (Trintellix)
       2) Umstellung von SSRI auf SNRI - Duloxetin (Cymbalta) oder Levomilnacipran (Fetzima) vermutlich am besten geeignet
       3) Hinzufügen von Mirtazapin (Remeron) oder Bupropion (Wellbutrin) zu einem SSRI

       Ist keine medikamentöse Ursache gegeben, steht es meist im Zusammenhang mit Angst sowie überkontrollierenden oder zwanghaften Persönlichkeitszügen.
       Eine intensive Beratung kann hilfreich sein.

       Die meisten Männer können beim Alleinsein bestimmte Reize finden, die ihnen helfen, ihre besonders hohe Ejakulationsschwelle zu erreichen.
       Wenn der/die Partner/in diese Techniken nachahmt, kann dies eine Ejakulation mit Partner/in ermöglichen.

       Schließlich kann ein Stimulans (z.B. Dexedrine 5-10mg) 1 Stunde vor sexueller Aktivität hilfreich sein.
       Sollte dieser Ansatz wirksam sein, sollte ein ADHS-Screening in Erwägung gezogen werden.

     Plan:
       {{pp}} Selbstüberweisung zur Beratung
       {{pp}} Versuch einer Medikamentenumstellung auf Vilazodon (Viibryd), Vortioxetin (Trintellix), Duloxetin (Cymbalta), Levomilnacipran (Fetzima)
       {{pp}} Versuch der Zugabe von Mirtazapin (Remeron), Bupropion (Wellbutrin)
       {{pp}} Versuch mit Dexedrine 5mg, eingenommen eine Stunde vor sexueller Aktivität
       {{pp}} Wiedervorstellung innerhalb 1 Monats bezüglich Wirksamkeit der Behandlung, früher bei Bedenken


  - trigger: ":lowtest"
    word: true
    replace:  |
      Anamnese:
        {{cc}} möglicher Testosteronmangel

        Sexuelle Symptome:
        {{sp}} keine verminderte Libido
        {{sp}} keine erektile Dysfunktion
        {{sp}} keine verminderte Häufigkeit morgendlicher Erektionen
        {{sp}} keine verminderte Leistungsfähigkeit

        Somatische Symptome:
        {{sp}} keine Zunahme des viszeralen Körperfetts/Adipositas
        {{sp}} keine Abnahme der fettfreien Muskelmasse
        {{sp}} keine Abnahme der Kraft
        {{sp}} keine Müdigkeit/Energieverlust
        {{sp}} keine verminderte körperliche Aktivität/Vitalität
        {{sp}} keine niedrige Knochendichte
        {{sp}} keine Anämie
        {{sp}} keine Hitzewallungen
        {{sp}} kein Verlust von Gesichts-, Achsel- und Schambehaarung/verlangsamtes Bartwachstum
        {{sp}} keine Abnahme des allgemeinen Wohlbefindens

        Psychische Symptome:
        {{sp}} keine Depression/gedrückte Stimmung
        {{sp}} keine Stimmungsschwankungen
        {{sp}} keine Reizbarkeit
        {{sp}} keine Konzentrationsstörung
        {{sp}} keine Schlaflosigkeit/Schlafstörungen

      Untersuchungsbefund:
        {{op}} keine Gonadenatrophie
        {{op}} keine Abnahme der Scham- und Gesichtsbehaarung
        {{op}} keine Abnahme der Muskelmasse
        {{op}} keine Zunahme des viszeralen Fetts

      Beurteilung:
        {{ap}} Testosteronmangel-Syndrom

      Plan:
        {{pp}} Testosteronspiegel bestimmen lassen (empfohlen 7 - 11 Uhr oder innerhalb 3 Stunden nach dem Aufwachen bei Schichtarbeit)
        sowie zugehörige Werte zur Bestätigung der Diagnose und zur Verlaufskontrolle während der Behandlung
        (FSH, LH, Prolaktin, SHBG, Albumin (cFT oder cBAT), TSH, Ferritin (oder % Eisensättigung), Blutbild, PSA)

  # Dies ist eine allgemeine Übersicht zum Testosteronmangel-Syndrom als Referenz
  # Diese Information ist nicht zwangsläufig aktuell oder leitlinienkonform
  - trigger: ":lowtestinfo"
    word: true
    replace:  |
        Testung:
        Testosteron 7-11 Uhr oder innerhalb von 3h nach dem Aufstehen bei Schichtarbeitern
        Bei Grenzwerten bioverfügbares Testosteron verwenden - Selbstzahlerleistung oder Berechnung mit Testosteron, SHBG, Albumin
        www.issam.ch/freetesto.htm
        Normbereich bioverfügbares Testosteron (4,0 - 16,0)
        Bei Normalwert nicht substituieren, da dies die natürliche Produktion unterdrücken kann und der Patient sich schlechter fühlt!

        Zusätzliche Testung FSH, LH, Prolaktin, SHBG, Albumin (cFT oder cBAT), TSH, Ferritin (oder %
        Eisensättigung), Blutbild, PSA

        FSH, LH niedrig deutet auf sekundären Hypogonadismus hin

        Ursachen des sekundären Hypogonadismus:
        Kallmann-Syndrom - assoziiert mit Farbenblindheit, Anosmie
        Hypophysenerkrankungen - Hypophysentumor oder Tumorbehandlung
        Entzündliche Erkrankung - Sarkoidose, Histiozytose, Tuberkulose
        HIV/AIDS
        Medikamente - Opiate, Hormone, Glukokortikoide, Ketoconazol
        Substanzen - Alkohol, Heroin
        Adipositas
        Normales Altern
        Begleiterkrankung - schwere OSA, Lebererkrankung, Hämochromatose, schwere Erkrankung, Operation, emotionaler Stress

        Behandlung:
        Lebensstil: aerobes und Krafttraining, gesunde Ernährung, Schlaf, Stressmanagement
        Große Überschneidung von Prädiabetes/Diabetes/metabolischem Syndrom, erektiler Dysfunktion, niedrigem Testosteron
        Die Behandlung sollte die sexuelle Funktion verbessern und den Bedarf an PDE-5-Hemmern reduzieren

        TRT (Testosteronersatztherapie):
        Kontraindikationen:   Metastasiertes Prostatakarzinom, Brustkrebs in der Vorgeschichte
        Nebenwirkungen:
        Fertilität: TRT unterdrückt die Spermienzahl, ist jedoch vollständig reversibel. Entweder absetzen oder Clomifen verwenden
        Kardiovaskuläres Risiko: keine überzeugende Evidenz für ein erhöhtes Risiko, aber widersprüchliche Studien. Einige legen einen protektiven Effekt bei Patienten mit niedrigem Testosteron zu Beginn nahe
        Prostatakarzinom: verursacht es nicht, könnte aber das Wachstum fördern, falls bereits vorhanden

        Delatestryl:    1ml (200mg) alle 2 Wochen   0,5ml (100mg) wöchentlich
        Testosteron-Cypionat: 2ml (200mg) alle 2 Wochen  1ml (100mg) wöchentlich
        Orale Gabe hat schlechte Resorption:  Andriol 80mg zweimal täglich mit fettreichen Mahlzeiten, Fischöl-Nahrungsergänzung, Olivenöl
        Topisch: Androgel/Testim beginnend mit 5g/Tag,  Axiron 3-6g/Tag (axilläre Anwendung),
                     Androderm-Pflaster 5g/Nacht
        Intranasal: Natesto (Testosteron-Nasengel 4,5%) 1 Hub (5,5mg) pro Nasenloch oder 2 Hübe gesamt zweimal täglich (22mg/Tag) zu Beginn

        Überwachung
        Vor Behandlungsbeginn:  Basis-DRU, nach 6 Mon., 12 Mon., dann jährlich
        Laborwerte (Blutbild, Leberwerte, Kreatinin, BZ/HbA1c, Lipide, PSA) vor Beginn, nach 3, 6, 12 Mon., dann jährlich

        Bei PSA-Anstieg über den altersbezogenen Grenzwert oder >0,75/Jahr Testosteron absetzen,
             PSA erneut kontrollieren und bei weiterhin erhöhten Werten an die Urologie überweisen (Rapid Access PSA Clinic in Calgary)

        Testspiegel bei oraler/transdermaler Gabe - idealerweise 2 Stunden nach Einnahme (relatives Maximum)
        Bei Injektion - Tag vor oder Tag der Injektion (Talspiegel)
        Ziel im mittleren Bereich (Normbereich 10-29) ohne Nebenwirkungen, mit verbessertem allgemeinen Wohlbefinden und sexueller Gesundheit

        Organsystem                      Nutzen                        Schäden
        Erektile Funktion/Libido          Verbesserung                 Keine
        Depression/Stimmung/Müdigkeit     Verbesserung                 Aggressives Verhalten
        Erythropoese                      Anstieg des Hämatokrits      Erhöhtes Risiko für Polyzythämie,
                                                                                              Embolie
        Skelettmuskulatur                 Zunahme der fettfreien Masse  Keine
        Knochenstoffwechsel               Prävention von Osteoporose    Keine
        Kardiovaskuläres System           Verbesserung der Herzinsuffizienz, Erhöhtes Risiko thromboembolischer
                                          Belastbarkeit                 kardiovaskulärer Ereignisse

        Prostata
        Benigne Prostatahyperplasie     Kein Effekt über die Manifestationen  Geringfügiger Anstieg von Volumen und
                                        des Testosteronmangels hinaus         prostataspezifischem Antigen
                                        hinaus
        Karzinom (metastasiert oder hohes Rezidivrisiko) Absolute Kontraindikation
                                                       Rezidiv und rasche Progression


        Karzinom (lokalisiert und behandelt)  Kein Effekt über die Manifestationen  Mögliche Verschlimmerung eines
                                              des Testosteronmangels hinaus         subklinischen residualen Karzinoms

        Hoden                            Kein Effekt über die Manifestationen  Atrophie oder Beeinträchtigung
                                        des Testosteronmangels hinaus         der Spermatogenese

        Siehe auch: CMAJ Guidelines 2015
