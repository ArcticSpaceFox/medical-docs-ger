name: covid
parent: default

matches:
  - trigger: ":covidphone"
    replace: |
      TELEFONISCHE KOMMUNIKATION COVID

      Beginnzeit: {{mytime}}

      Grund des Anrufs:  Anstelle eines Praxisbesuchs aufgrund von COVID-19-Bedenken

      Notizen:
      {{sp}} keine Reisetätigkeit
      {{sp}} kein Kontakt zu kürzlich Gereisten oder vermuteten COVID-19-Fällen
      {{sp}} keine COVID-Symptome (Husten, Fieber, Atemnot, laufende Nase oder Halsschmerzen),
      die nicht auf eine vorbestehende Erkrankung zurückzuführen sind

      Fortführung der sozialen Distanzierung empfohlen.

      Endzeit:
    vars:
    - name: mytime
      type: match
      params:
        trigger: ":time"

  - trigger: ":covidsig"
    replace: |
      Bitte denken Sie daran, weiterhin soziale Distanz zu wahren.


      # Diese COVID-Risikoeinschätzung und -überwachung basiert auf dem COVID-19 Positive Primary Care Pathway
      # Veröffentlicht auf www.specialistlink.ca
  - trigger: ":covidrisk"
    replace: |
      TELEFONISCHE RISIKOEINSCHÄTZUNG COVID

      Beginnzeit: {{mytime}}

      Grund des Anrufs:  Risikostratifizierung bei vermutetem oder bestätigtem COVID-Fall

      Sicherheitsnetz-Prüfung:
        {{sp}} keine soziale Isolation
        {{sp}} keine fehlende Unterstützung durch Betreuungspersonen
        {{sp}} keine Unfähigkeit, die Flüssigkeitszufuhr aufrechtzuerhalten
        {{sp}} keine Nahrungsmittel-/finanzielle Unsicherheit
        {{sp}} keine häusliche Pflege
        {{sp}} keine Schwierigkeiten mit Gesundheitskompetenz oder Bedenken bezüglich der Selbstversorgung

      Hochrisikomerkmale:
        {{sp}} keine kürzliche Entlassung aus tertiärer Versorgung (Krankenhaus, komplexe Versorgungseinrichtung)
        {{sp}} kein fehlendes Sicherheitsnetz
        {{sp}} kein Alter >70 Jahre
        {{sp}} kein Alter >60 Jahre mit medizinischen Begleiterkrankungen
        {{sp}} keine Verschlechterung der Symptome

      Durchschnittliche Risikomerkmale:
        {{sp}} kein Alter <18 Jahre
        {{sp}} keine Schwangerschaft
        {{sp}} kein Fehlen von Symptomen (bei positivem Abstrich)

      Wenn alle oben genannten Punkte negativ sind, gilt niedriges Risiko

      Gesamtrisikobewertung:
         Hohes Risiko - erfordert tägliche Überwachung für 14 Tage
         Durchschnittliches Risiko - erfordert Überwachung alle 2 Tage für 7 Tage
         Niedriges Risiko - Selbstüberwachung erwägen - Merkblatt ausgehändigt

      Endzeit:
    vars:
    - name: mytime
      type: match
      params:
        trigger: ":time"

  - trigger: ":covidredflags"
    replace: |
      {{sp}} keine schwere Atemnot in Ruhe
      {{sp}} keine Atembeschwerden
      {{sp}} keine Schmerzen oder Druckgefühl im Brustkorb
      {{sp}} keine kalte, klamme oder blass-marmorierte Haut
      {{sp}} keine neu aufgetretene Verwirrtheit
      {{sp}} keine blauen Lippen oder blaues Gesicht
      {{sp}} keine zunehmende Erweckbarkeitsstörung
      {{sp}} kein Bluthusten
      {{sp}} keine verminderte Urinausscheidung
      {{sp}} kein erneuter Husten nach vorheriger Besserung (kann auf eine COVID-Pneumonie hinweisen)
      {{sp}} kein erneutes Fieber nach fieberfreier Phase (kann auf eine COVID-Pneumonie hinweisen)
      {{sp}} keine niedrige Sauerstoffsättigung (<92% bei vorher Gesunden, <90% bei zugrunde liegender Lungenerkrankung)
      {{sp}} kein erhöhter Sauerstoffbedarf bei häuslicher O2-Therapie

  - trigger: ":covidmonitor"
    replace: |
     TELEFONISCHE ÜBERWACHUNG COVID

      Beginnzeit: {{mytime}}

      Grund des Anrufs:  Überwachung bei vermutetem oder bestätigtem COVID-Fall

      Vorherige Risikostratifizierung:  Hoch  Durchschnittlich  Niedrig

      {{sp}} insgesamt fühlt sich  schlechter  unverändert  besser

      Falls nicht schlechter, wurde ein Atem-Beurteilungsfragebogen ausgefüllt:
        Wie ist Ihre Atmung?
        Ist sie heute schlechter als gestern?
        Was verhindert Ihre Atmung, dass Sie tun können?

      Insgesamt schlechter oder Atemfragen positiv, daher wurden Warnzeichen überprüft:

      {{sp}} Warnzeichen vorhanden, daher dringende oder notfallmäßige Überweisung erforderlich
      {{sp}} keine Warnzeichen, aber da sich die Symptome verschlechtern, wird nun von hohem Risiko ausgegangen
      Insgesamt nicht schlechter und Atemfragen negativ, daher wird die Überwachung fortgesetzt
      Hohes Risiko      - alle 24h für insgesamt 14 Tage
      Durchschnittliches Risiko   - alle 48h für insgesamt 7 Tage
      Niedriges Risiko     - Selbstüberwachung anhand der Selbstüberwachungs-Checkliste erwägen

      Isolation für mindestens 10 Tage ab Symptombeginn erforderlich
      oder bis die Symptome abgeklungen sind, je nachdem, was länger dauert.

      Endzeit:
    vars:
    - name: mytime
      type: match
      params:
        trigger: ":time"
