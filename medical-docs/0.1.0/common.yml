name: common
parent: default

matches:
  - trigger: "S:"
    replace: "Anamnese:"
    word: true
  - trigger: "O:"
    replace: "Untersuchungsbefund:"
    word: true
  - trigger: "A:"
    replace: "Beurteilung:"
    word: true
  - trigger: "P:"
    replace: "Plan:"
    word: true

  - trigger: ":SOAP"
    word: true
    replace: |
      Anamnese:
      Untersuchungsbefund:
      Beurteilung:
      Plan:

      Beginnzeit: {{mytime}}
      Endzeit:
    vars:
      - name: mytime
        type: date
        params:
          format: "%H:%M"

  - trigger: ":FIFE"
    word: true
    replace: |
      Gefühle: Was beunruhigt Sie am meisten? Bestehen bestimmte Ängste oder Sorgen?
      Vorstellungen: Was glauben Sie, könnte dahinterstecken?
      Funktion: Wie hat sich dies auf Ihren Alltag ausgewirkt? Worauf mussten Sie verzichten?
      Erwartungen: Was erwarten oder erhoffen Sie sich heute von mir?

  - trigger: "re"
    replace: "rechts"
    word: true

  - trigger: "li"
    replace: "links"
    word: true

  - trigger: "sek"
    replace: "Sekunden"
    word: true

  - trigger: "min"
    replace: "Minuten"
    word: true

  - trigger: "std"
    replace: "Stunden"
    word: true

  - trigger: "wo"
    replace: "Wochen"
    word: true

  - trigger: "mon"
    replace: "Monate"
    word: true

  - trigger: "jr"
    replace: "Jahre"
    word: true

  # Daten
  - trigger: ":date"
    replace: "{{mydate}}"
    vars:
      - name: mydate
        type: date
        params:
          format: "%d.%m.%Y"

  - trigger: ":time"
    replace: "{{mytime}}"
    vars:
      - name: mytime
        type: date
        params:
          format: "%H:%M"

  - trigger: ":phone"
    word: true
    replace:  |
      TELEFONISCHE KOMMUNIKATION
      Grund des Anrufs:
      Notizen:


  - trigger: "lmom"
    replace: "{{mytime}} Angerufen, jedoch keine Antwort. Sprachnachricht hinterlassen, die Praxis zurückzurufen, sobald möglich."
    word: true
    vars:
      - name: mytime
        type: date
        params:
          format: "%H:%M"

  - trigger: ":pain"
    replace: |
      Der Schmerz ist lokalisiert in
        und strahlt aus nach
        Der Schmerz ist begleitet von Übelkeit Erbrechen Schwitzen Atemnot
        Er besteht seit
        und begann als
        Die Symptome werden besser  bleiben gleich  werden schlechter
        Der Schmerz ist konstant intermittierend
        Der Schmerz ist morgens  abends  im Tagesverlauf gleich schlimm
        Er tritt in der Regel etwa X Mal pro Tag auf
        Wenn er auftritt, dauert jede Episode
        Der Charakter des Schmerzes ist
        Die Intensität beträgt X von 10 (wobei 10 dem stärksten vorstellbaren Schmerz entspricht)
        Der Schmerz verschlimmert sich bei
        Der Schmerz bessert sich bei
        Bisher versuchte Therapien umfassen

  - trigger: ":PQRST"
    word: true
    replace: |
      Provokation, Linderung - Was verursacht den Schmerz?
                   Was macht ihn besser oder schlechter?
      Qualität - Wie genau fühlt er sich an? (stechend, dumpf, scharf, brennend, drückend)
      Ausstrahlung - Ist der Schmerz lokal begrenzt oder strahlt er aus?
      Schweregrad - Wie stark ist er? (Skala 1 - 10)
                 Wie stark beeinträchtigt er Ihr Leben?
      Zeitlicher Verlauf - Besteht er durchgehend oder kommt und geht er?
               Wann beginnt er und wie lange hält er an?
               Wann wurde zuletzt ein Schmerzmittel eingenommen?

  - trigger: ":OLDCARTS"
    word: true
    replace: |
      Beginn:
      Lokalisation:
      Dauer:
      Charakter:
      Verstärkende Faktoren:
      Lindernde Faktoren:
      Versuchte Therapien:
      Schweregrad:

  - trigger: ":SOCRATES"
    word: true
    replace: |
      Lokalisation:
      Beginn:
      Charakter:
      Ausstrahlung:
      Begleitsymptome:
      Zeit/Dauer:
      Verstärkende/lindernde Faktoren:
      Schweregrad:
