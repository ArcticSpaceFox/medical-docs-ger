name: intro
parent: default

matches:
  - trigger: ":intro"
    replace: |
      Erstgespräch (Kennenlerngespräch):

      Selbstvorstellung sowie allgemeine Informationen zu Praxis und Richtlinien
      (Sprechzeiten, Terminvergabe ohne Voranmeldung, Notfallversorgung außerhalb der Sprechzeiten, nicht versicherte Leistungen) besprochen.

      Etwaige Probleme mit der vorherigen hausärztlichen Betreuung besprochen.

      Vereinbarung über Behandlungsbeziehung, Erwartungen und Grenzen besprochen.
      Fragen des Patienten beantwortet.

      Medizinische Vorgeschichte, Medikamente, Allergien, Familien- und Sozialanamnese erhoben.

      Plan:
        Patient hat Anforderung der vorherigen Krankenunterlagen unterschrieben; diese wurde an den vorherigen Behandler gefaxt
        Labor-/Bildgebungsanforderung bei Bedarf ausgestellt
        Patient soll Termin für Vorsorgeuntersuchung vereinbaren
        Beratung durchgeführt und Hinweise zur Wiedervorstellung gegeben
