matches:
  - trigger: ":xabcde"
    word: true
    replace: |
      First Look beim Betreten des Raumes: 
      Patient sitzt auf dem Sofa, ist wach, reagiert sofort auf Ansprache, schaut uns entgegen. 
      Keine augenscheinlichen Verletzungen, keine sichtbaren starken Blutungen, keine pathologischen Atemgeräusche aus der Distanz. Hautkolorit wirkt rosig. 
      Erste Einschätzung: Patient nicht kritisch
      
      ---------------------------
      # PRIMARY SURVEY
      ---------------------------
      x: Keine starke äußere Blutung erkennbar, keine spritzenden oder sickernden Wunden, kein Blut im Umfeld des Patienten. Kein Handlungsbedarf.
      A: Patient spricht in vollständigen Sätzen, Stimme klar und ohne Heiserkeit. Mundrauminspektion mittels Diagnostikleuchte: Mundhöhle frei, keine Fremdkörper, keine Schwellungen im Mund-Rachen-Raum, keine Blutungen. Mundschleimhäute feucht und rosig, keine Zyanose. Kein Zungenbiss. Zunge wird beim Herausstrecken mittig gehalten, keine Deviation. Atemwege frei, kein Handlungsbedarf. Kein Verdacht auf eine HWS-Verletzung, daher keine manuelle Inline-Stabilisierung notwendig.
      B: Atemfrequenz wird ausgezählt über 15 Sekunden, patient spricht nicht, Thoraxbewegungen werden beobachtet: 16 Atemzüge pro Minute, entspricht einer normalen Atemfrequenz. Atemexkursionen seitengleich, kein Einsatz der Atemhilfsmuskulatur, kein Nasenflügelatmen, kein sichtbares Einziehen intercostal oder subclaviculär. Keine obere Einflussstauung, Halsvenen nicht gestaut. Thorax bei Inspektion regelrecht geformt, keine sichtbaren Deformitäten. Palpation des Thorax anterior-posterior und lateral: stabil, kein Druckschmerz, kein Krepitieren. 4-Punkt-Auskultation: Pulmo beidseits mit vesikulärem Atemgeräusch, seitengleich belüftet, keine Nebengeräusche. Pulsoxymetrie wird angelegt, SpO2 98 Prozent unter Raumluft, periphere Pulswelle gut erkennbar. Keine Dyspnoe, kein pathologisches Atemmuster. Kein Handlungsbedarf.
      C: Hautstatus: Haut rosig, warm und trocken, keine Blässe, keine Zyanose, kein Schweiß. Keine stehenden Hautfalten als Hinweis auf Exsikkose. Rekapillarisierungszeit am Nagelbett beidseits unter 2 Sekunden. Periphere Pulse beidseits am Radialis gut tastbar, kräftig, gleichmäßig, Frequenz 72 Schläge pro Minute. Kein Pulsdefizit. Abdomen bei Inspektion unauffällig, keine Abwehrspannung, kein Druckschmerz auf Palpation im Vier-Quadranten-Schema. Blutungsräume Abdomen, Becken und Oberschenkel unauffällig, keine Schwellung, keine Hämatome, kein Druckschmerz über dem Beckenring, Becken stabil. Kein Handlungsbedarf.
      D: Glasgow Coma Scale: Augen öffnen spontan, 4 Punkte. Verbale Kommunikation konversationsfähig und orientiert, 5 Punkte. Motorik: befolgt Aufforderungen, 6 Punkte. GCS damit 15 von 15 Punkten. Orientierung geprüft: Patient weiß, welcher Wochentag und welcher Monat ist, nennt seinen Namen korrekt, weiß wo er sich befindet und kann das Ereignis klar schildern. Patient ist zu Zeit, Ort, Person und Situation vollständig orientiert. Pupillenkontrolle: Pupillen beidseits isokor, mittelgroß, direkte und konsensuelle Lichtreaktion beidseits prompt und regelrecht, keine Anisokorie. Quick-FAST unauffällig: keine faziale Asymmetrie, keine Armhalteinsuffizienz, keine Sprachstörung. pDMS beidseits intakt: Durchblutung regelrecht, Motorik uneingeschränkt, Sensibilität seitengleich und regelrecht. Blutzucker: 94 mg/dl. Kein Handlungsbedarf.
      E: Patient wird situationsangepasst und soweit notwendig entkleidet. Bodycheck von Kopf bis Fuß: Schädel stabil, keine Schwellungen, keine Druckschmerzhaftigkeit, kein Hämatom. Wirbelsäule klopfschmerzfrei, keine Druck- oder Klopfdolenz zervikal, thorakal oder lumbal. Extremitäten ohne Fehlstellungen, Hämatome oder Wunden. Kein Hinweis auf vorangegangenes Trauma. Kein Schmerzempfinden des Patienten bei der Untersuchung. Keine weiteren Verletzungen oder Auffälligkeiten. Temperatur: 36,6 Grad Celsius, normotherm. SIRS-Kriterien und qSOFA negativ. Wärmeerhalt wird sichergestellt.
      ---------------------------

  - trigger: ":stemi"
    word: true
    replace: |
      Akutes Koronarsyndrom - Verdacht auf STEMI

      Anamnese:
        {{cc}} thorakales Druckgefühl/Vernichtungsschmerz seit ZEITPUNKT
        Ausstrahlung: linker Arm/Kiefer/Rücken
        Begleitsymptome: {{sp}} Übelkeit, Kaltschweißigkeit, Luftnot
        Kardiovaskuläre Risikofaktoren: Nikotin, art. Hypertonie,
          Diabetes mellitus, Hyperlipidämie, familiäre Belastung

      12-Kanal-EKG (Zeitpunkt dokumentieren):
        ST-Hebung in Ableitungen ___ (>=1mm Extremität/>=2mm Brustwand)
        Spiegelbildliche ST-Senkungen in Ableitungen ___
        Neu aufgetretener Linksschenkelblock: ja/nein

      Sofortmaßnahmen (Door-to-Balloon-Zeit beachten):
        ASS 250-500mg i.v. (sofern keine Kontraindikation)
        P2Y12-Hemmer (Ticagrelor/Prasugrel) nach Klinikstandard
        Unfraktioniertes Heparin nach Klinikstandard
        O2 nur bei SpO2 <90%
        Analgesie: Morphin titriert nach Klinikstandard
        Sofortige Herzkatheterlabor-Anmeldung/Alarmierung

      Beurteilung:
        {{ap}} ST-Hebungsinfarkt (STEMI), Lokalisation: anterior/inferior/lateral
        Differentialdiagnosen: NSTEMI, instabile Angina pectoris,
          Aortendissektion, Lungenembolie, Perikarditis

  - trigger: ":anaphylaxie"
    word: true
    replace: |
      Anaphylaktische Reaktion

      Auslöser (vermutet): NAHRUNGSMITTEL/MEDIKAMENT/INSEKTENSTICH/KONTRASTMITTEL
      Zeitpunkt des Symptombeginns: __ Minuten nach Exposition

      Schweregrad (Ring & Messmer-Klassifikation):
        Grad I:   Haut-/Schleimhautreaktion (Urtikaria, Flush, Pruritus, Angioödem)
        Grad II:  zusätzlich messbare, aber nicht bedrohliche
                  kardiovaskuläre/respiratorische Reaktion
        Grad III: Schock, Bronchospasmus, bedrohliche Atemnot
        Grad IV:  Kreislauf-/Atemstillstand

      Sofortmaßnahmen:
        Allergenexposition beenden/entfernen
        {{op}} Adrenalin 0,5mg i.m. anterolateraler Oberschenkel,
          Wiederholung nach 5-10min bei fehlendem Ansprechen
        Hochdosierte O2-Gabe, Lagerung nach hämodynamischer Situation
          (Schocklage bei Hypotonie, sitzend bei Atemnot)
        i.v.-Zugang, Volumengabe (kristalloid) bei Hypotonie
        H1-Antihistaminikum i.v. (z.B. Clemastin)
        Kortikosteroid i.v. (z.B. Prednisolon 250mg)
        Bei Bronchospasmus: inhalatives Beta-2-Sympathomimetikum

      Überwachung: mind. 6-8h stationär bei Grad >=II wegen
      biphasischer Reaktion möglich

  - trigger: ":sepsis"
    word: true
    replace: |
      Verdacht auf Sepsis

      Fokussuche: Pulmonal/Urogenital/Abdominell/ZNS/Haut-Weichteile/unklar
      qSOFA: {{qsofa}} Punkte (siehe :qsofa)

      Sepsis-3-Kriterien: Infektion + akute Organdysfunktion
      (SOFA-Score-Anstieg um >=2 Punkte)

      "Sepsis-Six" / Sepsis-Bundle (erste Stunde):
        1. O2-Gabe nach Sättigung
        2. Blutkulturen (aerob/anaerob) vor Antibiotikagabe abnehmen
        3. Kalkulierte Breitspektrum-Antibiotikatherapie umgehend beginnen
        4. Volumentherapie (kristalloid, initial 30ml/kg bei Hypotonie/Laktat >4)
        5. Laktat bestimmen
        6. Ausscheidung überwachen (Blasenkatheter bei Schock)

      Verlaufsparameter: Laktat-Clearance, Diurese, Vigilanz, Vitalparameter
    vars:
      - name: qsofa
        type: echo
        params:
          echo: "__"

  - trigger: ":schockformen"
    word: true
    replace: |
      Differentialdiagnose Schockformen
        Hypovolämisch: Blutung, Flüssigkeitsverlust (Erbrechen, Diarrhoe,
          Verbrennung) - kalte Peripherie, tachykard, RR erniedrigt
        Kardiogen: Pumpversagen (Infarkt, Arrhythmie, Klappenvitium) -
          gestaute Halsvenen, Lungenödem möglich
        Distributiv (septisch/anaphylaktisch/neurogen): periphere
          Vasodilatation - initial warme Peripherie, Hypotonie
        Obstruktiv: Lungenembolie, Spannungspneumothorax,
          Perikardtamponade - gestaute Halsvenen, Hypotonie, Tachykardie

  - trigger: ":intox"
    word: true
    replace: |
      Verdacht auf Intoxikation

      Substanz(en) (vermutet/bekannt):
      Menge/Dosis:
      Zeitpunkt der Einnahme:
      Einnahmeweg: oral/i.v./inhalativ/dermal
      Suizidalität: {{op}} Hinweise auf Suizidabsicht, {{sp}} Abschiedsbrief

      Vitalparameter/Vigilanz: siehe :not
      Pupillenstatus: {{pupillen}}

      Sofortmaßnahmen:
        Giftnotruf kontaktieren (Giftinformationszentrum), Substanz/Menge/Zeit angeben
        {{op}} Aktivkohle erwägen (nur bei wachem Patienten,
          Einnahme <1h, geeignete Substanz)
        Spezifisches Antidot erwägen (siehe :antidot)
        Symptomatische/supportive Therapie, Monitorüberwachung

      Procedere:
        {{op}} Psychiatrisches Konsil bei Suizidversuch
        Stationäre Überwachung mind. bis Symptomfreiheit
    vars:
      - name: pupillen
        type: echo
        params:
          echo: "miotisch/mydriatisch/isokor"
